#cloud-config
# =============================================================================
# PasswordLab "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Vaultwarden (self-hosted Bitwarden-compatible password manager, Docker)
#        + Nginx reverse proxy + Certbot TLS
#        + UFW firewall + fail2ban + swap + unattended-upgrades
# Vaultwarden is a lightweight Rust implementation of the Bitwarden server API,
# compatible with all official Bitwarden clients.
# https://github.com/dani-garcia/vaultwarden
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.passwordlab-bootstrap.env
# block before launching. Secrets are generated randomly per-boot if left as
# CHANGE_ME defaults.
# =============================================================================

hostname: passwordlab
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key / hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: false
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget
  - python3
  - openssl

# ----------------------------------------------------------------------------
# Swap (survive build-time memory spikes; Docker pulls several images)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk ahead of the bootstrap script
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.passwordlab-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # primary domain (no scheme, no trailing slash)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (DNS not pointed yet)
      ADMIN_PASS="CHANGE_ME"            # Vaultwarden admin token (panel at /admin)
      # Data directory — all Vaultwarden data persisted here; back this up!
      VW_DATA_DIR="/opt/passwordlab/data"
      # Signups: set false to disable public registration after you create your account
      VW_SIGNUPS_ALLOWED="true"

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/passwordlab.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx reverse-proxy vhost (bootstrap replaces APP_DOMAIN_PLACEHOLDER) --
  - path: /etc/nginx/sites-available/passwordlab.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Let's Encrypt ACME challenge
          location /.well-known/acme-challenge/ { root /var/www/html; }

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "same-origin" always;

          # Vaultwarden WebSocket notifications
          location /notifications/hub {
              proxy_pass              http://127.0.0.1:3012;
              proxy_http_version      1.1;
              proxy_set_header        Upgrade $http_upgrade;
              proxy_set_header        Connection "upgrade";
              proxy_set_header        Host $host;
              proxy_set_header        X-Real-IP $remote_addr;
              proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header        X-Forwarded-Proto $scheme;
          }

          location /notifications/hub/negotiate {
              proxy_pass http://127.0.0.1:8080;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }

          location / {
              proxy_pass              http://127.0.0.1:8080;
              proxy_http_version      1.1;
              proxy_set_header        Host $host;
              proxy_set_header        X-Real-IP $remote_addr;
              proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header        X-Forwarded-Proto $scheme;
              proxy_read_timeout      90s;
              proxy_send_timeout      90s;
              client_max_body_size    525M;
          }
      }

  # --- Docker Compose project for Vaultwarden ----------------------------------
  - path: /opt/passwordlab/docker-compose.yml
    permissions: '0640'
    owner: root:root
    content: |
      # Vaultwarden Docker Compose — generated by passwordlab-bootstrap.sh
      # Web vault + admin panel: :8080 (proxied through nginx on 80/443)
      # WebSocket notifications: :3012 (proxied through nginx)
      services:
        vaultwarden:
          image: vaultwarden/server:latest
          container_name: vaultwarden
          restart: unless-stopped
          user: "33:33"
          volumes:
            - ${VW_DATA_DIR:-/opt/passwordlab/data}:/data
          ports:
            - "127.0.0.1:8080:80"
            - "127.0.0.1:3012:3012"
          environment:
            - DOMAIN=DOMAIN_PLACEHOLDER
            - WEBSOCKET_ENABLED=true
            - SIGNUPS_ALLOWED=${VW_SIGNUPS_ALLOWED:-true}
            - ADMIN_TOKEN=ADMIN_TOKEN_PLACEHOLDER
            - LOG_FILE=/data/vaultwarden.log
            - LOG_LEVEL=warn
            - EXTENDED_LOGGING=true
            - TZ=UTC

  # --- main bootstrap script -------------------------------------------------
  - path: /root/passwordlab-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/passwordlab-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.passwordlab-bootstrap.env

      echo "=== PasswordLab (Vaultwarden) bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) ------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$ADMIN_PASS" = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"

      # Prefer provisioner-supplied admin email + password (ADMIN_PASS is the
      # Vaultwarden /admin panel token)
      [ -r /etc/vps-provision.env ] && . /etc/vps-provision.env
      [ -n "${VPS_ADMIN_PASS:-}" ] && ADMIN_PASS="$VPS_ADMIN_PASS"
      [ -n "${VPS_ADMIN_EMAIL:-}" ] && LE_EMAIL="$VPS_ADMIN_EMAIL"

      # --- install Docker CE via official script (distro-agnostic) ----------
      if ! command -v docker >/dev/null 2>&1; then
        echo "Installing Docker CE..."
        # fallback: noble repo until 26.04 published
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
        rm -f /tmp/get-docker.sh
      fi
      systemctl enable --now docker

      # --- Docker Compose v2 plugin ------------------------------------------
      if ! docker compose version >/dev/null 2>&1; then
        COMPOSE_VER="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
          | jq -r '.tag_name' 2>/dev/null || echo 'v2.27.1')"
        COMPOSE_URL="https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-$(uname -m)"
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -fsSL "$COMPOSE_URL" -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      fi
      echo "Docker  : $(docker --version)"
      echo "Compose : $(docker compose version)"

      # --- Create data + project directories ---------------------------------
      mkdir -p "${VW_DATA_DIR}"
      mkdir -p /opt/passwordlab
      chmod 750 "${VW_DATA_DIR}"
      # www-data uid=33; Vaultwarden container also runs as 33:33
      chown 33:33 "${VW_DATA_DIR}"

      # --- Determine public scheme for DOMAIN env var -----------------------
      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- Write .env for Docker Compose ------------------------------------
      cat > /opt/passwordlab/.env <<DOTENV
      # Generated by passwordlab-bootstrap.sh — $(date)
      VW_DATA_DIR=${VW_DATA_DIR}
      VW_SIGNUPS_ALLOWED=${VW_SIGNUPS_ALLOWED}
      DOTENV
      chmod 600 /opt/passwordlab/.env

      # --- Patch docker-compose.yml with runtime values ---------------------
      sed -i "s|DOMAIN_PLACEHOLDER|${PROTO}://${APP_DOMAIN}|g" \
        /opt/passwordlab/docker-compose.yml
      sed -i "s|ADMIN_TOKEN_PLACEHOLDER|${ADMIN_PASS}|g" \
        /opt/passwordlab/docker-compose.yml

      # --- Pull and start Vaultwarden ----------------------------------------
      cd /opt/passwordlab
      docker compose pull
      docker compose up -d

      echo "Vaultwarden container started."

      # --- nginx vhost: replace domain placeholder --------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|g" \
        /etc/nginx/sites-available/passwordlab.conf
      ln -sf /etc/nginx/sites-available/passwordlab.conf \
        /etc/nginx/sites-enabled/passwordlab.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- Firewall: SSH + HTTP + HTTPS only --------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ---------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot --nginx -d ${APP_DOMAIN}"
      fi

      # --- Write credentials summary (chmod 600) ----------------------------
      cat > /root/passwordlab-credentials.txt <<CREDS
      ===== PasswordLab (Vaultwarden) bootstrap complete: $(date) =====

      Vaultwarden URL    : ${PROTO}://${APP_DOMAIN}/
      Admin panel        : ${PROTO}://${APP_DOMAIN}/admin
      Admin token        : ${ADMIN_PASS}

      First steps:
        1. Point your DNS A record for ${APP_DOMAIN} to this server's IP.
        2. If TLS was deferred, run:
             certbot --nginx -d ${APP_DOMAIN}
        3. Open ${PROTO}://${APP_DOMAIN}/ and create your first account.
        4. Visit /admin to configure SMTP, disable signups, manage users, etc.
        5. Install any official Bitwarden client app and connect it to:
             ${PROTO}://${APP_DOMAIN}/

      Data directory : ${VW_DATA_DIR}
      Compose dir    : /opt/passwordlab/
      Log            : /var/log/passwordlab-bootstrap.log
      App log        : ${VW_DATA_DIR}/vaultwarden.log

      Useful commands:
        docker ps
        docker compose -f /opt/passwordlab/docker-compose.yml ps
        docker compose -f /opt/passwordlab/docker-compose.yml logs -f
        docker compose -f /opt/passwordlab/docker-compose.yml pull && \
          docker compose -f /opt/passwordlab/docker-compose.yml up -d   # upgrade
      CREDS
      chmod 600 /root/passwordlab-credentials.txt

      echo "=== PasswordLab bootstrap finished: $(date) ==="
      echo "=== Credentials in /root/passwordlab-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all write_files have been placed
# ----------------------------------------------------------------------------
bootcmd:
  # Free the dpkg/apt lock before cloud-init's package stage: gracefully stop
  # (SIGTERM, NOT kill -9) unattended-upgrades + apt-daily so they release the
  # lock, and mask the timers/services so they don't restart this boot.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop unattended-upgrades.service apt-daily.service apt-daily-upgrade.service 2>/dev/null; systemctl mask apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/passwordlab-bootstrap.sh" ]

final_message: "PasswordLab bootstrap done after $UPTIME s. See /root/passwordlab-credentials.txt and /var/log/passwordlab-bootstrap.log"
