#cloud-config
hostname: minecraft-forge
manage_etc_hosts: true
timezone: UTC
package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - unzip
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges
  - jq
  - screen
  # Forge 1.20.1 (47.x) targets Java 17 and crash-loops under Java 21, so we
  # install the JRE 17 the default MC_VERSION needs. (Newer MC versions need 21;
  # operators changing MC_VERSION should install/point at the matching JRE.)
  - openjdk-17-jre-headless

swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

users:
  - default

write_files:
  - path: /root/.minecraft-forge-bootstrap.env
    permissions: '0600'
    content: |
      # Operator-editable variables for Minecraft Forge server
      # Edit these before or after first boot, then re-run /root/minecraft-forge-bootstrap.sh

      # Minecraft and Forge versions
      MC_VERSION="1.20.1"
      FORGE_VERSION="47.3.0"

      # Server settings
      SERVER_PORT="25565"
      RCON_PORT="25575"
      MAX_PLAYERS="20"
      MOTD="Powered by InterServer"
      DIFFICULTY="normal"
      GAMEMODE="survival"
      LEVEL_NAME="world"
      MEMORY_MB="2048"

      # RCON password (set to CHANGE_ME to auto-generate)
      RCON_PASS="CHANGE_ME"

      # Operator (admin) username — set to your Minecraft Java username
      MC_OP_NAME=""

  - path: /root/minecraft-forge-bootstrap.sh
    permissions: '0700'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/minecraft-forge-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.minecraft-forge-bootstrap.env

      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting Minecraft Forge bootstrap..."

      # --- Random secret generator (SIGPIPE-safe under set -e + pipefail) ---
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # --- Resolve secrets ---
      if [ "${RCON_PASS}" = "CHANGE_ME" ]; then
        RCON_PASS="$(rand)"
      fi

      # --- Ensure Java 17 is present (Forge 1.20.1 requires Java 17; it
      #     crash-loops on Java 21). Resolve the exact java binary so the unit
      #     never accidentally picks up a different default-java. ---
      if ! dpkg -s openjdk-17-jre-headless >/dev/null 2>&1; then
        DEBIAN_FRONTEND=noninteractive apt-get install -y openjdk-17-jre-headless
      fi
      JAVA_BIN="$(ls -1 /usr/lib/jvm/java-17-openjdk-*/bin/java 2>/dev/null | head -1 || true)"
      if [ -z "${JAVA_BIN}" ] || [ ! -x "${JAVA_BIN}" ]; then
        JAVA_BIN="$(command -v java)"
      fi
      echo "Using Java binary: ${JAVA_BIN}"
      "${JAVA_BIN}" -version

      # --- Create minecraft system user ---
      if ! id minecraft >/dev/null 2>&1; then
        useradd -r -m -d /opt/minecraft -s /bin/bash minecraft
      fi

      # --- Create server directory ---
      mkdir -p /opt/minecraft/forge-server
      cd /opt/minecraft/forge-server

      # --- Download Forge installer ---
      FORGE_INSTALLER="forge-${MC_VERSION}-${FORGE_VERSION}-installer.jar"
      FORGE_URL="https://maven.minecraftforge.net/net/minecraftforge/forge/${MC_VERSION}-${FORGE_VERSION}/${FORGE_INSTALLER}"

      if [ ! -f "${FORGE_INSTALLER}" ]; then
        echo "Downloading Forge installer: ${FORGE_URL}"
        wget -q --retry-connrefused --tries=5 -O "${FORGE_INSTALLER}" "${FORGE_URL}" || {
          echo "ERROR: Failed to download Forge installer. Check MC_VERSION and FORGE_VERSION in /root/.minecraft-forge-bootstrap.env"
          exit 1
        }
      fi

      # --- Run Forge installer ---
      if [ ! -f "libraries/net/minecraftforge/forge/${MC_VERSION}-${FORGE_VERSION}/unix_args.txt" ]; then
        echo "Running Forge installer (server mode)..."
        "${JAVA_BIN}" -jar "${FORGE_INSTALLER}" --installServer 2>&1 | tail -20
      fi

      # Forge 1.20.1 refuses to start without user_jvm_args.txt; the installer
      # normally writes it, but create a sane default if it is missing so the
      # service does not crash-loop on a "could not find user_jvm_args.txt".
      if [ ! -f user_jvm_args.txt ]; then
        cat > user_jvm_args.txt <<UJVM
      # Xmx/Xms set here; managed by minecraft-forge-bootstrap.sh
      -Xms512M
      -Xmx${MEMORY_MB}M
      UJVM
      fi

      # --- Accept EULA ---
      echo "eula=true" > eula.txt

      # --- Write server.properties ---
      cat > server.properties <<PROPS
      #Minecraft server properties
      server-port=${SERVER_PORT}
      rcon.port=${RCON_PORT}
      rcon.password=${RCON_PASS}
      enable-rcon=true
      max-players=${MAX_PLAYERS}
      motd=${MOTD}
      difficulty=${DIFFICULTY}
      gamemode=${GAMEMODE}
      level-name=${LEVEL_NAME}
      online-mode=true
      white-list=false
      spawn-protection=16
      PROPS

      # --- Verify Forge produced its unix_args.txt (the launch contract) ---
      UNIX_ARGS="libraries/net/minecraftforge/forge/${MC_VERSION}-${FORGE_VERSION}/unix_args.txt"
      if [ ! -f "${UNIX_ARGS}" ]; then
        echo "ERROR: Forge did not produce ${UNIX_ARGS}; installer likely failed. Check MC_VERSION/FORGE_VERSION." >&2
        exit 1
      fi

      # --- Write launch wrapper script ---
      # JAVA_BIN, MC_VERSION and FORGE_VERSION are expanded NOW (at write time)
      # so the unit always launches with the Java 17 the Forge build needs and
      # the correct args file path. The Forge unix_args.txt already carries the
      # full module/classpath; user_jvm_args.txt carries the heap settings.
      cat > /opt/minecraft/forge-server/start.sh <<STARTSH
      #!/usr/bin/env bash
      set -euo pipefail
      cd /opt/minecraft/forge-server
      exec "${JAVA_BIN}" \
        @user_jvm_args.txt \
        @libraries/net/minecraftforge/forge/${MC_VERSION}-${FORGE_VERSION}/unix_args.txt \
        nogui
      STARTSH
      chmod +x /opt/minecraft/forge-server/start.sh

      # --- Fix ownership ---
      chown -R minecraft:minecraft /opt/minecraft

      # --- Create systemd service ---
      cat > /etc/systemd/system/minecraft-forge.service <<UNIT
      [Unit]
      Description=Minecraft Forge Server
      After=network.target
      Documentation=https://files.minecraftforge.net/

      [Service]
      Type=simple
      User=minecraft
      WorkingDirectory=/opt/minecraft/forge-server
      ExecStart=/bin/bash /opt/minecraft/forge-server/start.sh
      # No TTY under systemd: hold stdin open so the server console does not hit
      # EOF and shut down right after world generation.
      StandardInput=null
      Restart=on-failure
      RestartSec=10
      # 143 = clean SIGTERM shutdown (systemctl stop); treat as success so a
      # normal stop is not flagged as a failure.
      SuccessExitStatus=143
      StandardOutput=journal
      StandardError=journal
      # Give the JVM time to shut down cleanly
      TimeoutStopSec=60
      KillMode=control-group

      [Install]
      WantedBy=multi-user.target
      UNIT

      systemctl daemon-reload
      systemctl enable minecraft-forge
      systemctl start minecraft-forge

      # --- UFW firewall ---
      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp   comment 'SSH'
      ufw allow "${SERVER_PORT}/tcp" comment 'Minecraft Java Edition'
      ufw --force enable

      echo "UFW rules applied."

      # --- fail2ban (SSH protection) ---
      systemctl enable fail2ban
      systemctl start fail2ban

      # --- Unattended security upgrades ---
      cat > /etc/apt/apt.conf.d/20auto-upgrades <<AUTOUPGRADES
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
      AUTOUPGRADES

      systemctl enable unattended-upgrades
      systemctl start unattended-upgrades

      # --- Write credentials file ---
      SERVER_IP="$(curl -sf --max-time 10 https://api.ipify.org || hostname -I | awk '{print $1}')"

      cat > /root/minecraft-forge-credentials.txt <<CREDS
      ===== Minecraft Forge Server Credentials =====
      Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)

      Connection:
        Address : ${SERVER_IP}:${SERVER_PORT}
        Version : Minecraft Java Edition ${MC_VERSION} + Forge ${FORGE_VERSION}

      RCON:
        Host     : localhost:${RCON_PORT}
        Password : ${RCON_PASS}

      Server files : /opt/minecraft/forge-server/
      Service      : minecraft-forge  (systemctl status minecraft-forge)
      Logs         : journalctl -u minecraft-forge -f

      Operator setup (run after joining with your Java username):
        rcon-cli -H localhost -p ${RCON_PORT} -P "${RCON_PASS}" op YOUR_USERNAME
        (or: sudo -u minecraft screen)

      Mod installation:
        Place .jar files in /opt/minecraft/forge-server/mods/
        Then: systemctl restart minecraft-forge

      Bootstrap log : /var/log/minecraft-forge-bootstrap.log
      CREDS
      chmod 600 /root/minecraft-forge-credentials.txt

      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Minecraft Forge bootstrap complete."
      echo "Credentials written to /root/minecraft-forge-credentials.txt"

bootcmd:
  # Stop the base image's apt-daily / unattended-upgrades TIMERS from firing at
  # first boot so they don't hold the dpkg lock during cloud-init's package
  # stage. Masking timers only — NO process killing (that corrupts dpkg and a
  # -f match would kill this very command). cloud-init already waits for the lock.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl mask apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true; true" ]

runcmd:
  - [ bash, -lc, "/root/minecraft-forge-bootstrap.sh" ]

final_message: |
  Minecraft Forge server provisioning complete.
  Credentials and connection details: /root/minecraft-forge-credentials.txt
  Service status: systemctl status minecraft-forge
  Bootstrap log: /var/log/minecraft-forge-bootstrap.log
