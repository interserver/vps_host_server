#cloud-config
# =============================================================================
# Strapi "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Node.js LTS (NodeSource) + Strapi CMS + PostgreSQL 16
#        Nginx reverse proxy + UFW firewall + fail2ban + swap
#        unattended-upgrades + Let's Encrypt TLS (optional)
# -----------------------------------------------------------------------------
# EDIT the variables in /root/.strapi-bootstrap.env before first boot,
# OR leave defaults — secrets are auto-generated at boot time.
# =============================================================================

hostname: strapi
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep provisioner-injected SSH key + hostname working
# ----------------------------------------------------------------------------
users:
  - default
  - name: deploy
    groups: [sudo, www-data]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

# ----------------------------------------------------------------------------
# Packages — Node.js LTS itself is added via NodeSource repo in the script.
#            PostgreSQL 16 is added via the PostgreSQL Global Development Group
#            apt repo (PGDG) to guarantee 16+; fallback noble line used when
#            no 26.04 line is published yet.
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: false
packages:
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - ca-certificates
  - gnupg
  - lsb-release
  - git
  - htop
  - build-essential
  - python-is-python3
  - libpq-dev

# ----------------------------------------------------------------------------
# Swap (helps small instances survive build-time memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config files + secrets dropped to disk before bootstrap runs
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable variables ------------------------------------------
  - path: /root/.strapi-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE before first boot -----
      APP_DOMAIN="example.com"         # domain served by Nginx (no scheme)
      LE_EMAIL="admin@example.com"     # Let's Encrypt registration email
      ENABLE_TLS="true"                # false = skip certbot (DNS not ready yet)

      # Node.js version (NodeSource LTS; 22 = current LTS as of 2025-2026)
      NODE_MAJOR="22"

      # Strapi application directory
      APP_DIR="/var/www/strapi"

      # Strapi ports / runtime
      APP_PORT="1337"
      NODE_ENV="production"

      # PostgreSQL database settings (created by bootstrap)
      DB_NAME="strapi"
      DB_USER="strapi"
      DB_PASS="CHANGE_ME"             # auto-generated when left as CHANGE_ME

      # Strapi secret keys — all auto-generated when left as CHANGE_ME
      APP_KEYS="CHANGE_ME"            # comma-separated list of 4 secrets
      API_TOKEN_SALT="CHANGE_ME"
      ADMIN_JWT_SECRET="CHANGE_ME"
      TRANSFER_TOKEN_SALT="CHANGE_ME"
      JWT_SECRET="CHANGE_ME"

  # --- Nginx reverse-proxy vhost --------------------------------------------
  - path: /etc/nginx/sites-available/strapi.conf
    permissions: '0644'
    owner: root:root
    content: |
      upstream strapi_backend {
          server 127.0.0.1:APP_PORT_PLACEHOLDER;
          keepalive 32;
      }

      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          client_max_body_size 128m;

          # Pass requests to Strapi
          location / {
              proxy_pass         http://strapi_backend;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection 'upgrade';
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_cache_bypass $http_upgrade;
              proxy_read_timeout 120s;
              proxy_connect_timeout 30s;
          }

          location = /favicon.ico { log_not_found off; access_log off; }
          location = /robots.txt  { log_not_found off; access_log off; allow all; }
          location ~ /\.(?!well-known).* { deny all; }
      }

  # --- systemd unit for Strapi -----------------------------------------------
  - path: /etc/systemd/system/strapi.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Strapi CMS application server
      After=network.target postgresql.service
      Wants=network.target postgresql.service

      [Service]
      Type=simple
      User=www-data
      Group=www-data
      WorkingDirectory=/var/www/strapi
      EnvironmentFile=/etc/strapi-app.env
      ExecStart=/usr/bin/node /var/www/strapi/node_modules/.bin/strapi start
      Restart=on-failure
      RestartSec=10
      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=strapi
      # Allow enough time for Strapi to build admin on first start
      TimeoutStartSec=300

      [Install]
      WantedBy=multi-user.target

  # --- fail2ban jails -------------------------------------------------------
  - path: /etc/fail2ban/jail.d/strapi.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled = true
      maxretry = 4
      bantime = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades ----------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- main bootstrap script ------------------------------------------------
  - path: /root/strapi-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/strapi-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.strapi-bootstrap.env

      echo "=== Strapi bootstrap started: $(date) ==="

      # --- SIGPIPE-safe random secret generator (required under set -e + pipefail) ---
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # Generate secrets for any value still set to CHANGE_ME
      [ "$DB_PASS"            = "CHANGE_ME" ] && DB_PASS="$(rand)"
      [ "$API_TOKEN_SALT"     = "CHANGE_ME" ] && API_TOKEN_SALT="$(rand)"
      [ "$ADMIN_JWT_SECRET"   = "CHANGE_ME" ] && ADMIN_JWT_SECRET="$(rand)"
      [ "$TRANSFER_TOKEN_SALT" = "CHANGE_ME" ] && TRANSFER_TOKEN_SALT="$(rand)"
      [ "$JWT_SECRET"         = "CHANGE_ME" ] && JWT_SECRET="$(rand)"
      if [ "$APP_KEYS" = "CHANGE_ME" ]; then
        APP_KEYS="$(rand),$(rand),$(rand),$(rand)"
      fi

      # Prefer provisioner-supplied admin email (Strapi's admin account is
      # created in the web first-run wizard, so there is no password var here)
      [ -r /etc/vps-provision.env ] && . /etc/vps-provision.env
      [ -n "${VPS_ADMIN_EMAIL:-}" ] && LE_EMAIL="$VPS_ADMIN_EMAIL"

      # ------------------------------------------------------------------
      # 1. Node.js LTS via NodeSource
      # fallback: noble repo until 26.04 published
      # ------------------------------------------------------------------
      if ! command -v node >/dev/null 2>&1; then
        # NOTE: do NOT pipe the NodeSource script to `bash -`. Run from stdin,
        # its internal `configure_repo` -> apt/gpg steps consume the remaining
        # script bytes off stdin, truncating the source mid-token (observed:
        # `nfigure_repo: command not found`, exit 127). Download to a file and
        # execute with stdin detached so nothing can eat the script source.
        curl -fsSL "https://deb.nodesource.com/setup_${NODE_MAJOR}.x" -o /tmp/nodesource_setup.sh
        bash /tmp/nodesource_setup.sh </dev/null
        rm -f /tmp/nodesource_setup.sh
        apt-get install -y nodejs </dev/null
      else
        echo "node already installed: $(node --version)"
      fi
      echo "Node.js: $(node --version)  npm: $(npm --version)"

      # ------------------------------------------------------------------
      # 2. PostgreSQL 16 via PGDG repo
      # fallback: noble repo until 26.04 PGDG line published
      # ------------------------------------------------------------------
      if ! command -v psql >/dev/null 2>&1; then
        install -d /usr/share/postgresql-common/pgdg
        curl -fsSL 'https://www.postgresql.org/media/keys/ACCC4CF8.asc' \
          | gpg --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
        # fallback: noble repo until 26.04 published
        sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" \
          > /etc/apt/sources.list.d/pgdg.list'
        apt-get update -qq
        apt-get install -y postgresql-16
      else
        echo "PostgreSQL already installed: $(psql --version)"
      fi

      systemctl enable --now postgresql

      # ------------------------------------------------------------------
      # 3. Create database + user (idempotent)
      # ------------------------------------------------------------------
      sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" \
        | grep -q 1 || \
        sudo -u postgres psql -c "CREATE ROLE ${DB_USER} WITH LOGIN PASSWORD '${DB_PASS}';"

      sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" \
        | grep -q 1 || \
        sudo -u postgres psql -c "CREATE DATABASE ${DB_NAME} OWNER ${DB_USER};"

      # Update the password in case it changed
      sudo -u postgres psql -c "ALTER ROLE ${DB_USER} WITH PASSWORD '${DB_PASS}';"

      # ------------------------------------------------------------------
      # 4. Create Strapi project (idempotent)
      # ------------------------------------------------------------------
      mkdir -p "${APP_DIR}"
      chown -R www-data:www-data "${APP_DIR}"

      if [ ! -f "${APP_DIR}/package.json" ]; then
        # Create Strapi project as www-data, non-interactive
        sudo -u www-data -H bash -c "
          export HOME='${APP_DIR}'
          export npm_config_cache='${APP_DIR}/.npm-cache'
          cd '${APP_DIR}'
          npx create-strapi-app@latest . \
            --no-run \
            --dbclient=postgres \
            --dbhost=127.0.0.1 \
            --dbport=5432 \
            --dbname='${DB_NAME}' \
            --dbusername='${DB_USER}' \
            --dbpassword='${DB_PASS}' \
            --dbssl=false \
            --skip-cloud
        "
      else
        echo "Strapi project already exists, skipping create-strapi-app"
      fi

      # Ensure ownership is correct
      chown -R www-data:www-data "${APP_DIR}"

      # ------------------------------------------------------------------
      # 5. Write runtime environment file for systemd
      # ------------------------------------------------------------------
      cat > /etc/strapi-app.env <<ENVFILE
      HOST=127.0.0.1
      PORT=${APP_PORT}
      NODE_ENV=${NODE_ENV}
      DATABASE_CLIENT=postgres
      DATABASE_HOST=127.0.0.1
      DATABASE_PORT=5432
      DATABASE_NAME=${DB_NAME}
      DATABASE_USERNAME=${DB_USER}
      DATABASE_PASSWORD=${DB_PASS}
      DATABASE_SSL=false
      APP_KEYS=${APP_KEYS}
      API_TOKEN_SALT=${API_TOKEN_SALT}
      ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
      JWT_SECRET=${JWT_SECRET}
      ENVFILE
      chmod 600 /etc/strapi-app.env

      # ------------------------------------------------------------------
      # 6. Build Strapi admin panel (production build)
      # ------------------------------------------------------------------
      if [ ! -d "${APP_DIR}/build" ]; then
        sudo -u www-data -H bash -c "
          export HOME='${APP_DIR}'
          export npm_config_cache='${APP_DIR}/.npm-cache'
          cd '${APP_DIR}'
          export HOST=127.0.0.1
          export PORT=${APP_PORT}
          export NODE_ENV=${NODE_ENV}
          export DATABASE_CLIENT=postgres
          export DATABASE_HOST=127.0.0.1
          export DATABASE_PORT=5432
          export DATABASE_NAME=${DB_NAME}
          export DATABASE_USERNAME=${DB_USER}
          export DATABASE_PASSWORD=${DB_PASS}
          export DATABASE_SSL=false
          export APP_KEYS=${APP_KEYS}
          export API_TOKEN_SALT=${API_TOKEN_SALT}
          export ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
          export TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
          export JWT_SECRET=${JWT_SECRET}
          npm run build
        "
      else
        echo "Admin build already exists, skipping"
      fi

      # ------------------------------------------------------------------
      # 7. Configure Nginx
      # ------------------------------------------------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|" /etc/nginx/sites-available/strapi.conf
      sed -i "s|APP_PORT_PLACEHOLDER|${APP_PORT}|"     /etc/nginx/sites-available/strapi.conf
      ln -sf /etc/nginx/sites-available/strapi.conf /etc/nginx/sites-enabled/strapi.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t
      systemctl enable --now nginx
      systemctl reload nginx

      # ------------------------------------------------------------------
      # 8. Enable + start Strapi
      # ------------------------------------------------------------------
      systemctl daemon-reload
      systemctl enable strapi
      systemctl start strapi

      # ------------------------------------------------------------------
      # 9. Firewall
      # ------------------------------------------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # ------------------------------------------------------------------
      # 10. fail2ban
      # ------------------------------------------------------------------
      systemctl enable --now fail2ban

      # ------------------------------------------------------------------
      # 11. TLS via Let's Encrypt (non-fatal if DNS not pointed yet)
      # ------------------------------------------------------------------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect || \
          echo "WARN: certbot deferred (DNS not pointed yet). Re-run: certbot --nginx -d ${APP_DOMAIN}"
      fi

      # ------------------------------------------------------------------
      # 12. Write credentials summary
      # ------------------------------------------------------------------
      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"
      cat > /root/strapi-credentials.txt <<EOF
      ===== Strapi install complete: $(date) =====

      Admin panel:    ${PROTO}://${APP_DOMAIN}/admin
      API base URL:   ${PROTO}://${APP_DOMAIN}/api

      Database:
        Host:         127.0.0.1
        Name:         ${DB_NAME}
        User:         ${DB_USER}
        Password:     ${DB_PASS}

      Strapi secrets (stored in /etc/strapi-app.env):
        APP_KEYS:              ${APP_KEYS}
        API_TOKEN_SALT:        ${API_TOKEN_SALT}
        ADMIN_JWT_SECRET:      ${ADMIN_JWT_SECRET}
        TRANSFER_TOKEN_SALT:   ${TRANSFER_TOKEN_SALT}
        JWT_SECRET:            ${JWT_SECRET}

      App directory:  ${APP_DIR}
      Logs:           journalctl -u strapi -f
      Bootstrap log:  /var/log/strapi-bootstrap.log

      NOTE: Create your first admin user by visiting the admin panel URL above.
      EOF
      chmod 600 /root/strapi-credentials.txt

      echo "=== Strapi bootstrap finished: $(date). See /root/strapi-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all write_files are on disk
# ----------------------------------------------------------------------------
bootcmd:
  # Free the dpkg/apt lock before cloud-init's package stage: gracefully stop
  # (SIGTERM, NOT kill -9) unattended-upgrades + apt-daily so they release the
  # lock, and mask the timers/services so they don't restart this boot.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop unattended-upgrades.service apt-daily.service apt-daily-upgrade.service 2>/dev/null; systemctl mask apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/strapi-bootstrap.sh" ]

final_message: "Strapi bootstrap done after $UPTIME s. See /root/strapi-credentials.txt and /var/log/strapi-bootstrap.log"
