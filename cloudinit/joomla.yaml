#cloud-config
# =============================================================================
# Joomla "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Nginx + PHP-FPM + MariaDB + Joomla CLI + Certbot (Let's Encrypt)
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in `write_files` -> /root/.joomla-bootstrap.env before
# launching, OR inject them via your provisioner. Passwords are randomised
# per-boot when left as the defaults (CHANGE_ME).
# =============================================================================

hostname: joomla
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve default (provisioner injects customer SSH key + hostname)
# ----------------------------------------------------------------------------
users:
  - default
  - name: deploy
    groups: [sudo, www-data]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - nginx
  - mariadb-server
  - mariadb-client
  - php-fpm
  - php-mysql
  - php-curl
  - php-gd
  - php-mbstring
  - php-xml
  - php-intl
  - php-zip
  - php-bcmath
  - php-json
  - php-opcache
  - php-dom
  - php-simplexml
  - php-ldap
  - php-bz2
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - unzip
  - wget
  - git
  - htop

# ----------------------------------------------------------------------------
# Swap (helps small instances survive MariaDB + PHP memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable bootstrap variables ---------------------------------
  - path: /root/.joomla-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE -----
      APP_DOMAIN="example.com"          # primary domain (no scheme)
      APP_DOMAIN_WWW="www.example.com"  # www alias (set empty to skip)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (e.g. DNS not pointed yet)

      JOOMLA_SITE_NAME="My Joomla Site"
      JOOMLA_ADMIN_USER="admin"
      JOOMLA_ADMIN_EMAIL="admin@example.com"

      # DB creds — randomised on first boot if left as CHANGE_ME
      JOOMLA_DB_NAME="joomla"
      JOOMLA_DB_USER="joomla_user"
      JOOMLA_DB_PASS="CHANGE_ME"
      JOOMLA_ADMIN_PASS="CHANGE_ME"
      MYSQL_ROOT_PASS="CHANGE_ME"

      JOOMLA_PATH="/var/www/joomla"
      # Joomla release series to install (latest stable 5.x via official ZIP)
      JOOMLA_VERSION="5"

  # --- Nginx vhost (placeholder tokens replaced by bootstrap) ----------------
  - path: /etc/nginx/sites-available/joomla.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name SERVER_NAMES_PLACEHOLDER;

          root /var/www/joomla;
          index index.php index.html;

          client_max_body_size 64M;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          location / {
              try_files $uri $uri/ /index.php?$query_string;
          }

          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:PHP_FPM_SOCK_PLACEHOLDER;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              fastcgi_read_timeout 300;
          }

          # Joomla hardening — deny hidden files except .well-known
          location ~ /\. {
              deny all;
          }

          # Deny direct access to sensitive Joomla dirs
          location ~* /(logs|tmp|cache|administrator/cache)/ {
              deny all;
              return 403;
          }

          # Static assets — aggressive cache
          location ~* \.(css|js|png|jpe?g|gif|webp|svg|ico|woff2?|ttf|eot)$ {
              expires max;
              log_not_found off;
              access_log off;
          }

          location = /favicon.ico { log_not_found off; access_log off; }
          location = /robots.txt  { allow all; log_not_found off; access_log off; }
      }

  # --- fail2ban configuration ------------------------------------------------
  - path: /etc/fail2ban/jail.d/joomla.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades ------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- main bootstrap script -------------------------------------------------
  - path: /root/joomla-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/joomla-bootstrap.log) 2>&1
      source /root/.joomla-bootstrap.env

      echo "=== Joomla bootstrap started: $(date) ==="

      # --- SIGPIPE-safe random secret generator ---
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # --- randomise any CHANGE_ME passwords ---
      [ "$JOOMLA_DB_PASS"    = "CHANGE_ME" ] && JOOMLA_DB_PASS="$(rand)"
      [ "$JOOMLA_ADMIN_PASS" = "CHANGE_ME" ] && JOOMLA_ADMIN_PASS="$(rand)"
      [ "$MYSQL_ROOT_PASS"   = "CHANGE_ME" ] && MYSQL_ROOT_PASS="$(rand)"

      # --- detect PHP-FPM socket ---
      PHP_FPM_SOCK="$(find /run/php -name 'php*-fpm.sock' 2>/dev/null | head -n1 || true)"
      echo "PHP-FPM socket: ${PHP_FPM_SOCK}"

      # --- tune PHP for Joomla ---
      PHP_VER="$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || true)"
      FPM_INI="/etc/php/${PHP_VER}/fpm/php.ini"
      if [ -f "$FPM_INI" ]; then
        sed -ri 's/^;?upload_max_filesize.*/upload_max_filesize = 64M/'  "$FPM_INI"
        sed -ri 's/^;?post_max_size.*/post_max_size = 64M/'               "$FPM_INI"
        sed -ri 's/^;?memory_limit.*/memory_limit = 256M/'                "$FPM_INI"
        sed -ri 's/^;?max_execution_time.*/max_execution_time = 120/'     "$FPM_INI"
        sed -ri 's/^;?max_input_vars.*/max_input_vars = 3000/'            "$FPM_INI"
        sed -ri 's/^;?opcache.enable.*/opcache.enable=1/'                  "$FPM_INI"
        sed -ri 's/^;?opcache.memory_consumption.*/opcache.memory_consumption=128/' "$FPM_INI"
      fi
      systemctl restart "php${PHP_VER}-fpm" 2>/dev/null \
        || systemctl restart php-fpm 2>/dev/null \
        || true

      # --- secure MariaDB + create Joomla DB ---
      systemctl enable --now mariadb
      mysql --protocol=socket -uroot <<SQL
      ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_ROOT_PASS}';
      DELETE FROM mysql.user WHERE User='';
      DROP DATABASE IF EXISTS test;
      DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%';
      CREATE DATABASE IF NOT EXISTS \`${JOOMLA_DB_NAME}\`
        DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE USER IF NOT EXISTS '${JOOMLA_DB_USER}'@'localhost'
        IDENTIFIED BY '${JOOMLA_DB_PASS}';
      GRANT ALL PRIVILEGES ON \`${JOOMLA_DB_NAME}\`.* TO '${JOOMLA_DB_USER}'@'localhost';
      FLUSH PRIVILEGES;
      SQL

      # --- download and install Joomla via official CLI installer ---
      JOOMLA_TMP="/tmp/joomla-install"
      mkdir -p "$JOOMLA_TMP" "$JOOMLA_PATH"

      if [ ! -f "${JOOMLA_PATH}/administrator/index.php" ]; then
        # Fetch the latest Joomla 5.x release download URL from GitHub API
        JOOMLA_ZIP_URL="$(curl -fsSL \
          'https://api.github.com/repos/joomla/joomla-cms/releases/latest' \
          | grep '"browser_download_url"' \
          | grep -i 'Joomla_[0-9].*-Stable-Full_Package\.zip' \
          | head -n1 \
          | sed 's/.*"browser_download_url": "\(.*\)".*/\1/' || true)"

        # Fallback: direct download of a known stable Joomla 5 release
        if [ -z "$JOOMLA_ZIP_URL" ]; then
          JOOMLA_ZIP_URL="https://downloads.joomla.org/cms/joomla${JOOMLA_VERSION}/$(curl -fsSL \
            "https://downloads.joomla.org/cms/joomla${JOOMLA_VERSION}/" \
            | grep -oP 'href="[^"]*Full_Package\.zip[^"]*"' \
            | head -n1 \
            | sed 's/href="//;s/"//' || true)"
        fi

        # Hard fallback to a known good Joomla 5 URL pattern
        if [ -z "$JOOMLA_ZIP_URL" ]; then
          JOOMLA_ZIP_URL="https://github.com/joomla/joomla-cms/releases/download/5.3.1/Joomla_5.3.1-Stable-Full_Package.zip"
        fi

        echo "Downloading Joomla from: ${JOOMLA_ZIP_URL}"
        wget -q -O "${JOOMLA_TMP}/joomla.zip" "$JOOMLA_ZIP_URL"
        unzip -q "${JOOMLA_TMP}/joomla.zip" -d "$JOOMLA_PATH"
        rm -rf "$JOOMLA_TMP"
      fi

      # --- set file permissions ---
      chown -R www-data:www-data "$JOOMLA_PATH"
      find "$JOOMLA_PATH" -type d -exec chmod 755 {} \;
      find "$JOOMLA_PATH" -type f -exec chmod 644 {} \;

      # --- run Joomla CLI installation ---
      if [ -f "${JOOMLA_PATH}/installation/joomla.php" ]; then
        JOOMLA_CLI="${JOOMLA_PATH}/installation/joomla.php"
      elif [ -f "${JOOMLA_PATH}/cli/joomla.php" ]; then
        JOOMLA_CLI="${JOOMLA_PATH}/cli/joomla.php"
      else
        JOOMLA_CLI=""
      fi

      PROTO="http"; [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      if [ -n "$JOOMLA_CLI" ]; then
        sudo -u www-data php "$JOOMLA_CLI" site:install \
          --no-interaction \
          --site-name="${JOOMLA_SITE_NAME}" \
          --admin-user="${JOOMLA_ADMIN_USER}" \
          --admin-password="${JOOMLA_ADMIN_PASS}" \
          --admin-email="${JOOMLA_ADMIN_EMAIL}" \
          --db-type=mysqli \
          --db-host=localhost \
          --db-user="${JOOMLA_DB_USER}" \
          --db-pass="${JOOMLA_DB_PASS}" \
          --db-name="${JOOMLA_DB_NAME}" \
          --db-prefix=jos_ \
          2>/dev/null || true
      else
        # Fallback: write configuration.php directly (pre-5.x CLI path or zip layout without CLI)
        cat > "${JOOMLA_PATH}/configuration.php" <<PHPCONF
      <?php
      class JConfig {
        public \$sitename         = '${JOOMLA_SITE_NAME}';
        public \$debug            = false;
        public \$dbtype           = 'mysqli';
        public \$host             = 'localhost';
        public \$user             = '${JOOMLA_DB_USER}';
        public \$password         = '${JOOMLA_DB_PASS}';
        public \$db               = '${JOOMLA_DB_NAME}';
        public \$dbprefix         = 'jos_';
        public \$dbencryption     = 0;
        public \$force_ssl        = 0;
        public \$live_site        = '';
        public \$secret           = '$(rand)';
        public \$tmp_path         = '${JOOMLA_PATH}/tmp';
        public \$log_path         = '${JOOMLA_PATH}/logs';
        public \$mailfrom         = '${JOOMLA_ADMIN_EMAIL}';
        public \$fromname         = '${JOOMLA_SITE_NAME}';
        public \$sendmail         = '/usr/sbin/sendmail';
        public \$mailer           = 'mail';
        public \$error_reporting  = 'default';
        public \$helpurl          = 'https://help.joomla.org/proxy?keyref=Help{major}{minor}:{keyref}&lang={langcode}';
        public \$ftp_host         = '';
        public \$ftp_port         = '21';
        public \$ftp_user         = '';
        public \$ftp_pass         = '';
        public \$ftp_root         = '';
        public \$ftp_enable       = 0;
        public \$offset           = 'UTC';
        public \$cookie_domain    = '';
        public \$cookie_path      = '';
        public \$lifetime         = 15;
        public \$session_handler  = 'database';
        public \$shared_session   = '0';
        public \$MetaDesc         = '';
        public \$MetaKeys         = '';
        public \$MetaTitle        = '1';
        public \$MetaAuthor       = '1';
        public \$MetaVersion      = '0';
        public \$robots           = '';
        public \$sef              = '1';
        public \$sef_rewrite      = '1';
        public \$sef_suffix        = '0';
        public \$unicodeslugs     = '0';
        public \$feed_limit       = 10;
        public \$feed_email        = 'none';
        public \$caching           = 0;
        public \$cache_handler    = 'file';
        public \$cachetime        = 15;
        public \$cache_platformprefix = '0';
        public \$gzip             = 0;
      }
      PHPCONF
        chmod 640 "${JOOMLA_PATH}/configuration.php"
        echo "WARN: Joomla CLI not found — configuration.php written; complete setup via browser installer"
      fi

      # --- remove installation directory (security) ---
      rm -rf "${JOOMLA_PATH}/installation" 2>/dev/null || true

      # --- re-fix permissions after install ---
      chown -R www-data:www-data "$JOOMLA_PATH"
      chmod 640 "${JOOMLA_PATH}/configuration.php" 2>/dev/null || true

      # --- Nginx vhost ---
      SERVER_NAMES="$APP_DOMAIN"
      [ -n "$APP_DOMAIN_WWW" ] && SERVER_NAMES="$APP_DOMAIN $APP_DOMAIN_WWW"
      sed -i "s|SERVER_NAMES_PLACEHOLDER|${SERVER_NAMES}|g"  /etc/nginx/sites-available/joomla.conf
      sed -i "s|PHP_FPM_SOCK_PLACEHOLDER|${PHP_FPM_SOCK}|g"  /etc/nginx/sites-available/joomla.conf
      ln -sf /etc/nginx/sites-available/joomla.conf /etc/nginx/sites-enabled/joomla.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl reload nginx

      # --- firewall ---
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt ---
      if [ "$ENABLE_TLS" = "true" ]; then
        CERTBOT_DOMAINS="-d $APP_DOMAIN"
        [ -n "$APP_DOMAIN_WWW" ] && CERTBOT_DOMAINS="$CERTBOT_DOMAINS -d $APP_DOMAIN_WWW"
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" $CERTBOT_DOMAINS --redirect \
          || echo "WARN: certbot deferred — DNS not pointed yet. Re-run: certbot --nginx"
      fi

      # --- write operator credentials summary ---
      cat > /root/joomla-credentials.txt <<CREDS
      ===== Joomla install complete: $(date) =====
      URL:                  ${PROTO}://${APP_DOMAIN}
      Admin URL:            ${PROTO}://${APP_DOMAIN}/administrator/
      Admin username:       ${JOOMLA_ADMIN_USER}
      Admin password:       ${JOOMLA_ADMIN_PASS}
      Admin email:          ${JOOMLA_ADMIN_EMAIL}

      DB name:              ${JOOMLA_DB_NAME}
      DB user:              ${JOOMLA_DB_USER}
      DB password:          ${JOOMLA_DB_PASS}
      MySQL root password:  ${MYSQL_ROOT_PASS}

      Joomla path:          ${JOOMLA_PATH}
      Bootstrap log:        /var/log/joomla-bootstrap.log
      CREDS
      chmod 600 /root/joomla-credentials.txt

      echo "=== Bootstrap finished: $(date). Credentials: /root/joomla-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once write_files have been laid down
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/joomla-bootstrap.sh" ]

final_message: "Joomla bootstrap done after $UPTIME s. See /root/joomla-credentials.txt and /var/log/joomla-bootstrap.log"
