#cloud-config
# =============================================================================
# FauxPilot (16B model) — Ubuntu 26.04 cloud-init user-data
# Stack: NVIDIA driver + CUDA toolkit + FauxPilot (16B codegen model)
#        Triton Inference Server + FastAPI proxy + UFW + fail2ban + swap
# -----------------------------------------------------------------------------
# REQUIREMENTS:
#   - GPU instance with NVIDIA GPU (RTX 3090 / A100 / A40 or better)
#   - At least 50 GB disk (16B model weights alone ~35 GB)
#   - At least 24 GB VRAM (fp16); 48 GB+ recommended
#   - At least 16 GB RAM
# -----------------------------------------------------------------------------
# EDIT the operator variables in write_files -> /root/.fauxpilot-bootstrap.env
# before first boot, or supply them via your provisioner.
# =============================================================================

hostname: fauxpilot
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep 'default' so the provisioner can inject the customer SSH key
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Swap — 2 GB to survive build-time memory spikes during model download
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Base packages (NVIDIA driver and CUDA are installed in the bootstrap script
# via the official CUDA keyring, which is more reliable than apt packages)
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: false
packages:
  - curl
  - wget
  - git
  - ca-certificates
  - gnupg
  - lsb-release
  - build-essential
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - software-properties-common
  - apt-transport-https
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges
  - jq
  - pciutils
  - nvtop
  - htop
  - tmux
  - nginx
  - certbot
  - python3-certbot-nginx
  - docker.io
  - docker-compose

# ----------------------------------------------------------------------------
# Write operator-editable env vars + the bootstrap script
# ----------------------------------------------------------------------------
write_files:

  # --------------------------------------------------------------------------
  # (a) Operator-editable environment variables
  # --------------------------------------------------------------------------
  - path: /root/.fauxpilot-bootstrap.env
    permissions: '0600'
    content: |
      # -----------------------------------------------------------------------
      # FauxPilot bootstrap configuration — edit before first boot
      # -----------------------------------------------------------------------

      # Domain name pointing to this server (used for Certbot TLS).
      # Leave empty to skip TLS and use plain HTTP on port 5000.
      APP_DOMAIN=CHANGE_ME

      # Email for Let's Encrypt certificate notifications.
      LE_EMAIL=CHANGE_ME

      # Set to "true" to request a TLS certificate via Certbot.
      # Requires APP_DOMAIN to be resolvable before the script runs.
      ENABLE_TLS=true

      # FauxPilot model to load.
      # Valid options (match the Hugging Face repo identifier used in config):
      #   codegen-350M-mono  codegen-350M-multi
      #   codegen-2B-mono    codegen-2B-multi
      #   codegen-6B-mono    codegen-6B-multi
      #   codegen-16B-mono   codegen-16B-multi  <-- default (requires ~35 GB disk, >=24 GB VRAM)
      FAUXPILOT_MODEL=codegen-16B-mono

      # Port FauxPilot API listens on (the nginx reverse-proxy will front it).
      FAUXPILOT_PORT=5000

      # Organization/team name shown in the API response (cosmetic only).
      FAUXPILOT_ORG=InterServer

      # Number of GPUs to expose to Triton (default 1; increase for multi-GPU).
      NUM_GPUS=1

      # Admin API key — set CHANGE_ME to auto-generate a random secret.
      ADMIN_PASS=CHANGE_ME

  # --------------------------------------------------------------------------
  # (b) Bootstrap script
  # --------------------------------------------------------------------------
  - path: /root/fauxpilot-bootstrap.sh
    permissions: '0700'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/fauxpilot-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.fauxpilot-bootstrap.env

      # -----------------------------------------------------------------------
      # Helpers
      # -----------------------------------------------------------------------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      log() { echo "[fauxpilot-bootstrap] $(date -u '+%Y-%m-%dT%H:%M:%SZ') $*"; }

      log "=== FauxPilot (16B) bootstrap started ==="

      # -----------------------------------------------------------------------
      # Auto-generate secrets if still set to CHANGE_ME
      # -----------------------------------------------------------------------
      if [ "${ADMIN_PASS}" = "CHANGE_ME" ]; then
        ADMIN_PASS="$(rand)"
        sed -i "s/^ADMIN_PASS=CHANGE_ME/ADMIN_PASS=${ADMIN_PASS}/" /root/.fauxpilot-bootstrap.env
        log "Auto-generated ADMIN_PASS"
      fi

      # Prefer provisioner-supplied admin email + password
      [ -r /etc/vps-provision.env ] && . /etc/vps-provision.env
      [ -n "${VPS_ADMIN_PASS:-}" ] && ADMIN_PASS="$VPS_ADMIN_PASS"
      [ -n "${VPS_ADMIN_EMAIL:-}" ] && LE_EMAIL="$VPS_ADMIN_EMAIL"

      # -----------------------------------------------------------------------
      # Automatic security updates
      # -----------------------------------------------------------------------
      log "Configuring unattended-upgrades..."
      cat > /etc/apt/apt.conf.d/20auto-upgrades <<'AUTOUPGRADES'
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
      AUTOUPGRADES

      # -----------------------------------------------------------------------
      # NVIDIA driver + CUDA toolkit (official CUDA keyring)
      # Uses the 'ubuntu2404' / 'noble' CUDA repo because the 26.04 ('oracular'
      # / 'plucky') CUDA repository may not yet be published by NVIDIA.
      # fallback: noble repo until 26.04 published
      # -----------------------------------------------------------------------
      log "Installing NVIDIA driver and CUDA toolkit..."

      CUDA_KEYRING_DEB="cuda-keyring_1.1-1_all.deb"
      CUDA_KEYRING_URL="https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/${CUDA_KEYRING_DEB}"

      if ! dpkg -l cuda-keyring &>/dev/null; then
        wget -q -O "/tmp/${CUDA_KEYRING_DEB}" "${CUDA_KEYRING_URL}"
        dpkg -i "/tmp/${CUDA_KEYRING_DEB}"
        rm -f "/tmp/${CUDA_KEYRING_DEB}"
      fi

      apt-get update -qq

      # Install NVIDIA open driver + CUDA toolkit
      # nvidia-open is the preferred open-kernel-module driver for Ampere+ GPUs
      apt-get install -y --no-install-recommends \
        nvidia-open \
        cuda-toolkit-12-8 \
        libcudnn9-cuda-12 \
        libcudnn9-dev-cuda-12

      # Persist CUDA environment for all users
      if [ ! -f /etc/profile.d/cuda.sh ]; then
        cat > /etc/profile.d/cuda.sh <<'CUDAPROFILE'
      export PATH="/usr/local/cuda/bin:${PATH}"
      export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"
      CUDAPROFILE
        chmod 644 /etc/profile.d/cuda.sh
      fi
      export PATH="/usr/local/cuda/bin:${PATH}"
      export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"

      # -----------------------------------------------------------------------
      # Docker daemon — enable + add nvidia runtime
      # -----------------------------------------------------------------------
      log "Configuring Docker with NVIDIA runtime..."

      systemctl enable --now docker

      # NVIDIA Container Toolkit (for GPU pass-through into Docker containers)
      # fallback: noble repo until 26.04 published
      if ! dpkg -l nvidia-container-toolkit &>/dev/null; then
        NVIDIA_CT_KEYRING_URL="https://nvidia.github.io/libnvidia-container/gpgkey"
        NVIDIA_CT_LIST_URL="https://nvidia.github.io/libnvidia-container/stable/ubuntu22.04/libnvidia-container.list"

        curl -fsSL "${NVIDIA_CT_KEYRING_URL}" | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -fsSL "${NVIDIA_CT_LIST_URL}" \
          | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
          > /etc/apt/sources.list.d/nvidia-container-toolkit.list
        # fallback: noble repo until 26.04 published

        apt-get update -qq
        apt-get install -y --no-install-recommends nvidia-container-toolkit
      fi

      nvidia-ctk runtime configure --runtime=docker
      systemctl restart docker

      # -----------------------------------------------------------------------
      # Clone FauxPilot
      # -----------------------------------------------------------------------
      log "Cloning FauxPilot repository..."

      FAUXPILOT_DIR="/opt/fauxpilot"

      if [ -d "${FAUXPILOT_DIR}/.git" ]; then
        git -C "${FAUXPILOT_DIR}" pull --ff-only || true
      else
        # The dir may already exist (a prior partial run) without a .git;
        # git clone aborts on a non-empty dir, so clear it first.
        rm -rf "${FAUXPILOT_DIR}"
        git clone --depth 1 https://github.com/fauxpilot/fauxpilot.git "${FAUXPILOT_DIR}"
      fi

      cd "${FAUXPILOT_DIR}"

      # -----------------------------------------------------------------------
      # Build FauxPilot configuration
      # -----------------------------------------------------------------------
      log "Writing FauxPilot .env configuration..."

      # Map our model name to FauxPilot's MODEL/SIZE variables
      case "${FAUXPILOT_MODEL}" in
        codegen-350M-mono)  MODEL="codegen"; SIZE="350M"; MONO=1 ;;
        codegen-350M-multi) MODEL="codegen"; SIZE="350M"; MONO=0 ;;
        codegen-2B-mono)    MODEL="codegen"; SIZE="2B";   MONO=1 ;;
        codegen-2B-multi)   MODEL="codegen"; SIZE="2B";   MONO=0 ;;
        codegen-6B-mono)    MODEL="codegen"; SIZE="6B";   MONO=1 ;;
        codegen-6B-multi)   MODEL="codegen"; SIZE="6B";   MONO=0 ;;
        codegen-16B-mono)   MODEL="codegen"; SIZE="16B";  MONO=1 ;;
        codegen-16B-multi)  MODEL="codegen"; SIZE="16B";  MONO=0 ;;
        *)
          log "WARNING: Unknown model '${FAUXPILOT_MODEL}', defaulting to codegen-16B-mono"
          MODEL="codegen"; SIZE="16B"; MONO=1
          ;;
      esac

      MONO_FLAG=""
      if [ "${MONO}" = "1" ]; then
        MONO_FLAG="mono"
      else
        MONO_FLAG="multi"
      fi

      cat > "${FAUXPILOT_DIR}/.env" <<FPENV
      NUM_GPUS=${NUM_GPUS}
      FAUXPILOT_PORT=${FAUXPILOT_PORT}
      ORGANIZATION=${FAUXPILOT_ORG}
      MODEL=${MODEL}
      MODEL_SIZE=${SIZE}
      MONO=${MONO}
      CONVERSION_MODE=${MONO_FLAG}
      ADMIN_SECRET=${ADMIN_PASS}
      FPENV

      chmod 600 "${FAUXPILOT_DIR}/.env"
      log "FauxPilot .env written"

      # -----------------------------------------------------------------------
      # Download and convert the model weights
      # This step can take 30-60+ minutes depending on bandwidth and GPU.
      # FauxPilot provides a setup.sh that pulls weights from Hugging Face
      # and converts them to FasterTransformer format.
      # -----------------------------------------------------------------------
      log "Running FauxPilot model setup (downloading ${FAUXPILOT_MODEL} weights, this may take a long time)..."

      cd "${FAUXPILOT_DIR}"

      # setup.sh is interactive; provide answers via stdin
      # Answers: model type (1=codegen), model size, num GPUs, model dir
      MODEL_DIR="${FAUXPILOT_DIR}/models"
      mkdir -p "${MODEL_DIR}"

      # FauxPilot setup.sh expects interactive prompts; we patch the env so it
      # runs non-interactively by using the .env variables it reads directly.
      # The newer versions of fauxpilot use docker-compose directly.
      # Pull all required Docker images first.
      log "Pulling FauxPilot Docker images (may take 15-30 minutes)..."
      docker compose pull || docker-compose pull || true

      # -----------------------------------------------------------------------
      # Run the conversion/download script non-interactively
      # -----------------------------------------------------------------------
      if [ -f "${FAUXPILOT_DIR}/setup.sh" ]; then
        log "Running setup.sh (non-interactive) to download model weights..."
        # Provide expected interactive input automatically
        MONO_INPUT="${MONO}"
        SIZE_INPUT="${SIZE}"

        # setup.sh prompts: 1) model type index, 2) model size, 3) num GPUs, 4) model dir
        # codegen is option 1 in the list
        printf "1\n${SIZE_INPUT}\n${NUM_GPUS}\n${MODEL_DIR}\n" | bash "${FAUXPILOT_DIR}/setup.sh" || \
          log "WARNING: setup.sh returned non-zero — check /var/log/fauxpilot-bootstrap.log for details"
      else
        log "WARNING: setup.sh not found — model weights must be downloaded manually. See /opt/fauxpilot/README.md"
      fi

      # -----------------------------------------------------------------------
      # Create systemd service to manage the FauxPilot Docker Compose stack
      # -----------------------------------------------------------------------
      log "Creating fauxpilot systemd service..."

      # Detect docker-compose binary
      if command -v docker-compose &>/dev/null; then
        DC_BIN="docker-compose"
      else
        DC_BIN="docker compose"
      fi

      cat > /etc/systemd/system/fauxpilot.service <<SVCEOF
      [Unit]
      Description=FauxPilot AI Code Completion Service
      Documentation=https://github.com/fauxpilot/fauxpilot
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=forking
      WorkingDirectory=/opt/fauxpilot
      EnvironmentFile=/opt/fauxpilot/.env
      ExecStart=${DC_BIN} up -d --remove-orphans
      ExecStop=${DC_BIN} down
      ExecReload=${DC_BIN} restart
      RemainAfterExit=yes
      Restart=on-failure
      RestartSec=30
      TimeoutStartSec=600
      TimeoutStopSec=120

      [Install]
      WantedBy=multi-user.target
      SVCEOF

      systemctl daemon-reload
      systemctl enable fauxpilot

      # Start only if model weights are present
      if [ -d "${MODEL_DIR}" ] && [ "$(ls -A "${MODEL_DIR}" 2>/dev/null)" ]; then
        log "Starting fauxpilot service..."
        systemctl start fauxpilot || log "WARNING: fauxpilot service start failed — GPU driver reboot may be required"
      else
        log "WARNING: Model directory empty — service will start after model download. Run: systemctl start fauxpilot"
      fi

      # -----------------------------------------------------------------------
      # Nginx reverse proxy
      # -----------------------------------------------------------------------
      log "Configuring nginx reverse proxy..."

      NGINX_SITE="/etc/nginx/sites-available/fauxpilot"

      cat > "${NGINX_SITE}" <<NGINXCONF
      server {
          listen 80;
          listen [::]:80;
          server_name ${APP_DOMAIN:-_};

          # Health check endpoint
          location /healthz {
              return 200 'ok';
              add_header Content-Type text/plain;
          }

          location / {
              proxy_pass http://127.0.0.1:${FAUXPILOT_PORT};
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
              proxy_read_timeout 300;
              proxy_connect_timeout 60;
              proxy_send_timeout 300;
              client_max_body_size 32m;
          }
      }
      NGINXCONF

      ln -sf "${NGINX_SITE}" /etc/nginx/sites-enabled/fauxpilot
      rm -f /etc/nginx/sites-enabled/default

      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # -----------------------------------------------------------------------
      # Certbot TLS
      # -----------------------------------------------------------------------
      if [ "${ENABLE_TLS}" = "true" ] && [ -n "${APP_DOMAIN:-}" ] && [ "${APP_DOMAIN}" != "CHANGE_ME" ]; then
        log "Requesting Let's Encrypt certificate for ${APP_DOMAIN}..."
        certbot --nginx \
          --non-interactive \
          --agree-tos \
          --email "${LE_EMAIL}" \
          --domains "${APP_DOMAIN}" \
          --redirect \
          || echo "WARN: certbot deferred — ensure DNS points to this server, then run certbot manually"
      else
        log "Skipping Certbot (ENABLE_TLS=${ENABLE_TLS:-false} or APP_DOMAIN not set)"
      fi

      # -----------------------------------------------------------------------
      # Firewall (UFW)
      # -----------------------------------------------------------------------
      log "Configuring UFW firewall..."

      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp    comment 'SSH'
      ufw allow 80/tcp    comment 'HTTP'
      ufw allow 443/tcp   comment 'HTTPS'
      # FauxPilot port — only from localhost (nginx proxies externally)
      ufw allow from 127.0.0.1 to any port "${FAUXPILOT_PORT}" proto tcp comment 'FauxPilot API (local)'
      ufw --force enable

      # -----------------------------------------------------------------------
      # fail2ban
      # -----------------------------------------------------------------------
      log "Configuring fail2ban..."

      cat > /etc/fail2ban/jail.d/fauxpilot.conf <<'F2BJAIL'
      [sshd]
      enabled  = true
      port     = ssh
      maxretry = 5
      bantime  = 3600
      findtime = 600

      [nginx-http-auth]
      enabled  = true
      port     = http,https
      maxretry = 5
      bantime  = 3600
      findtime = 600
      F2BJAIL

      systemctl enable --now fail2ban

      # -----------------------------------------------------------------------
      # Write credentials file
      # -----------------------------------------------------------------------
      log "Writing credentials file..."

      PROTO="http"
      BASE_URL="${APP_DOMAIN:-$(hostname -I | awk '{print $1}')}"
      if [ "${ENABLE_TLS}" = "true" ] && [ -n "${APP_DOMAIN:-}" ] && [ "${APP_DOMAIN}" != "CHANGE_ME" ]; then
        PROTO="https"
      fi

      cat > /root/fauxpilot-credentials.txt <<CREDS
      ============================================================
      FauxPilot (16B) — Access Credentials
      Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
      ============================================================

      API Endpoint (OpenAI-compatible):
        ${PROTO}://${BASE_URL}/v1/engines/codegen/completions
        ${PROTO}://${BASE_URL}/v1/completions

      Admin API Key:
        ${ADMIN_PASS}

      Model loaded:
        ${FAUXPILOT_MODEL}

      GPUs configured:
        ${NUM_GPUS}

      Service management:
        systemctl status fauxpilot
        systemctl restart fauxpilot
        docker compose -f /opt/fauxpilot/docker-compose.yml logs -f

      Logs:
        /var/log/fauxpilot-bootstrap.log
        journalctl -u fauxpilot -f

      VSCode / vim-copilot plugin config:
        Set "github.copilot.advanced.debug.overrideProxyUrl" to:
          ${PROTO}://${BASE_URL}
        Or use the fauxpilot VSCode extension and point it to the above URL.

      REQUIREMENTS REMINDER:
        - GPU with >=24 GB VRAM (fp16) required for codegen-16B
        - >=50 GB disk for model weights
        - Reboot after first boot to activate the NVIDIA driver if needed
        - If service did not start, check: nvidia-smi && systemctl start fauxpilot
      ============================================================
      CREDS

      chmod 600 /root/fauxpilot-credentials.txt
      log "Credentials written to /root/fauxpilot-credentials.txt"

      log "=== FauxPilot (16B) bootstrap complete ==="
      log "NOTE: A reboot may be required to activate the NVIDIA kernel module."
      log "      After reboot, verify with: nvidia-smi"
      log "      Then start the service:    systemctl start fauxpilot"

# ----------------------------------------------------------------------------
# Run the bootstrap script once at first boot
# ----------------------------------------------------------------------------
bootcmd:
  # Free the dpkg/apt lock before cloud-init's package stage: gracefully stop
  # (SIGTERM, NOT kill -9) unattended-upgrades + apt-daily so they release the
  # lock, and mask the timers/services so they don't restart this boot.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop unattended-upgrades.service apt-daily.service apt-daily-upgrade.service 2>/dev/null; systemctl mask apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/fauxpilot-bootstrap.sh" ]

# ----------------------------------------------------------------------------
# Final message shown in cloud-init output
# ----------------------------------------------------------------------------
final_message: |
  ============================================================
  FauxPilot (16B) bootstrap has finished.
  Elapsed time: $UPTIME seconds since boot.

  IMPORTANT — GPU activation:
    A reboot is recommended to fully activate the NVIDIA driver.
    After reboot: nvidia-smi
    Then start:   systemctl start fauxpilot

  Credentials and API endpoint:
    cat /root/fauxpilot-credentials.txt

  Bootstrap log:
    /var/log/fauxpilot-bootstrap.log

  REQUIREMENTS:
    GPU with >=24 GB VRAM, >=50 GB disk, >=16 GB RAM
  ============================================================
