#cloud-config
hostname: statusnook
manage_etc_hosts: true
timezone: UTC
package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - ca-certificates
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges

swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

users:
  - default

write_files:
  - path: /root/.statusnook-bootstrap.env
    permissions: '0600'
    content: |
      # Operator-editable variables — change before first boot or re-run bootstrap
      APP_DOMAIN=CHANGE_ME
      LE_EMAIL=CHANGE_ME
      ENABLE_TLS=false
      # Initial admin password — set CHANGE_ME to auto-generate a random one
      ADMIN_PASS=CHANGE_ME
      # Statusnook listen port (used when not running standalone TLS mode)
      # Default standalone (ports 80/443 with built-in TLS) — set STANDALONE=true
      # When STANDALONE=false, Statusnook binds to STATUSNOOK_PORT and nginx proxies
      STANDALONE=true
      STATUSNOOK_PORT=8000

  - path: /root/statusnook-bootstrap.sh
    permissions: '0700'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/statusnook-bootstrap.log) 2>&1
      source /root/.statusnook-bootstrap.env

      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting Statusnook bootstrap..."

      # ── Random secret helper (SIGPIPE-safe under set -e + pipefail) ──────────
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # ── Resolve admin password ────────────────────────────────────────────────
      if [ "${ADMIN_PASS}" = "CHANGE_ME" ] || [ -z "${ADMIN_PASS}" ]; then
        ADMIN_PASS="$(rand)"
        echo "Generated ADMIN_PASS=${ADMIN_PASS}"
      fi

      # ── Detect architecture ───────────────────────────────────────────────────
      ARCH="$(uname -m)"
      case "${ARCH}" in
        x86_64)  SN_ARCH="amd64" ;;
        aarch64) SN_ARCH="arm64" ;;
        *)        echo "ERROR: unsupported arch ${ARCH}"; exit 1 ;;
      esac

      # ── Fetch latest Statusnook version from GitHub API ───────────────────────
      LATEST_TAG="$(curl -fsSL --max-time 30 \
        https://api.github.com/repos/goksan/statusnook/releases/latest \
        | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")"
      # Strip leading 'v' to build the filename (e.g. v0.3.0 -> 0.3.0)
      LATEST_VER="${LATEST_TAG#v}"
      echo "Statusnook version: ${LATEST_TAG} (${SN_ARCH})"

      # ── Create system user ────────────────────────────────────────────────────
      id statusnook &>/dev/null || useradd --system --create-home --home-dir /home/statusnook \
        --shell /usr/sbin/nologin statusnook
      mkdir -p /home/statusnook
      chown statusnook:statusnook /home/statusnook

      # ── Download binary ───────────────────────────────────────────────────────
      BINARY_URL="https://github.com/goksan/statusnook/releases/download/${LATEST_TAG}/statusnook_linux_${SN_ARCH}_${LATEST_TAG}"
      BINARY_DEST="/home/statusnook/statusnook"

      echo "Downloading ${BINARY_URL} ..."
      curl -fsSL --max-time 120 "${BINARY_URL}" -o "${BINARY_DEST}"
      chmod +x "${BINARY_DEST}"
      chown statusnook:statusnook "${BINARY_DEST}"

      # ── Determine launch mode ─────────────────────────────────────────────────
      # STANDALONE=true  → Statusnook manages its own TLS on ports 80/443
      # STANDALONE=false → Statusnook binds to STATUSNOOK_PORT; nginx proxies
      if [ "${STANDALONE}" = "true" ]; then
        EXEC_START="${BINARY_DEST}"
        BIND_CAP="AmbientCapabilities=CAP_NET_BIND_SERVICE"
      else
        EXEC_START="${BINARY_DEST} --port ${STATUSNOOK_PORT}"
        BIND_CAP=""
      fi

      # ── systemd service ───────────────────────────────────────────────────────
      cat > /etc/systemd/system/statusnook.service <<SYSUNIT
      [Unit]
      Description=Statusnook — Status Page & Endpoint Monitor
      Documentation=https://github.com/goksan/statusnook
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      Restart=always
      RestartSec=5
      User=statusnook
      WorkingDirectory=/home/statusnook
      ExecStart=${EXEC_START}
      ${BIND_CAP}

      [Install]
      WantedBy=multi-user.target
      SYSUNIT

      # ── unattended-upgrades ───────────────────────────────────────────────────
      cat > /etc/apt/apt.conf.d/20auto-upgrades <<AUTOUPG
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
      AUTOUPG

      # ── UFW firewall ──────────────────────────────────────────────────────────
      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow ssh
      ufw allow 80/tcp
      ufw allow 443/tcp
      if [ "${STANDALONE}" != "true" ]; then
        ufw allow "${STATUSNOOK_PORT}/tcp"
      fi
      ufw --force enable

      # ── fail2ban ──────────────────────────────────────────────────────────────
      cat > /etc/fail2ban/jail.d/statusnook.conf <<F2B
      [sshd]
      enabled  = true
      maxretry = 5
      bantime  = 3600
      findtime = 600
      F2B

      # ── Enable & start services ───────────────────────────────────────────────
      systemctl daemon-reload
      systemctl enable statusnook
      systemctl start  statusnook
      systemctl enable fail2ban
      systemctl restart fail2ban

      # ── Wait briefly for Statusnook to initialize, then set admin password ────
      echo "Waiting for Statusnook to start..."
      sleep 8

      # Set the admin password via Statusnook CLI if the binary supports it,
      # otherwise note it in credentials for the user to set via web UI.
      # Statusnook v0.3.x sets admin credentials through the first-run web wizard;
      # we store the desired password in credentials.txt for the operator.
      echo "NOTE: Admin password must be set via the Statusnook web UI on first run."
      echo "      Desired password recorded in /root/statusnook-credentials.txt"

      # ── Write credentials file ────────────────────────────────────────────────
      CRED_FILE="/root/statusnook-credentials.txt"
      if [ "${STANDALONE}" = "true" ]; then
        ACCESS_URL="https://${APP_DOMAIN:-<server-ip>}"
        SETUP_NOTE="Statusnook manages TLS internally on ports 80 and 443."
      else
        ACCESS_URL="http://${APP_DOMAIN:-<server-ip>}:${STATUSNOOK_PORT}"
        SETUP_NOTE="Statusnook listens on port ${STATUSNOOK_PORT} (proxy mode)."
      fi

      cat > "${CRED_FILE}" <<CREDS
      ============================================================
       Statusnook — Access Credentials
       Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)
      ============================================================

      URL            : ${ACCESS_URL}
      Admin Username : admin
      Admin Password : ${ADMIN_PASS}
                       (set this when completing the web UI first-run wizard)

      ${SETUP_NOTE}

      Data directory : /home/statusnook/
      Binary         : /home/statusnook/statusnook
      Service        : statusnook.service

      ============================================================
      First-run steps:
        1. Navigate to ${ACCESS_URL} in your browser.
        2. Complete the setup wizard — use the password above.
        3. To enable TLS in standalone mode, Statusnook handles it automatically
           once your domain DNS points to this server.
        4. To switch to nginx-proxy mode:
             Edit /root/.statusnook-bootstrap.env → set STANDALONE=false
             Re-run: bash /root/statusnook-bootstrap.sh
      ============================================================
      CREDS
      chmod 600 "${CRED_FILE}"

      echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Statusnook bootstrap complete. See ${CRED_FILE}"

runcmd:
  - [ bash, -lc, "/root/statusnook-bootstrap.sh" ]

final_message: |
  Statusnook VPS bootstrap finished.
  Credentials and setup instructions are in /root/statusnook-credentials.txt (chmod 600).
  View service logs: journalctl -u statusnook -f
  Bootstrap log:    /var/log/statusnook-bootstrap.log
  Navigate to https://<server-ip> or your configured domain to complete setup.
