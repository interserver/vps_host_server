#cloud-config
# =============================================================================
# WooCommerce "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Nginx + PHP-FPM + MariaDB + WP-CLI + WooCommerce + Certbot (Let's Encrypt)
#        UFW firewall + fail2ban + swap + unattended-upgrades + Redis object cache
# -----------------------------------------------------------------------------
# EDIT the variables in `write_files` -> /root/.woocommerce-bootstrap.env before
# launching, OR inject them via your provisioner. Passwords are randomised
# per-boot when left as the defaults (CHANGE_ME).
# =============================================================================

hostname: woocommerce
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve default (provisioner injects customer SSH key + hostname)
# ----------------------------------------------------------------------------
users:
  - default
  - name: deploy
    groups: [sudo, www-data]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - nginx
  - mariadb-server
  - mariadb-client
  - php-fpm
  - php-mysql
  - php-curl
  - php-gd
  - php-mbstring
  - php-xml
  - php-xmlrpc
  - php-soap
  - php-intl
  - php-zip
  - php-imagick
  - php-bcmath
  - php-redis
  - php-opcache
  - redis-server
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - unzip
  - git
  - htop

# ----------------------------------------------------------------------------
# Swap (helps small instances survive MariaDB + PHP memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable bootstrap variables ---------------------------------
  - path: /root/.woocommerce-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE -----
      APP_DOMAIN="example.com"          # primary domain (no scheme)
      APP_DOMAIN_WWW="www.example.com"  # www alias (set empty to skip)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (DNS not pointed yet)

      WP_TITLE="My WooCommerce Store"
      WP_ADMIN_USER="storeadmin"
      WP_ADMIN_EMAIL="admin@example.com"
      ADMIN_PASS="CHANGE_ME"

      # DB creds — randomised on first boot if left as CHANGE_ME
      WP_DB_NAME="woocommerce"
      WP_DB_USER="woo_user"
      WP_DB_PASS="CHANGE_ME"
      MYSQL_ROOT_PASS="CHANGE_ME"

      WP_PATH="/var/www/woocommerce"

  # --- Nginx vhost (placeholder tokens replaced by bootstrap) ----------------
  - path: /etc/nginx/sites-available/woocommerce.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name SERVER_NAMES_PLACEHOLDER;

          root /var/www/woocommerce;
          index index.php index.html;

          client_max_body_size 64M;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          location / {
              try_files $uri $uri/ /index.php?$args;
          }

          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:PHP_FPM_SOCK_PLACEHOLDER;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              fastcgi_read_timeout 300;
          }

          # WordPress / WooCommerce hardening
          location = /favicon.ico { log_not_found off; access_log off; }
          location = /robots.txt  { log_not_found off; access_log off; allow all; }
          location ~ /\.(?!well-known).* { deny all; }
          location ~* /(?:uploads|files)/.*\.php$ { deny all; }
          location = /xmlrpc.php { deny all; access_log off; log_not_found off; }

          # Static assets — aggressive cache
          location ~* \.(?:css|js|woff2?|ttf|svg|gif|jpe?g|png|webp|ico)$ {
              expires max;
              log_not_found off;
              access_log off;
          }
      }

  # --- fail2ban configuration ------------------------------------------------
  - path: /etc/fail2ban/jail.d/woocommerce.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades ------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- main bootstrap script -------------------------------------------------
  - path: /root/woocommerce-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/woocommerce-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.woocommerce-bootstrap.env

      echo "=== WooCommerce bootstrap started: $(date) ==="

      # --- SIGPIPE-safe random secret generator ---
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # --- randomise any CHANGE_ME passwords ---
      [ "$WP_DB_PASS"      = "CHANGE_ME" ] && WP_DB_PASS="$(rand)"
      [ "$ADMIN_PASS"      = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"
      [ "$MYSQL_ROOT_PASS" = "CHANGE_ME" ] && MYSQL_ROOT_PASS="$(rand)"

      # --- detect PHP version + FPM socket ---
      PHP_VER="$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || true)"
      PHP_FPM_SOCK="$(find /run/php -name 'php*-fpm.sock' 2>/dev/null | head -n1 || true)"
      echo "PHP version: ${PHP_VER}  |  FPM socket: ${PHP_FPM_SOCK}"

      # --- tune PHP for WooCommerce ---
      FPM_INI="/etc/php/${PHP_VER}/fpm/php.ini"
      if [ -f "$FPM_INI" ]; then
        sed -ri 's/^;?upload_max_filesize.*/upload_max_filesize = 64M/'  "$FPM_INI"
        sed -ri 's/^;?post_max_size.*/post_max_size = 64M/'              "$FPM_INI"
        sed -ri 's/^;?memory_limit.*/memory_limit = 256M/'               "$FPM_INI"
        sed -ri 's/^;?max_execution_time.*/max_execution_time = 120/'    "$FPM_INI"
        sed -ri 's/^;?max_input_vars.*/max_input_vars = 5000/'           "$FPM_INI"
        sed -ri 's/^;?opcache.enable.*/opcache.enable=1/'                "$FPM_INI"
        sed -ri 's/^;?opcache.memory_consumption.*/opcache.memory_consumption=128/' "$FPM_INI"
      fi
      # --- enable + (re)start PHP-FPM (Ubuntu 24.04 = php8.3-fpm; no 'php-fpm' alias) ---
      FPM_SVC="php${PHP_VER}-fpm"
      systemctl list-unit-files "${FPM_SVC}.service" >/dev/null 2>&1 \
        || FPM_SVC="$(systemctl list-unit-files --no-legend 'php*-fpm.service' 2>/dev/null | awk '{print $1}' | head -n1)"
      [ -n "$FPM_SVC" ] && systemctl enable --now "$FPM_SVC" 2>/dev/null || true
      [ -n "$FPM_SVC" ] && systemctl restart "$FPM_SVC" 2>/dev/null || true

      # --- secure MariaDB + create WooCommerce DB ---
      systemctl enable --now mariadb
      mysql --protocol=socket -uroot <<SQL
      ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_ROOT_PASS}';
      DELETE FROM mysql.user WHERE User='';
      DROP DATABASE IF EXISTS test;
      DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%';
      CREATE DATABASE IF NOT EXISTS \`${WP_DB_NAME}\`
        DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE USER IF NOT EXISTS '${WP_DB_USER}'@'localhost'
        IDENTIFIED BY '${WP_DB_PASS}';
      GRANT ALL PRIVILEGES ON \`${WP_DB_NAME}\`.* TO '${WP_DB_USER}'@'localhost';
      FLUSH PRIVILEGES;
      SQL

      # --- install WP-CLI ---
      if ! command -v wp >/dev/null 2>&1; then
        curl -fsSL https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar \
          -o /usr/local/bin/wp
        chmod +x /usr/local/bin/wp
      fi

      # --- download + configure WordPress ---
      mkdir -p "$WP_PATH"
      chown -R www-data:www-data "$WP_PATH"

      wp --allow-root core download --path="$WP_PATH" --force

      wp --allow-root config create --path="$WP_PATH" \
        --dbname="$WP_DB_NAME" \
        --dbuser="$WP_DB_USER" \
        --dbpass="$WP_DB_PASS" \
        --dbhost="localhost" \
        --dbcharset="utf8mb4" \
        --skip-check

      # hardening + redis object-cache constants
      wp --allow-root config set WP_AUTO_UPDATE_CORE minor  --path="$WP_PATH"
      wp --allow-root config set DISALLOW_FILE_EDIT true --raw --path="$WP_PATH"
      wp --allow-root config set WP_REDIS_HOST 127.0.0.1    --path="$WP_PATH"
      wp --allow-root config set FS_METHOD direct            --path="$WP_PATH"

      PROTO="http"; [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      wp --allow-root core install --path="$WP_PATH" \
        --url="${PROTO}://${APP_DOMAIN}" \
        --title="$WP_TITLE" \
        --admin_user="$WP_ADMIN_USER" \
        --admin_password="$ADMIN_PASS" \
        --admin_email="$WP_ADMIN_EMAIL" \
        --skip-email

      # pretty permalinks (needed for WooCommerce shop URLs)
      wp --allow-root rewrite structure '/%postname%/' --path="$WP_PATH"
      wp --allow-root option update blog_public 1     --path="$WP_PATH"

      # --- install + activate WooCommerce and companion plugins ---
      wp --allow-root plugin install woocommerce --activate --path="$WP_PATH"
      wp --allow-root plugin install redis-cache --activate --path="$WP_PATH" || true
      wp --allow-root redis enable --path="$WP_PATH" || true

      # WooCommerce store setup: enable required WC pages
      wp --allow-root wc tool run install_pages --user="$WP_ADMIN_USER" --path="$WP_PATH" || true

      # --- permissions ---
      chown -R www-data:www-data "$WP_PATH"
      find "$WP_PATH" -type d -exec chmod 755 {} \;
      find "$WP_PATH" -type f -exec chmod 644 {} \;
      chmod 640 "${WP_PATH}/wp-config.php"

      # --- Nginx vhost ---
      SERVER_NAMES="$APP_DOMAIN"
      [ -n "$APP_DOMAIN_WWW" ] && SERVER_NAMES="$APP_DOMAIN $APP_DOMAIN_WWW"
      sed -i "s|SERVER_NAMES_PLACEHOLDER|${SERVER_NAMES}|g"  /etc/nginx/sites-available/woocommerce.conf
      sed -i "s|PHP_FPM_SOCK_PLACEHOLDER|${PHP_FPM_SOCK}|g"  /etc/nginx/sites-available/woocommerce.conf
      ln -sf /etc/nginx/sites-available/woocommerce.conf /etc/nginx/sites-enabled/woocommerce.conf
      rm -f /etc/nginx/sites-enabled/default
      systemctl enable nginx 2>/dev/null || true
      nginx -t && { systemctl reload nginx 2>/dev/null || systemctl restart nginx; }

      # --- firewall ---
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban + redis ---
      systemctl enable --now fail2ban
      systemctl enable --now redis-server

      # --- TLS via Let's Encrypt ---
      if [ "$ENABLE_TLS" = "true" ]; then
        CERTBOT_DOMAINS="-d $APP_DOMAIN"
        [ -n "$APP_DOMAIN_WWW" ] && CERTBOT_DOMAINS="$CERTBOT_DOMAINS -d $APP_DOMAIN_WWW"
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" $CERTBOT_DOMAINS --redirect \
          || echo "WARN: certbot deferred — DNS not pointed yet. Re-run: certbot --nginx"
      fi

      # --- write operator credentials summary ---
      cat > /root/woocommerce-credentials.txt <<CREDS
      ===== WooCommerce install complete: $(date) =====
      Store URL:           ${PROTO}://${APP_DOMAIN}
      WP Admin URL:        ${PROTO}://${APP_DOMAIN}/wp-admin/
      WooCommerce Admin:   ${PROTO}://${APP_DOMAIN}/wp-admin/admin.php?page=wc-admin
      Admin user:          ${WP_ADMIN_USER}
      Admin password:      ${ADMIN_PASS}
      Admin email:         ${WP_ADMIN_EMAIL}

      DB name:             ${WP_DB_NAME}
      DB user:             ${WP_DB_USER}
      DB password:         ${WP_DB_PASS}
      MySQL root password: ${MYSQL_ROOT_PASS}

      WordPress path:      ${WP_PATH}
      Bootstrap log:       /var/log/woocommerce-bootstrap.log
      CREDS
      chmod 600 /root/woocommerce-credentials.txt

      echo "=== Bootstrap finished: $(date). Credentials: /root/woocommerce-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once write_files have been laid down
# ----------------------------------------------------------------------------
bootcmd:
  # Quiesce the base image's apt-daily / unattended-upgrades timers BEFORE
  # cloud-init's package stage so they don't hold the dpkg/debconf lock and
  # break package_update_upgrade_install (first-boot race). Re-enabled later.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service unattended-upgrades.service 2>/dev/null; systemctl disable apt-daily.timer apt-daily-upgrade.timer 2>/dev/null; pkill -9 -f unattended-upgr 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/woocommerce-bootstrap.sh" ]

final_message: "WooCommerce bootstrap done after $UPTIME s. See /root/woocommerce-credentials.txt and /var/log/woocommerce-bootstrap.log"
