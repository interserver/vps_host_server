#cloud-config
# =============================================================================
# NirvaShare "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: NirvaShare (Docker Compose) + Nginx reverse proxy
#        UFW firewall + fail2ban + swap + unattended-upgrades
# NirvaShare is a secure enterprise file-sharing platform on top of object
# storage (S3, Azure Blob, GCS, MinIO, etc.) with fine-grained access control.
# https://nirvashare.com
# -----------------------------------------------------------------------------
# EDIT the variables in `write_files` -> /root/.nirvashare-bootstrap.env
# before launching. Secrets are generated randomly per-boot if left as
# CHANGE_ME defaults.
# Services:
#   Admin console  : port 8080  -> https://<domain>/
#   User app       : port 8081  -> https://<domain>/userapp  (nginx proxied)
#   Search service : internal only (no public port)
#   PostgreSQL     : internal only
# Default login: admin / admin  (change immediately after first login)
# =============================================================================

hostname: nirvashare
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key / hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget
  - python3

# ----------------------------------------------------------------------------
# Swap (survive build-time memory spikes; NirvaShare pulls multiple images)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk ahead of the bootstrap script
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.nirvashare-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # hostname / primary domain (no scheme)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (DNS not pointed yet)
      DB_PASSWORD="CHANGE_ME"           # PostgreSQL password for nirvashare user
      # Data + config directory — persisted here; back this up!
      NS_DATA_DIR="/var/nirvashare"
      # NirvaShare image tag — use 'latest' or pin e.g. '7.1.0'
      NS_VERSION="7.1.0"

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/nirvashare.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx reverse-proxy vhost (bootstrap replaces APP_DOMAIN_PLACEHOLDER) --
  - path: /etc/nginx/sites-available/nirvashare.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Let's Encrypt ACME challenge
          location /.well-known/acme-challenge/ { root /var/www/html; }

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          # Large uploads for file sharing
          client_max_body_size 10000M;
          proxy_read_timeout 600s;
          proxy_send_timeout 600s;

          # Admin console (NirvaShare admin on port 8080)
          location / {
              proxy_pass         http://127.0.0.1:8080;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_buffering    off;
          }

          # User-facing app (NirvaShare userapp on port 8081)
          location /userapp {
              proxy_pass         http://127.0.0.1:8081;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_buffering    off;
          }
      }

  # --- Docker Compose project for NirvaShare ----------------------------------
  - path: /opt/nirvashare/docker-compose.yml
    permissions: '0640'
    owner: root:root
    content: |
      # NirvaShare Docker Compose — generated by nirvashare-bootstrap.sh
      # Based on the official install-app.yml from:
      # https://raw.githubusercontent.com/nirvashare/nirvashare/main/docker/common/install-app.yml
      version: "3"

      services:
        admin:
          image: 'nirvato/nirvashare-admin:NS_VERSION_PLACEHOLDER'
          container_name: 'nirvashare_admin'
          networks:
            - nirvashare
          restart: always
          ports:
            - '127.0.0.1:8080:8080'
          environment:
            ns_db_jdbc_url: "jdbc:postgresql://nirvashare_database:5432/postgres"
            ns_db_username: "nirvashare"
            ns_db_password_file: "/run/secrets/db_password"
          secrets:
            - db_password
          volumes:
            - /var/nirvashare:/var/nirvashare
          depends_on:
            - db

        userapp:
          image: 'nirvato/nirvashare-userapp:NS_VERSION_PLACEHOLDER'
          container_name: 'nirvashare_userapp'
          networks:
            - nirvashare
          restart: always
          ports:
            - '127.0.0.1:8081:8080'
          environment:
            ns_db_jdbc_url: "jdbc:postgresql://nirvashare_database:5432/postgres"
            ns_db_username: "nirvashare"
            ns_db_password_file: "/run/secrets/db_password"
          secrets:
            - db_password
          volumes:
            - /var/nirvashare:/var/nirvashare
          depends_on:
            - admin

        search:
          image: 'nirvato/nirvashare-search:NS_VERSION_PLACEHOLDER'
          container_name: 'nirvashare_search'
          networks:
            - nirvashare
          restart: always
          environment:
            ns_db_jdbc_url: "jdbc:postgresql://nirvashare_database:5432/postgres"
            ns_db_username: "nirvashare"
            ns_db_password_file: "/run/secrets/db_password"
          secrets:
            - db_password
          volumes:
            - /var/nirvashare:/var/nirvashare
          depends_on:
            - admin

        db:
          image: 'postgres:13.2'
          container_name: 'nirvashare_database'
          networks:
            - nirvashare
          restart: always
          environment:
            POSTGRES_USER: 'nirvashare'
            POSTGRES_PASSWORD_FILE: /run/secrets/db_password
          secrets:
            - db_password
          volumes:
            - db_data:/var/lib/postgresql/data

      secrets:
        db_password:
          file: /opt/nirvashare/dbpass

      volumes:
        db_data:

      networks:
        nirvashare: {}

  # --- main bootstrap script -------------------------------------------------
  - path: /root/nirvashare-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/nirvashare-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.nirvashare-bootstrap.env

      echo "=== NirvaShare bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) ------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$DB_PASSWORD" = "CHANGE_ME" ] && DB_PASSWORD="$(rand)"

      # --- install Docker CE via official get.docker.com script --------------
      if ! command -v docker >/dev/null 2>&1; then
        echo "Installing Docker CE..."
        # fallback: noble repo until 26.04 published
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
        rm -f /tmp/get-docker.sh
      fi
      systemctl enable --now docker
      echo "Docker  : $(docker --version)"

      # --- Docker Compose v2 plugin (bundled with Docker CE; install if missing) --
      if ! docker compose version >/dev/null 2>&1; then
        COMPOSE_VER="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
          | jq -r '.tag_name' 2>/dev/null || echo 'v2.27.1')"
        COMPOSE_URL="https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-$(uname -m)"
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -fsSL "$COMPOSE_URL" -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      fi
      echo "Compose : $(docker compose version)"

      # --- Create data directories -------------------------------------------
      mkdir -p "${NS_DATA_DIR}"
      chmod 755 "${NS_DATA_DIR}"
      mkdir -p /opt/nirvashare

      # --- Write the Docker secret file (plain-text password file) ----------
      echo -n "${DB_PASSWORD}" > /opt/nirvashare/dbpass
      chmod 600 /opt/nirvashare/dbpass

      # --- Substitute version placeholder in docker-compose.yml -------------
      sed -i "s|NS_VERSION_PLACEHOLDER|${NS_VERSION}|g" \
        /opt/nirvashare/docker-compose.yml

      # --- Pull images + start stack ----------------------------------------
      cd /opt/nirvashare
      docker compose pull
      docker compose up -d

      echo "=== Waiting for NirvaShare admin to become ready (up to 3 min) ==="
      for i in $(seq 1 36); do
        if curl -sf http://127.0.0.1:8080/ >/dev/null 2>&1; then
          echo "Admin service is up after $((i*5))s"
          break
        fi
        echo "  ... waiting ($((i*5))s)"
        sleep 5
      done

      # --- nginx vhost: replace domain placeholder --------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|g" \
        /etc/nginx/sites-available/nirvashare.conf
      ln -sf /etc/nginx/sites-available/nirvashare.conf \
        /etc/nginx/sites-enabled/nirvashare.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- Firewall: SSH + HTTP + HTTPS only --------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ---------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot --nginx -d ${APP_DOMAIN}"
      fi

      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- Write credentials summary (chmod 600) ----------------------------
      cat > /root/nirvashare-credentials.txt <<CREDS
      ===== NirvaShare bootstrap complete: $(date) =====

      Admin Console : ${PROTO}://${APP_DOMAIN}/
      User App      : ${PROTO}://${APP_DOMAIN}/userapp

      Default login : admin / admin
      ACTION REQUIRED: Log in and change the default admin password immediately.

      DB password   : ${DB_PASSWORD}
      DB host       : localhost (PostgreSQL in Docker, internal network only)
      DB user       : nirvashare
      DB name       : postgres

      Data dir      : ${NS_DATA_DIR}
      Compose dir   : /opt/nirvashare/
      Log           : /var/log/nirvashare-bootstrap.log
      NirvaShare ver: ${NS_VERSION}

      Useful commands:
        docker compose -f /opt/nirvashare/docker-compose.yml ps
        docker compose -f /opt/nirvashare/docker-compose.yml logs -f
        docker compose -f /opt/nirvashare/docker-compose.yml pull && \
          docker compose -f /opt/nirvashare/docker-compose.yml up -d   # upgrade
      CREDS
      chmod 600 /root/nirvashare-credentials.txt

      echo "=== NirvaShare bootstrap finished: $(date) ==="
      echo "=== Credentials in /root/nirvashare-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all write_files have been placed
# ----------------------------------------------------------------------------
bootcmd:
  # Stop the base image's apt-daily / unattended-upgrades TIMERS from firing at
  # first boot so they don't hold the dpkg lock during cloud-init's package
  # stage. Masking timers only — NO process killing (that corrupts dpkg and a
  # -f match would kill this very command). cloud-init already waits for the lock.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl mask apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true; true" ]

runcmd:
  - [ bash, -lc, "/root/nirvashare-bootstrap.sh" ]

final_message: "NirvaShare bootstrap done after $UPTIME s. See /root/nirvashare-credentials.txt and /var/log/nirvashare-bootstrap.log"
