#cloud-config
# =============================================================================
# k3s "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: k3s (lightweight Kubernetes) + kubectl + Helm + UFW firewall +
#        fail2ban + swap + unattended-upgrades
# Ports: 22 (SSH), 6443 (k3s API), 80 (HTTP NodePort), 443 (HTTPS NodePort)
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.k3s-bootstrap.env block
# before launching. Tokens / passwords below are random per-boot if left as
# their CHANGE_ME defaults.
# =============================================================================

hostname: k3s
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key/hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - git
  - htop
  - jq
  - wget
  - open-iscsi
  - nfs-common
  - apparmor
  - apparmor-utils

# ----------------------------------------------------------------------------
# Swap (helps small instances survive build-time memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable environment variables --------------------------------
  - path: /root/.k3s-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # hostname / primary domain (no scheme)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (no DNS yet)
      K3S_TOKEN="CHANGE_ME"            # shared secret for agent nodes to join
      ADMIN_PASS="CHANGE_ME"           # unused by k3s itself; reserved for future dashboard

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/k3s-app.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- k3s systemd unit override: raise ulimits for many-pod workloads -------
  - path: /etc/systemd/system/k3s.service.d/override.conf
    permissions: '0644'
    owner: root:root
    content: |
      [Service]
      LimitNOFILE=65536
      LimitNPROC=65536

  # --- main bootstrap script -------------------------------------------------
  - path: /root/k3s-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/k3s-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.k3s-bootstrap.env

      echo "=== k3s bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) -------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$K3S_TOKEN"   = "CHANGE_ME" ] && K3S_TOKEN="$(rand)"
      [ "$ADMIN_PASS"  = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"

      # --- kernel modules needed by k3s / Flannel ----------------------------
      modprobe overlay  || true
      modprobe br_netfilter || true
      cat > /etc/modules-load.d/k3s.conf <<'EOF'
      overlay
      br_netfilter
      EOF

      # --- sysctl tweaks for k3s networking ----------------------------------
      cat > /etc/sysctl.d/99-k3s.conf <<'EOF'
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
      EOF
      sysctl --system >/dev/null 2>&1 || true

      # --- install k3s via official installer (single-server / control-plane) -
      # Pin the stable channel and detach stdin (the installer is fed via a pipe;
      # </dev/null keeps any prompt/read from consuming the piped script).
      if ! command -v k3s >/dev/null 2>&1; then
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_CHANNEL=stable \
          INSTALL_K3S_EXEC="server --disable traefik --write-kubeconfig-mode=644" \
          K3S_TOKEN="${K3S_TOKEN}" \
          sh -s - </dev/null
      fi

      # ensure k3s service is running and enabled
      systemctl enable --now k3s

      # wait for the kubeconfig to be written by k3s (up to 120 s). Copying it
      # before k3s creates it would abort the whole script under `set -e`.
      echo "Waiting for k3s kubeconfig at /etc/rancher/k3s/k3s.yaml..."
      for i in $(seq 1 24); do
        [ -s /etc/rancher/k3s/k3s.yaml ] && break
        echo "  kubeconfig attempt $i/24..."
        sleep 5
      done

      # wait for the node to become Ready (up to 120 s)
      echo "Waiting for k3s node to become Ready..."
      for i in $(seq 1 24); do
        if kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes 2>/dev/null | grep -q ' Ready'; then
          echo "Node is Ready."
          break
        fi
        echo "  attempt $i/24..."
        sleep 5
      done

      # --- install kubectl (symlink to k3s kubectl) ---------------------------
      if ! command -v kubectl >/dev/null 2>&1; then
        ln -sf /usr/local/bin/k3s /usr/local/bin/kubectl
      fi

      # --- install Helm -------------------------------------------------------
      if ! command -v helm >/dev/null 2>&1; then
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 \
          -o /tmp/get-helm-3
        bash /tmp/get-helm-3 </dev/null
        rm -f /tmp/get-helm-3
      fi

      # --- set up kubeconfig for root -----------------------------------------
      mkdir -p /root/.kube
      if [ -s /etc/rancher/k3s/k3s.yaml ]; then
        cp /etc/rancher/k3s/k3s.yaml /root/.kube/config
        chmod 600 /root/.kube/config
      else
        echo "WARN: k3s kubeconfig not found yet; falling back to /etc/rancher/k3s/k3s.yaml"
      fi

      # export for the remainder of this script (prefer root copy, else k3s path)
      if [ -s /root/.kube/config ]; then
        export KUBECONFIG=/root/.kube/config
      else
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
      fi

      # Version banners — keep non-fatal. `kubectl version --short` was removed
      # in newer kubectl (k3s bundles a recent one), so don't rely on it and
      # never let these informational lines abort the script under `set -e`.
      echo "k3s version : $(k3s --version 2>/dev/null | head -1 || true)"
      echo "kubectl     : $(kubectl version --client 2>/dev/null | head -1 || true)"
      echo "helm        : $(helm version --short 2>/dev/null || true)"

      # --- firewall: SSH + k3s API + NodePort HTTP/HTTPS ---------------------
      ufw allow OpenSSH
      ufw allow 6443/tcp comment 'k3s API server'
      ufw allow 80/tcp   comment 'HTTP  NodePort / ingress'
      ufw allow 443/tcp  comment 'HTTPS NodePort / ingress'
      # Flannel VXLAN (only needed when adding agent nodes)
      ufw allow 8472/udp comment 'Flannel VXLAN'
      # kubelet metrics / healthz (internal)
      ufw allow 10250/tcp comment 'kubelet'
      ufw --force enable

      # --- fail2ban -----------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS cert for the API server domain (optional / non-fatal) ---------
      if [ "$ENABLE_TLS" = "true" ]; then
        # certbot standalone — no ingress yet at boot time
        if ! command -v certbot >/dev/null 2>&1; then
          apt-get install -y -q certbot
        fi
        certbot certonly --standalone --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot certonly --standalone -d ${APP_DOMAIN}"
      fi

      # --- deploy nginx ingress controller via Helm ---------------------------
      helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx || true
      helm repo update

      kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -

      helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
        --namespace ingress-nginx \
        --set controller.service.type=NodePort \
        --set controller.service.nodePorts.http=30080 \
        --set controller.service.nodePorts.https=30443 \
        --set controller.hostPort.enabled=true \
        --set controller.hostPort.ports.http=80 \
        --set controller.hostPort.ports.https=443 \
        --wait --timeout=5m || echo "WARN: ingress-nginx install timed out — retry: helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx -n ingress-nginx"

      # --- deploy a smoke-test "hello" workload (removable) ------------------
      kubectl create namespace hello --dry-run=client -o yaml | kubectl apply -f -
      kubectl apply -n hello -f - <<'MANIFEST'
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hello
        namespace: hello
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: hello
        template:
          metadata:
            labels:
              app: hello
          spec:
            containers:
              - name: hello
                image: hashicorp/http-echo:latest
                args: ["-text=k3s one-click is running"]
                ports:
                  - containerPort: 5678
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: hello
        namespace: hello
      spec:
        selector:
          app: hello
        ports:
          - port: 80
            targetPort: 5678
      ---
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: hello
        namespace: hello
        annotations:
          kubernetes.io/ingress.class: nginx
      spec:
        rules:
          - host: APP_DOMAIN_PLACEHOLDER
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: hello
                      port:
                        number: 80
      MANIFEST

      # patch the ingress host to the actual domain
      kubectl patch ingress hello -n hello \
        --type='json' \
        -p="[{\"op\":\"replace\",\"path\":\"/spec/rules/0/host\",\"value\":\"${APP_DOMAIN}\"}]" \
        2>/dev/null || true

      PROTO="http"; [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- write credentials summary ------------------------------------------
      cat > /root/k3s-credentials.txt <<CREDS
      ===== k3s bootstrap complete: $(date) =====

      Cluster endpoint  : https://$(hostname -I | awk '{print $1}'):6443
      App domain        : ${PROTO}://${APP_DOMAIN}/
      K3S_TOKEN (agents): ${K3S_TOKEN}
      Admin password    : ${ADMIN_PASS}

      kubeconfig        : /root/.kube/config  (also /etc/rancher/k3s/k3s.yaml)
      Log               : /var/log/k3s-bootstrap.log

      Useful commands:
        kubectl get nodes
        kubectl get pods -A
        kubectl get svc  -A
        helm list -A

      To add an agent node, run on the agent:
        curl -sfL https://get.k3s.io | K3S_URL="https://$(hostname -I | awk '{print $1}'):6443" K3S_TOKEN="${K3S_TOKEN}" sh -

      Remove smoke-test workload:
        kubectl delete namespace hello
      CREDS
      chmod 600 /root/k3s-credentials.txt

      echo "=== Bootstrap finished. Credentials in /root/k3s-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once everything above has been laid down
# ----------------------------------------------------------------------------
bootcmd:
  # Quiesce the base image's apt-daily / unattended-upgrades timers BEFORE
  # cloud-init's package stage so they don't hold the dpkg/debconf lock and
  # break package_update_upgrade_install (first-boot race). Re-enabled later.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service unattended-upgrades.service 2>/dev/null; systemctl disable apt-daily.timer apt-daily-upgrade.timer 2>/dev/null; pkill -9 -f unattended-upgr 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/k3s-bootstrap.sh" ]

final_message: "k3s bootstrap done after $UPTIME s. See /root/k3s-credentials.txt and /var/log/k3s-bootstrap.log"
