#cloud-config
# =============================================================================
# PrestaShop "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Nginx + PHP-FPM + MariaDB + PrestaShop CLI installer + Certbot (LE)
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the operator variables in the write_files -> /root/.prestashop-bootstrap.env
# block (domain, email, DB creds, admin creds) before launching.
# Passwords left as CHANGE_ME are replaced with random values at first boot.
# =============================================================================

hostname: prestashop
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — provisioning injects the customer SSH key + hostname later
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - nginx
  - mariadb-server
  - mariadb-client
  - php-fpm
  - php-mysql
  - php-curl
  - php-gd
  - php-mbstring
  - php-xml
  - php-zip
  - php-intl
  - php-bcmath
  - php-soap
  - php-imagick
  - php-json
  - php-fileinfo
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - unzip
  - git
  - htop
  - wget

# ----------------------------------------------------------------------------
# Swap — helps small instances survive MariaDB + PHP memory spikes
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.prestashop-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ===== EDIT THESE BEFORE FIRST BOOT =====
      APP_DOMAIN="example.com"           # primary domain (no scheme, no trailing slash)
      APP_DOMAIN_WWW="www.example.com"   # www alias — set empty string to skip
      LE_EMAIL="admin@example.com"       # Let's Encrypt registration email
      ENABLE_TLS="true"                  # set "false" to skip certbot (e.g. DNS not pointed yet)

      # PrestaShop admin account
      ADMIN_FIRST="Admin"
      ADMIN_LAST="User"
      ADMIN_EMAIL="admin@example.com"
      ADMIN_PASS="CHANGE_ME"            # min 8 chars; random if left as CHANGE_ME

      # PrestaShop store info
      PS_LANGUAGE="en"
      PS_COUNTRY="US"
      PS_CURRENCY="USD"
      STORE_NAME="My PrestaShop Store"

      # Database credentials — random if left as CHANGE_ME
      PS_DB_NAME="prestashop"
      PS_DB_USER="ps_user"
      PS_DB_PASS="CHANGE_ME"
      MYSQL_ROOT_PASS="CHANGE_ME"

      # Installation paths
      PS_PATH="/var/www/prestashop"
      PS_VERSION="8.1.7"

  # --- Nginx virtual host (HTTP only; certbot adds SSL block) -----------------
  - path: /etc/nginx/sites-available/prestashop.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name SERVER_NAMES_PLACEHOLDER;

          root /var/www/prestashop;
          index index.php index.html;

          client_max_body_size 64M;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          # PrestaShop friendly URLs
          location / {
              try_files $uri $uri/ /index.php?$args;
          }

          # PHP handling
          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:PHP_FPM_SOCK_PLACEHOLDER;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              fastcgi_read_timeout 300;
          }

          # Deny sensitive directories
          location ~* /(?:vendor|tests|tools|docs|src|travis-scripts)/ { deny all; }
          location ~ /\. { deny all; }

          # Static assets cache
          location ~* \.(?:css|js|woff2?|ttf|svg|gif|jpe?g|png|webp|ico)$ {
              expires max;
              log_not_found off;
              access_log off;
          }
      }

  # --- fail2ban jails for nginx + sshd ----------------------------------------
  - path: /etc/fail2ban/jail.d/prestashop.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled = true
      maxretry = 4
      bantime = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- main bootstrap script --------------------------------------------------
  - path: /root/prestashop-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/prestashop-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.prestashop-bootstrap.env

      echo "=== PrestaShop bootstrap started: $(date) ==="

      # -----------------------------------------------------------------------
      # Random-secret helper — SIGPIPE-safe under set -e + pipefail
      # -----------------------------------------------------------------------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$ADMIN_PASS"       = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"
      [ "$PS_DB_PASS"       = "CHANGE_ME" ] && PS_DB_PASS="$(rand)"
      [ "$MYSQL_ROOT_PASS"  = "CHANGE_ME" ] && MYSQL_ROOT_PASS="$(rand)"

      # -----------------------------------------------------------------------
      # Detect PHP-FPM socket
      # -----------------------------------------------------------------------
      PHP_FPM_SOCK="$(find /run/php -name 'php*-fpm.sock' 2>/dev/null | head -n1 || true)"
      echo "PHP-FPM socket: ${PHP_FPM_SOCK}"

      # -----------------------------------------------------------------------
      # Tune PHP for PrestaShop
      # -----------------------------------------------------------------------
      PHP_VER="$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || echo '')"
      FPM_INI="/etc/php/${PHP_VER}/fpm/php.ini"
      CLI_INI="/etc/php/${PHP_VER}/cli/php.ini"
      for INI in "$FPM_INI" "$CLI_INI"; do
        if [ -f "$INI" ]; then
          sed -ri 's/^;?upload_max_filesize.*/upload_max_filesize = 64M/'  "$INI"
          sed -ri 's/^;?post_max_size.*/post_max_size = 64M/'              "$INI"
          sed -ri 's/^;?memory_limit.*/memory_limit = 256M/'               "$INI"
          sed -ri 's/^;?max_execution_time.*/max_execution_time = 300/'    "$INI"
          sed -ri 's/^;?allow_url_fopen.*/allow_url_fopen = On/'           "$INI"
          echo "Tuned $INI"
        fi
      done
      # --- enable + (re)start PHP-FPM (Ubuntu 24.04 = php8.3-fpm; no 'php-fpm' alias) ---
      FPM_SVC="php${PHP_VER}-fpm"
      systemctl list-unit-files "${FPM_SVC}.service" >/dev/null 2>&1 \
        || FPM_SVC="$(systemctl list-unit-files --no-legend 'php*-fpm.service' 2>/dev/null | awk '{print $1}' | head -n1)"
      [ -n "$FPM_SVC" ] && systemctl enable --now "$FPM_SVC" 2>/dev/null || true
      [ -n "$FPM_SVC" ] && systemctl restart "$FPM_SVC" 2>/dev/null || true

      # -----------------------------------------------------------------------
      # Secure MariaDB + create database
      # -----------------------------------------------------------------------
      systemctl enable --now mariadb
      mysql --protocol=socket -uroot <<SQL
      ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_ROOT_PASS}';
      DELETE FROM mysql.user WHERE User='';
      DROP DATABASE IF EXISTS test;
      DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%';
      CREATE DATABASE IF NOT EXISTS \`${PS_DB_NAME}\`
        DEFAULT CHARACTER SET utf8mb4
        COLLATE utf8mb4_unicode_ci;
      CREATE USER IF NOT EXISTS '${PS_DB_USER}'@'localhost'
        IDENTIFIED BY '${PS_DB_PASS}';
      GRANT ALL PRIVILEGES ON \`${PS_DB_NAME}\`.* TO '${PS_DB_USER}'@'localhost';
      FLUSH PRIVILEGES;
      SQL
      echo "MariaDB secured and database '${PS_DB_NAME}' ready."

      # -----------------------------------------------------------------------
      # Download PrestaShop
      # -----------------------------------------------------------------------
      mkdir -p "${PS_PATH}"
      PS_ZIP="/tmp/prestashop-${PS_VERSION}.zip"
      PS_URL="https://github.com/PrestaShop/PrestaShop/releases/download/${PS_VERSION}/prestashop_${PS_VERSION}.zip"

      if [ ! -f "$PS_ZIP" ]; then
        echo "Downloading PrestaShop ${PS_VERSION}..."
        wget -q -O "$PS_ZIP" "$PS_URL" || \
          wget -q -O "$PS_ZIP" \
            "https://download.prestashop.com/download/releases/prestashop_${PS_VERSION}.zip"
      fi

      # The outer zip contains prestashop.zip (the real archive) + installer zip
      unzip -o "$PS_ZIP" -d /tmp/ps_outer/ >/dev/null 2>&1

      # Extract the actual PrestaShop files
      if [ -f /tmp/ps_outer/prestashop.zip ]; then
        unzip -o /tmp/ps_outer/prestashop.zip -d "${PS_PATH}/" >/dev/null 2>&1
      else
        # Fallback: files extracted directly
        cp -a /tmp/ps_outer/. "${PS_PATH}/"
      fi

      rm -rf /tmp/ps_outer "$PS_ZIP"

      chown -R www-data:www-data "${PS_PATH}"
      find "${PS_PATH}" -type d -exec chmod 755 {} \;
      find "${PS_PATH}" -type f -exec chmod 644 {} \;

      # -----------------------------------------------------------------------
      # PrestaShop CLI install
      # -----------------------------------------------------------------------
      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      PS_BASE_URL="${PROTO}://${APP_DOMAIN}/"

      echo "Running PrestaShop CLI installer..."
      php "${PS_PATH}/install/index_cli.php" \
        --domain="${APP_DOMAIN}" \
        --base_uri="/" \
        --language="${PS_LANGUAGE}" \
        --country="${PS_COUNTRY}" \
        --db_server="127.0.0.1" \
        --db_name="${PS_DB_NAME}" \
        --db_user="${PS_DB_USER}" \
        --db_password="${PS_DB_PASS}" \
        --prefix="ps_" \
        --admin_firstname="${ADMIN_FIRST}" \
        --admin_lastname="${ADMIN_LAST}" \
        --admin_email="${ADMIN_EMAIL}" \
        --admin_password="${ADMIN_PASS}" \
        --name="${STORE_NAME}" \
        --newsletter=0 \
        --all_languages=0

      # -----------------------------------------------------------------------
      # Post-install: rename /install and secure /admin
      # -----------------------------------------------------------------------
      # Remove install directory (required by PrestaShop security)
      rm -rf "${PS_PATH}/install"

      # Rename admin directory to a random suffix for security
      ADMIN_SUFFIX="$(rand | head -c 8 || true)"
      ADMIN_DIR="${PS_PATH}/admin"
      NEW_ADMIN_DIR="${PS_PATH}/admin_${ADMIN_SUFFIX}"
      if [ -d "$ADMIN_DIR" ]; then
        mv "$ADMIN_DIR" "$NEW_ADMIN_DIR"
        ADMIN_URL="${PS_BASE_URL}admin_${ADMIN_SUFFIX}/"
      else
        ADMIN_URL="${PS_BASE_URL}admin/"
      fi

      chown -R www-data:www-data "${PS_PATH}"

      # -----------------------------------------------------------------------
      # Nginx vhost
      # -----------------------------------------------------------------------
      SERVER_NAMES="${APP_DOMAIN}"
      [ -n "${APP_DOMAIN_WWW:-}" ] && SERVER_NAMES="${APP_DOMAIN} ${APP_DOMAIN_WWW}"

      sed -i "s|SERVER_NAMES_PLACEHOLDER|${SERVER_NAMES}|" \
        /etc/nginx/sites-available/prestashop.conf
      sed -i "s|PHP_FPM_SOCK_PLACEHOLDER|${PHP_FPM_SOCK}|" \
        /etc/nginx/sites-available/prestashop.conf

      ln -sf /etc/nginx/sites-available/prestashop.conf \
             /etc/nginx/sites-enabled/prestashop.conf
      rm -f /etc/nginx/sites-enabled/default
      systemctl enable nginx 2>/dev/null || true
      nginx -t && { systemctl reload nginx 2>/dev/null || systemctl restart nginx; }

      # -----------------------------------------------------------------------
      # Firewall
      # -----------------------------------------------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable
      echo "UFW firewall enabled (SSH + HTTP/HTTPS)."

      # -----------------------------------------------------------------------
      # fail2ban
      # -----------------------------------------------------------------------
      systemctl enable --now fail2ban
      echo "fail2ban started."

      # -----------------------------------------------------------------------
      # TLS via Let's Encrypt (non-fatal if DNS not pointed yet)
      # -----------------------------------------------------------------------
      if [ "$ENABLE_TLS" = "true" ]; then
        CERTBOT_DOMAINS="-d ${APP_DOMAIN}"
        [ -n "${APP_DOMAIN_WWW:-}" ] && CERTBOT_DOMAINS="${CERTBOT_DOMAINS} -d ${APP_DOMAIN_WWW}"
        certbot --nginx --non-interactive --agree-tos \
          -m "${LE_EMAIL}" ${CERTBOT_DOMAINS} --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points to this server: certbot --nginx"
      fi

      # -----------------------------------------------------------------------
      # Write credentials summary
      # -----------------------------------------------------------------------
      cat > /root/prestashop-credentials.txt <<CREDS
      ===== PrestaShop install complete: $(date) =====

      Store URL:        ${PROTO}://${APP_DOMAIN}/
      Admin panel URL:  ${ADMIN_URL}
      Admin email:      ${ADMIN_EMAIL}
      Admin password:   ${ADMIN_PASS}

      Database name:    ${PS_DB_NAME}
      Database user:    ${PS_DB_USER}
      Database pass:    ${PS_DB_PASS}
      MySQL root pass:  ${MYSQL_ROOT_PASS}

      Install path:     ${PS_PATH}
      Bootstrap log:    /var/log/prestashop-bootstrap.log
      CREDS
      chmod 600 /root/prestashop-credentials.txt

      echo "=== Bootstrap complete. Credentials saved to /root/prestashop-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all write_files have been written
# ----------------------------------------------------------------------------
bootcmd:
  # Quiesce the base image's apt-daily / unattended-upgrades timers BEFORE
  # cloud-init's package stage so they don't hold the dpkg/debconf lock and
  # break package_update_upgrade_install (first-boot race). Re-enabled later.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service unattended-upgrades.service 2>/dev/null; systemctl disable apt-daily.timer apt-daily-upgrade.timer 2>/dev/null; pkill -9 -f unattended-upgr 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/prestashop-bootstrap.sh" ]

final_message: "PrestaShop bootstrap done after $UPTIME s. See /root/prestashop-credentials.txt and /var/log/prestashop-bootstrap.log"
