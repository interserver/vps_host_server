#cloud-config
# =============================================================================
# ONLYOFFICE DocSpace "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: ONLYOFFICE DocSpace (Docker Compose via vendor installer) +
#        Nginx reverse proxy + Certbot TLS
#        UFW firewall + fail2ban + swap + unattended-upgrades
# ONLYOFFICE DocSpace is a self-hosted collaborative document space with
# room-based access control, real-time editing, and DocSpace portal.
# https://www.onlyoffice.com/docspace.aspx
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.docspace-bootstrap.env
# block before launching. Secrets are generated randomly per-boot when left
# as CHANGE_ME defaults.
# =============================================================================

hostname: docspace
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key / hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget
  - python3
  - openssl
  - pwgen

# ----------------------------------------------------------------------------
# Swap (survive build-time memory spikes; DocSpace pulls large images)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk ahead of the bootstrap script
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.docspace-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # hostname / primary domain (no scheme)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (DNS not pointed yet)
      ADMIN_EMAIL="admin@example.com"   # ONLYOFFICE DocSpace first-admin e-mail
      ADMIN_PASS="CHANGE_ME"            # Admin portal password (min 8 chars)
      MYSQL_ROOT_PASSWORD="CHANGE_ME"   # MySQL root password
      MYSQL_PASSWORD="CHANGE_ME"        # MySQL docspace user password
      MACHINEKEY="CHANGE_ME"            # APP_CORE_MACHINEKEY (random 32-char string)
      JWT_SECRET="CHANGE_ME"            # Document server JWT secret
      RABBIT_PASSWORD="CHANGE_ME"       # RabbitMQ password
      # Data directory — DocSpace volumes persisted here; back this up!
      DOCSPACE_DATA_DIR="/opt/docspace"

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/docspace.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx reverse-proxy vhost (bootstrap replaces APP_DOMAIN_PLACEHOLDER) --
  - path: /etc/nginx/sites-available/docspace.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Let's Encrypt ACME challenge
          location /.well-known/acme-challenge/ { root /var/www/html; }

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          # DocSpace needs large uploads (documents, media)
          client_max_body_size 1G;
          client_body_timeout 600s;

          location / {
              proxy_pass         http://127.0.0.1:8092;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_read_timeout 600s;
              proxy_send_timeout 600s;
              proxy_buffering    off;
          }
      }

  # --- Docker Compose file for ONLYOFFICE DocSpace (community edition) -------
  - path: /opt/docspace/docker-compose.yml
    permissions: '0640'
    owner: root:root
    content: |
      # ONLYOFFICE DocSpace — Community Edition
      # Generated by docspace-bootstrap.sh; env vars resolved from .env at runtime.
      # https://github.com/ONLYOFFICE/DocSpace-buildtools

      x-healthcheck: &x-healthcheck
        test: curl --fail http://127.0.0.1 || exit 1
        interval: 60s
        retries: 5
        start_period: 30s
        timeout: 10s

      x-service: &x-service-base
        user: "root:root"
        restart: unless-stopped
        expose:
          - "5050"
        environment: &x-env-base
          MYSQL_CONTAINER_NAME: ${MYSQL_CONTAINER_NAME:-onlyoffice-mysql-server}
          MYSQL_HOST: ${MYSQL_HOST:-onlyoffice-mysql-server}
          MYSQL_PORT: "3306"
          MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE: ${MYSQL_DATABASE:-docspace}
          MYSQL_USER: ${MYSQL_USER:-onlyoffice_user}
          MYSQL_PASSWORD: ${MYSQL_PASSWORD}
          DATABASE_MIGRATION: "true"
          APP_DOTNET_ENV: ""
          APP_KNOWN_NETWORKS: ""
          APP_KNOWN_PROXIES: "127.0.0.1"
          APP_CORE_SERVER_ROOT: ""
          APP_CORE_BASE_DOMAIN: ${APP_CORE_BASE_DOMAIN:-localhost}
          APP_CORE_MACHINEKEY: ${APP_CORE_MACHINEKEY}
          APP_URL_PORTAL: ${APP_URL_PORTAL:-http://localhost:8092}
          INSTALLATION_TYPE: "COMMUNITY"
          OAUTH_REDIRECT_URL: ""
          DOCUMENT_SERVER_JWT_SECRET: ${DOCUMENT_SERVER_JWT_SECRET}
          DOCUMENT_SERVER_JWT_HEADER: "AuthorizationJwt"
          DOCUMENT_SERVER_URL_PUBLIC: "/ds-vpath/"
          DOCUMENT_CONTAINER_NAME: ${DOCUMENT_CONTAINER_NAME:-onlyoffice-document-server}
          DOCUMENT_SERVER_URL_EXTERNAL: ""
          ELK_CONTAINER_NAME: ""
          ELK_SCHEME: "http"
          ELK_HOST: ""
          ELK_PORT: "9200"
          REDIS_CONTAINER_NAME: ${REDIS_CONTAINER_NAME:-onlyoffice-redis}
          REDIS_HOST: ${REDIS_HOST:-onlyoffice-redis}
          REDIS_PORT: "6379"
          REDIS_USER_NAME: ""
          REDIS_PASSWORD: ""
          REDIS_DB: "0"
          RABBIT_CONTAINER_NAME: ${RABBIT_CONTAINER_NAME:-onlyoffice-rabbitmq}
          RABBIT_PROTOCOL: "amqp"
          RABBIT_HOST: ${RABBIT_HOST:-onlyoffice-rabbitmq}
          RABBIT_PORT: "5672"
          RABBIT_VIRTUAL_HOST: "/"
          RABBIT_USER_NAME: "onlyoffice"
          RABBIT_PASSWORD: ${RABBIT_PASSWORD}
          ROUTER_HOST: ${ROUTER_HOST:-onlyoffice-router}
          LOG_LEVEL: "Warning"
          DEBUG_INFO: "false"
          CERTIFICATE_PATH: ""
          NODE_OPTIONS: "--max_old_space_size=4096"
        volumes:
          - app_data:/app/onlyoffice/data
          - log_data:/var/log/onlyoffice
        networks:
          - onlyoffice

      services:
        onlyoffice-mysql-server:
          image: mysql:8.3.0
          container_name: onlyoffice-mysql-server
          cap_add:
            - SYS_NICE
          restart: unless-stopped
          user: mysql
          expose:
            - "3306"
          environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-docspace}
            MYSQL_USER: ${MYSQL_USER:-onlyoffice_user}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
          healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
            interval: 10s
            timeout: 5s
            start_period: 30s
            retries: 5
          volumes:
            - mysql_data:/var/lib/mysql
          networks:
            - onlyoffice

        onlyoffice-redis:
          image: redis:7-alpine
          container_name: onlyoffice-redis
          restart: unless-stopped
          expose:
            - "6379"
          healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
          networks:
            - onlyoffice

        onlyoffice-rabbitmq:
          image: rabbitmq:3-management-alpine
          container_name: onlyoffice-rabbitmq
          restart: unless-stopped
          expose:
            - "5672"
          environment:
            RABBITMQ_DEFAULT_USER: "onlyoffice"
            RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
            RABBITMQ_DEFAULT_VHOST: "/"
          healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            interval: 15s
            timeout: 10s
            retries: 5
            start_period: 30s
          networks:
            - onlyoffice

        onlyoffice-document-server:
          image: onlyoffice/documentserver:latest
          container_name: onlyoffice-document-server
          restart: unless-stopped
          environment:
            - JWT_ENABLED=true
            - JWT_SECRET=${DOCUMENT_SERVER_JWT_SECRET}
            - JWT_HEADER=AuthorizationJwt
            - JWT_IN_BODY=true
            - AMQP_URI=amqp://onlyoffice:${RABBIT_PASSWORD}@onlyoffice-rabbitmq:5672/
            - REDIS_SERVER_HOST=onlyoffice-redis
            - REDIS_SERVER_PORT=6379
          volumes:
            - ds_data:/var/www/onlyoffice/Data
            - log_data:/var/log/onlyoffice
            - ds_fonts:/usr/share/fonts
          expose:
            - "80"
          stdin_open: true
          stop_grace_period: 60s
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
            interval: 30s
            retries: 5
            start_period: 60s
            timeout: 10s
          networks:
            - onlyoffice

        onlyoffice-migration-runner:
          <<: *x-service-base
          image: "onlyoffice/docspace-migration-runner:latest"
          container_name: onlyoffice-migration-runner
          restart: "no"
          depends_on:
            onlyoffice-mysql-server:
              condition: service_healthy
          healthcheck:
            disable: true

        onlyoffice-api:
          <<: *x-service-base
          image: "onlyoffice/docspace-api:latest"
          container_name: onlyoffice-api
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-api:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-api-system:
          <<: *x-service-base
          image: "onlyoffice/docspace-api-system:latest"
          container_name: onlyoffice-api-system
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-api-system:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-studio:
          <<: *x-service-base
          image: "onlyoffice/docspace-studio:latest"
          container_name: onlyoffice-studio
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-studio:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-people-server:
          <<: *x-service-base
          image: "onlyoffice/docspace-people-server:latest"
          container_name: onlyoffice-people-server
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-people-server:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-files:
          <<: *x-service-base
          image: "onlyoffice/docspace-files:latest"
          container_name: onlyoffice-files
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-files:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-files-services:
          <<: *x-service-base
          image: "onlyoffice/docspace-files-services:latest"
          container_name: onlyoffice-files-services
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-files-services:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-backup:
          <<: *x-service-base
          image: "onlyoffice/docspace-backup:latest"
          container_name: onlyoffice-backup
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-backup:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-backup-background-tasks:
          <<: *x-service-base
          image: "onlyoffice/docspace-backup-background:latest"
          container_name: onlyoffice-backup-background-tasks
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-backup-background-tasks:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-clear-events:
          <<: *x-service-base
          image: "onlyoffice/docspace-clear-events:latest"
          container_name: onlyoffice-clear-events
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-clear-events:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-studio-notify:
          <<: *x-service-base
          image: "onlyoffice/docspace-studio-notify:latest"
          container_name: onlyoffice-studio-notify
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-studio-notify:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-socket:
          <<: *x-service-base
          image: "onlyoffice/docspace-socket:latest"
          container_name: onlyoffice-socket
          healthcheck:
            <<: *x-healthcheck
            test: curl --fail http://onlyoffice-socket:5050/health/ || exit 1
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-ssoauth:
          <<: *x-service-base
          image: "onlyoffice/docspace-ssoauth:latest"
          container_name: onlyoffice-ssoauth
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-doceditor:
          <<: *x-service-base
          image: "onlyoffice/docspace-doceditor:latest"
          container_name: onlyoffice-doceditor
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-login:
          <<: *x-service-base
          image: "onlyoffice/docspace-login:latest"
          container_name: onlyoffice-login
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-management:
          <<: *x-service-base
          image: "onlyoffice/docspace-management:latest"
          container_name: onlyoffice-management
          depends_on:
            onlyoffice-migration-runner:
              condition: service_completed_successfully

        onlyoffice-router:
          image: "onlyoffice/docspace-router:latest"
          container_name: onlyoffice-router
          user: "root:root"
          restart: unless-stopped
          healthcheck:
            <<: *x-healthcheck
            test: nginx -t || exit 1
          expose:
            - "8081"
            - "8092"
            - "8099"
          ports:
            - "127.0.0.1:8092:8092"
          environment:
            SERVICE_BACKUP: "onlyoffice-backup:5050"
            SERVICE_BACKUP_BACKGRUOND_TASKS: "onlyoffice-backup-background-tasks:5050"
            SERVICE_CLEAR_EVENTS: "onlyoffice-clear-events:5050"
            SERVICE_FILES: "onlyoffice-files:5050"
            SERVICE_FILES_SERVICES: "onlyoffice-files-services:5050"
            SERVICE_NOTIFY: "onlyoffice-studio-notify:5050"
            SERVICE_PEOPLE_SERVER: "onlyoffice-people-server:5050"
            SERVICE_SOCKET: "onlyoffice-socket:5050"
            SERVICE_STUDIO_NOTIFY: "onlyoffice-studio-notify:5050"
            SERVICE_API: "onlyoffice-api:5050"
            SERVICE_API_SYSTEM: "onlyoffice-api-system:5050"
            SERVICE_STUDIO: "onlyoffice-studio:5050"
            SERVICE_SSOAUTH: "onlyoffice-ssoauth:5050"
            SERVICE_DOCEDITOR: "onlyoffice-doceditor:5050"
            SERVICE_LOGIN: "onlyoffice-login:5050"
            SERVICE_MANAGEMENT: "onlyoffice-management:5050"
            DOCUMENT_SERVER_HOST: "onlyoffice-document-server:80"
            INTERNAL_HOST: "localhost"
            APP_KNOWN_PROXIES: "127.0.0.1"
          depends_on:
            - onlyoffice-api
            - onlyoffice-api-system
            - onlyoffice-backup
            - onlyoffice-backup-background-tasks
            - onlyoffice-clear-events
            - onlyoffice-files
            - onlyoffice-files-services
            - onlyoffice-people-server
            - onlyoffice-socket
            - onlyoffice-studio
            - onlyoffice-studio-notify
          networks:
            - onlyoffice

      volumes:
        mysql_data:
        app_data:
        log_data:
        ds_data:
        ds_fonts:

      networks:
        onlyoffice:
          name: onlyoffice
          driver: bridge

  # --- main bootstrap script -------------------------------------------------
  - path: /root/docspace-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/docspace-bootstrap.log) 2>&1
      source /root/.docspace-bootstrap.env

      echo "=== ONLYOFFICE DocSpace bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) ------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$ADMIN_PASS"          = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"
      [ "$MYSQL_ROOT_PASSWORD" = "CHANGE_ME" ] && MYSQL_ROOT_PASSWORD="$(rand)"
      [ "$MYSQL_PASSWORD"      = "CHANGE_ME" ] && MYSQL_PASSWORD="$(rand)"
      [ "$MACHINEKEY"          = "CHANGE_ME" ] && MACHINEKEY="$(rand)$(rand)"
      [ "$JWT_SECRET"          = "CHANGE_ME" ] && JWT_SECRET="$(rand)"
      [ "$RABBIT_PASSWORD"     = "CHANGE_ME" ] && RABBIT_PASSWORD="$(rand)"

      # --- install Docker CE via official script (distro-agnostic) ----------
      if ! command -v docker >/dev/null 2>&1; then
        echo "Installing Docker CE..."
        # fallback: noble repo until 26.04 published
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
        rm -f /tmp/get-docker.sh
      fi
      systemctl enable --now docker

      # --- Docker Compose v2 plugin -----------------------------------------
      if ! docker compose version >/dev/null 2>&1; then
        COMPOSE_VER="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
          | jq -r '.tag_name' 2>/dev/null || echo 'v2.27.1')"
        COMPOSE_URL="https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-$(uname -m)"
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -fsSL "$COMPOSE_URL" -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      fi
      echo "Docker  : $(docker --version)"
      echo "Compose : $(docker compose version)"

      # --- Create data directories -------------------------------------------
      mkdir -p "${DOCSPACE_DATA_DIR}"
      chmod 755 "${DOCSPACE_DATA_DIR}"

      # --- Write the Compose .env file ---------------------------------------
      cat > /opt/docspace/.env <<DOTENV
      # Generated by docspace-bootstrap.sh — $(date)
      MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE=docspace
      MYSQL_USER=onlyoffice_user
      MYSQL_PASSWORD=${MYSQL_PASSWORD}
      MYSQL_CONTAINER_NAME=onlyoffice-mysql-server
      MYSQL_HOST=onlyoffice-mysql-server
      APP_CORE_BASE_DOMAIN=${APP_DOMAIN}
      APP_CORE_MACHINEKEY=${MACHINEKEY}
      APP_URL_PORTAL=http://${APP_DOMAIN}
      DOCUMENT_SERVER_JWT_SECRET=${JWT_SECRET}
      DOCUMENT_CONTAINER_NAME=onlyoffice-document-server
      REDIS_CONTAINER_NAME=onlyoffice-redis
      REDIS_HOST=onlyoffice-redis
      RABBIT_CONTAINER_NAME=onlyoffice-rabbitmq
      RABBIT_HOST=onlyoffice-rabbitmq
      RABBIT_PASSWORD=${RABBIT_PASSWORD}
      ROUTER_HOST=onlyoffice-router
      VOLUMES_DIR=/opt/docspace
      INSTALLATION_TYPE=COMMUNITY
      DOTENV
      chmod 600 /opt/docspace/.env

      # --- Pull images + start stack (migration-runner first) ---------------
      cd /opt/docspace
      docker compose pull

      echo "Starting infrastructure services..."
      docker compose up -d onlyoffice-mysql-server onlyoffice-redis onlyoffice-rabbitmq onlyoffice-document-server

      echo "Waiting for MySQL to become healthy (up to 120s)..."
      TRIES=0
      until docker compose exec -T onlyoffice-mysql-server mysqladmin ping \
            -uroot --password="${MYSQL_ROOT_PASSWORD}" --silent 2>/dev/null \
            || [ $TRIES -ge 24 ]; do
        sleep 5
        TRIES=$((TRIES+1))
      done

      echo "Running database migration..."
      docker compose up -d onlyoffice-migration-runner

      echo "Waiting for migration to complete (up to 300s)..."
      TRIES=0
      until [ "$(docker inspect --format='{{.State.Status}}' onlyoffice-migration-runner 2>/dev/null)" = "exited" ] \
            || [ $TRIES -ge 60 ]; do
        sleep 5
        TRIES=$((TRIES+1))
      done

      echo "Starting remaining DocSpace services..."
      docker compose up -d

      # --- nginx vhost: replace domain placeholder --------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|" \
        /etc/nginx/sites-available/docspace.conf
      ln -sf /etc/nginx/sites-available/docspace.conf \
        /etc/nginx/sites-enabled/docspace.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- Firewall: SSH + HTTP + HTTPS only --------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ---------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot --nginx -d ${APP_DOMAIN}"
      fi

      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- Write credentials summary (chmod 600) ----------------------------
      cat > /root/docspace-credentials.txt <<CREDS
      ===== ONLYOFFICE DocSpace bootstrap complete: $(date) =====

      Web UI              : ${PROTO}://${APP_DOMAIN}/
      Admin email         : ${ADMIN_EMAIL}
      Admin password      : ${ADMIN_PASS}
        (Use these on the DocSpace first-run wizard / portal setup page)

      MySQL root password : ${MYSQL_ROOT_PASSWORD}
      MySQL user password : ${MYSQL_PASSWORD}
      App machine key     : ${MACHINEKEY}
      Document JWT secret : ${JWT_SECRET}
      RabbitMQ password   : ${RABBIT_PASSWORD}

      Data directory      : ${DOCSPACE_DATA_DIR}
      Compose directory   : /opt/docspace/
      Log (bootstrap)     : /var/log/docspace-bootstrap.log
      Container logs      : docker compose -f /opt/docspace/docker-compose.yml logs -f

      Useful commands:
        docker compose -f /opt/docspace/docker-compose.yml ps
        docker compose -f /opt/docspace/docker-compose.yml logs -f
        docker compose -f /opt/docspace/docker-compose.yml pull && \
          docker compose -f /opt/docspace/docker-compose.yml up -d   # upgrade
      CREDS
      chmod 600 /root/docspace-credentials.txt

      echo "=== ONLYOFFICE DocSpace bootstrap finished: $(date) ==="
      echo "=== Credentials in /root/docspace-credentials.txt ==="

# ----------------------------------------------------------------------------
