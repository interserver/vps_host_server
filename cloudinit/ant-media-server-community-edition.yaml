#cloud-config
# =============================================================================
# Ant Media Server Community Edition — Ubuntu 26.04 cloud-init user-data
# Stack: Ant Media Server (native install via vendor script) + Nginx reverse
#        proxy + Certbot TLS + UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in `write_files` -> /root/.ant-media-bootstrap.env
# before launching, or supply them via your provisioner.
# =============================================================================

hostname: ant-media-server
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep 'default' so provisioner can inject SSH key + hostname later
# ----------------------------------------------------------------------------
users:
  - default
  # NOTE: do NOT pre-create the 'antmedia' user here — Ant Media's official
  # installer runs `useradd antmedia` itself and aborts ("user already exists")
  # if it is created ahead of time. Let the installer own that system user.

# ----------------------------------------------------------------------------
# Packages (installed before runcmd runs)
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - curl
  - wget
  - unzip
  - git
  - htop
  - ca-certificates
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - certbot
  - nginx
  - python3-certbot-nginx
  - apt-transport-https
  - software-properties-common
  - net-tools
  - openssl

# ----------------------------------------------------------------------------
# Swap (survive build-time memory / JVM spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable environment variables --------------------------------
  - path: /root/.ant-media-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="ams.example.com"      # FQDN pointing to this server
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (e.g. DNS not ready)

      # Ant Media Server admin credentials (web dashboard)
      # ADMIN_PASS is randomised on first boot if left as CHANGE_ME
      ADMIN_USER="admin"
      ADMIN_PASS="CHANGE_ME"

      # AMS version to install (leave 'latest' for the current community release)
      AMS_VERSION="latest"

      # Install path (do not change unless you know what you're doing)
      AMS_INSTALL_DIR="/usr/local/antmedia"

  # --- fail2ban jail for SSH + Nginx ------------------------------------------
  - path: /etc/fail2ban/jail.d/ant-media.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- Nginx reverse-proxy vhost (HTTP; certbot upgrades to HTTPS) ------------
  - path: /etc/nginx/sites-available/ant-media.conf
    permissions: '0644'
    owner: root:root
    content: |
      # Ant Media Server reverse proxy
      # HTTP block — certbot will add HTTPS and redirect when TLS is enabled
      server {
          listen 80;
          listen [::]:80;
          server_name AMS_DOMAIN_PLACEHOLDER;

          # Let's Encrypt ACME challenge
          location /.well-known/acme-challenge/ {
              root /var/www/html;
          }

          # Proxy all other traffic to AMS
          location / {
              proxy_pass         http://127.0.0.1:5080;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade           $http_upgrade;
              proxy_set_header   Connection        "upgrade";
              proxy_set_header   Host              $host;
              proxy_set_header   X-Real-IP         $remote_addr;
              proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_read_timeout 86400;
          }
      }

  # --- main bootstrap script --------------------------------------------------
  - path: /root/ant-media-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/ant-media-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.ant-media-bootstrap.env

      echo "=== Ant Media Server CE bootstrap started: $(date) ==="

      # --- random password helper (SIGPIPE-safe under set -e + pipefail) -----
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$ADMIN_PASS" = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"

      # --- install Java 11 (required by AMS) ---------------------------------
      echo "--- Installing Java 11 ---"
      if ! command -v java >/dev/null 2>&1; then
        apt-get install -y openjdk-11-jdk
      fi
      export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")"
      echo "JAVA_HOME=$JAVA_HOME"

      # --- download + install Ant Media Server CE ----------------------------
      echo "--- Downloading Ant Media Server Community Edition ---"
      mkdir -p /tmp/ams-install
      cd /tmp/ams-install

      # Resolve the release metadata from the GitHub API, then read the asset
      # download URL straight out of it. The CE asset is named with the bare
      # version (e.g. ant-media-server-community-3.0.3.zip) while the tag is
      # 'ams-v3.0.3' — guessing the URL from the tag 404s, so parse it instead.
      if [ "$AMS_VERSION" = "latest" ]; then
        AMS_API='https://api.github.com/repos/ant-media/Ant-Media-Server/releases/latest'
      else
        AMS_API="https://api.github.com/repos/ant-media/Ant-Media-Server/releases/tags/${AMS_VERSION}"
      fi
      AMS_JSON="$(curl -fsSL "$AMS_API")"
      AMS_TAG="$(printf '%s' "$AMS_JSON" | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')"
      echo "AMS release tag: $AMS_TAG"
      AMS_ZIP_URL="$(printf '%s' "$AMS_JSON" \
        | grep -o '"browser_download_url": *"[^"]*ant-media-server-community-[^"]*\.zip"' \
        | head -1 | sed 's/.*"browser_download_url": *"\([^"]*\)".*/\1/')"
      if [ -z "$AMS_ZIP_URL" ]; then
        # Fallback: derive the bare version by stripping the 'ams-v' / 'v' prefix.
        AMS_VER="${AMS_TAG#ams-v}"; AMS_VER="${AMS_VER#v}"
        AMS_ZIP_URL="https://github.com/ant-media/Ant-Media-Server/releases/download/${AMS_TAG}/ant-media-server-community-${AMS_VER}.zip"
      fi
      echo "Downloading: $AMS_ZIP_URL"
      curl -fSL -o /tmp/ams-install/ant-media-server.zip "$AMS_ZIP_URL"

      # Install via Ant Media's official installer script. The CE zip is the
      # server payload only — it does NOT contain install.sh. The installer is
      # fetched separately and takes the zip via -i (same method the EE template
      # uses). Ref: https://github.com/ant-media/Scripts
      echo "--- Installing Ant Media Server CE via official installer ---"
      curl -fsSL \
        "https://raw.githubusercontent.com/ant-media/Scripts/master/install_ant-media-server.sh" \
        -o /tmp/ams-install/install_ant-media-server.sh
      chmod +x /tmp/ams-install/install_ant-media-server.sh
      bash /tmp/ams-install/install_ant-media-server.sh -i /tmp/ams-install/ant-media-server.zip

      # --- enable + start AMS service ----------------------------------------
      echo "--- Enabling ant-media-server service ---"
      systemctl enable --now antmedia || systemctl enable --now ant-media-server || true

      # Wait up to 60 s for AMS to start listening on 5080
      echo "--- Waiting for AMS to listen on port 5080 ---"
      for i in $(seq 1 30); do
        if ss -tlnp 2>/dev/null | grep -q ':5080'; then
          echo "AMS is up (after ${i}x2 s)"
          break
        fi
        sleep 2
      done

      # --- configure the admin password via AMS REST API --------------------
      echo "--- Setting admin credentials ---"
      # AMS community edition REST management endpoint
      curl -fsSL -X POST \
        "http://127.0.0.1:5080/WebRTCAppEE/rest/v2/users/initial-user" \
        -H "Content-Type: application/json" \
        -d "{\"firstName\":\"Admin\",\"lastName\":\"User\",\"email\":\"${ADMIN_USER}\",\"password\":\"${ADMIN_PASS}\"}" \
        || echo "WARN: initial user creation via REST API failed — may already exist or endpoint may differ"

      # --- Nginx vhost -------------------------------------------------------
      echo "--- Configuring Nginx reverse proxy ---"
      sed -i "s|AMS_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|g" /etc/nginx/sites-available/ant-media.conf
      ln -sf /etc/nginx/sites-available/ant-media.conf /etc/nginx/sites-enabled/ant-media.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- TLS via Let's Encrypt --------------------------------------------
      if [ "$ENABLE_TLS" = "true" ]; then
        echo "--- Requesting TLS certificate ---"
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred (DNS not pointed yet). Re-run: certbot --nginx -d $APP_DOMAIN"
      fi

      # --- firewall ---------------------------------------------------------
      echo "--- Configuring UFW firewall ---"
      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow OpenSSH
      ufw allow 80/tcp    # HTTP / ACME
      ufw allow 443/tcp   # HTTPS
      # AMS native ports (exposed directly for RTMP / WebRTC / etc.)
      ufw allow 1935/tcp  # RTMP
      ufw allow 4444/tcp  # RTMPS (TLS RTMP)
      ufw allow 5080/tcp  # HTTP dashboard (loopback-proxied, but allow for direct access)
      ufw allow 5443/tcp  # HTTPS dashboard (direct TLS)
      # WebRTC UDP port range
      ufw allow 50000:60000/udp
      ufw --force enable
      ufw status verbose

      # --- fail2ban ---------------------------------------------------------
      echo "--- Starting fail2ban ---"
      systemctl enable --now fail2ban

      # --- write credentials ------------------------------------------------
      PROTO="http"; [ "$ENABLE_TLS" = "true" ] && PROTO="https"
      cat > /root/ant-media-credentials.txt <<CREDS
      ===== Ant Media Server CE install complete: $(date) =====
      Dashboard URL:  ${PROTO}://${APP_DOMAIN}
      Direct HTTP:    http://$(hostname -I | awk '{print $1}'):5080
      Admin user:     ${ADMIN_USER}
      Admin password: ${ADMIN_PASS}
      Install dir:    ${AMS_INSTALL_DIR}

      Log file:       /var/log/ant-media-bootstrap.log
      AMS log:        /var/log/antmedia/antmedia.log  (or journalctl -u antmedia)

      Ports allowed through UFW:
        22/tcp   (SSH)
        80/tcp   (HTTP / Let's Encrypt)
        443/tcp  (HTTPS)
        1935/tcp (RTMP)
        4444/tcp (RTMPS)
        5080/tcp (AMS HTTP)
        5443/tcp (AMS HTTPS)
        50000-60000/udp (WebRTC)
      CREDS
      chmod 600 /root/ant-media-credentials.txt

      # --- cleanup ----------------------------------------------------------
      rm -rf /tmp/ams-install

      echo "=== Bootstrap finished: $(date). See /root/ant-media-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run bootstrap once (runcmd runs as root after cloud-init modules complete)
# ----------------------------------------------------------------------------
bootcmd:
  # Stop the base image's apt-daily / unattended-upgrades TIMERS from firing at
  # first boot so they don't hold the dpkg lock during cloud-init's package
  # stage. Masking timers only — NO process killing (that corrupts dpkg and a
  # -f match would kill this very command). cloud-init already waits for the lock.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl mask apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true; true" ]

runcmd:
  - [ bash, -lc, "/root/ant-media-bootstrap.sh" ]

final_message: "Ant Media Server CE bootstrap done after $UPTIME s. See /root/ant-media-credentials.txt and /var/log/ant-media-bootstrap.log"
