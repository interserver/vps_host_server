#cloud-config
# =============================================================================
# Jitsi Meet "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Docker CE + Docker Compose v2 + Jitsi Meet (official docker-jitsi-meet)
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.jitsi-bootstrap.env block
# before launching. Secrets are generated randomly per-boot if left as defaults.
# Ports: 80 (HTTP/ACME), 443 (HTTPS), 4443/TCP (JVB fallback), 10000/UDP (media)
# =============================================================================

hostname: jitsi
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key/hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget
  - openssl

# ----------------------------------------------------------------------------
# Swap (helps small instances survive build-time memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.jitsi-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="meet.example.com"        # Public FQDN for this Jitsi instance
      LE_EMAIL="admin@example.com"         # Let's Encrypt registration email
      ENABLE_TLS="true"                    # Set false to skip certbot (no DNS yet)

      # Jitsi internal secrets (auto-generated if left as CHANGE_ME)
      JICOFO_AUTH_PASSWORD="CHANGE_ME"     # Jicofo XMPP component password
      JVB_AUTH_PASSWORD="CHANGE_ME"        # JVB XMPP component password
      JIGASI_XMPP_PASSWORD="CHANGE_ME"     # Jigasi XMPP password (optional SIP)
      JIBRI_RECORDER_PASSWORD="CHANGE_ME"  # Jibri recorder password (optional)
      JIBRI_XMPP_PASSWORD="CHANGE_ME"      # Jibri XMPP password (optional)

      # Optional: restrict room creation to authenticated users only
      # Set to "all"  to allow anyone to create rooms (default, public server)
      # Set to "jvb"  to require authenticated Jitsi users to start meetings
      ENABLE_AUTH="0"
      ENABLE_GUESTS="1"

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/jitsi.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx reverse-proxy vhost (placeholder; bootstrap rewrites domain) -----
  - path: /etc/nginx/sites-available/jitsi.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          # ACME challenge (needed before TLS)
          location /.well-known/acme-challenge/ { root /var/www/html; }

          location / {
              proxy_pass         http://127.0.0.1:8000;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_read_timeout 300s;
              proxy_send_timeout 300s;
          }
      }

  # --- Docker Compose project for Jitsi Meet ----------------------------------
  - path: /opt/jitsi/docker-compose.yml
    permissions: '0644'
    owner: root:root
    content: |
      # Jitsi Meet — docker-jitsi-meet official stack
      # Secrets are injected at runtime via /opt/jitsi/.env (written by bootstrap)
      services:
        # ---- XMPP server --------------------------------------------------------
        prosody:
          image: jitsi/prosody:latest
          restart: unless-stopped
          expose:
            - "5222"
            - "5280"
            - "5347"
          volumes:
            - /opt/jitsi/data/prosody/config:/config
            - /opt/jitsi/data/prosody/prosody-plugins-custom:/prosody-plugins-custom
          environment:
            - AUTH_TYPE=${ENABLE_AUTH:-0}
            - ENABLE_AUTH=${ENABLE_AUTH:-0}
            - ENABLE_GUESTS=${ENABLE_GUESTS:-1}
            - GLOBAL_MODULES
            - GLOBAL_CONFIG
            - LDAP_URL
            - LDAP_BASE
            - LDAP_BINDDN
            - LDAP_BINDPW
            - LDAP_FILTER
            - LDAP_AUTH_METHOD
            - LDAP_VERSION
            - LDAP_USE_TLS
            - LDAP_TLS_CIPHERS
            - LDAP_TLS_CHECK_PEER
            - LDAP_TLS_CACERT_FILE
            - LDAP_TLS_CACERT_DIR
            - LDAP_START_TLS
            - XMPP_DOMAIN=${XMPP_DOMAIN:-meet.jitsi}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
            - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN:-guest.meet.jitsi}
            - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN:-muc.meet.jitsi}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
            - XMPP_MODULES
            - XMPP_MUC_MODULES
            - XMPP_INTERNAL_MUC_MODULES
            - XMPP_RECORDER_DOMAIN
            - JICOFO_COMPONENT_SECRET=${JICOFO_AUTH_PASSWORD}
            - JICOFO_AUTH_USER=${JICOFO_AUTH_USER:-focus}
            - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
            - JVB_AUTH_USER=${JVB_AUTH_USER:-jvb}
            - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
            - JIGASI_XMPP_USER=${JIGASI_XMPP_USER:-jigasi}
            - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
            - JIBRI_XMPP_USER=${JIBRI_XMPP_USER:-jibri}
            - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
            - JIBRI_RECORDER_USER=${JIBRI_RECORDER_USER:-recorder}
            - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
            - JWT_APP_ID
            - JWT_APP_SECRET
            - JWT_ACCEPTED_ISSUERS
            - JWT_ACCEPTED_AUDIENCES
            - JWT_ASAP_KEYSERVER
            - JWT_ALLOW_EMPTY
            - JWT_AUTH_TYPE
            - JWT_TOKEN_AUTH_MODULE
            - LOG_LEVEL
            - TZ=UTC
          networks:
            meet.jitsi:
              aliases:
                - ${XMPP_DOMAIN:-meet.jitsi}
                - auth.${XMPP_DOMAIN:-meet.jitsi}
                - guest.${XMPP_DOMAIN:-meet.jitsi}
                - muc.${XMPP_DOMAIN:-meet.jitsi}
                - internal-muc.${XMPP_DOMAIN:-meet.jitsi}

        # ---- Jitsi Conference Focus (Jicofo) ------------------------------------
        jicofo:
          image: jitsi/jicofo:latest
          restart: unless-stopped
          volumes:
            - /opt/jitsi/data/jicofo:/config
          environment:
            - AUTH_TYPE=${ENABLE_AUTH:-0}
            - BRIDGE_AVG_PARTICIPANT_STRESS
            - BRIDGE_STRESS_THRESHOLD
            - ENABLE_AUTH=${ENABLE_AUTH:-0}
            - ENABLE_AUTO_OWNER
            - ENABLE_CODEC_VP8
            - ENABLE_CODEC_VP9
            - ENABLE_CODEC_H264
            - ENABLE_OCTO
            - ENABLE_RECORDING
            - ENABLE_SCTP
            - JICOFO_ENABLE_HEALTH_CHECKS
            - JICOFO_AUTH_USER=${JICOFO_AUTH_USER:-focus}
            - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
            - JICOFO_ENABLE_BRIDGE_HEALTH_CHECKS
            - JICOFO_CONF_INITIAL_PARTICIPANT_WAIT_TIMEOUT
            - JICOFO_CONF_SINGLE_PARTICIPANT_TIMEOUT
            - JICOFO_ENABLE_ICE_FAILURE_DETECTION
            - JICOFO_TRUSTED_DOMAINS
            - JVB_BREWERY_MUC=${JVB_BREWERY_MUC:-jvbbrewery}
            - MAX_BRIDGE_PARTICIPANTS
            - OCTO_BRIDGE_SELECTION_STRATEGY
            - SENTRY_DSN=${JICOFO_SENTRY_DSN:-0}
            - SENTRY_ENVIRONMENT
            - SENTRY_RELEASE
            - TZ=UTC
            - XMPP_DOMAIN=${XMPP_DOMAIN:-meet.jitsi}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
            - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN:-muc.meet.jitsi}
            - XMPP_SERVER=${XMPP_SERVER:-prosody}
          depends_on:
            - prosody
          networks:
            - meet.jitsi

        # ---- Jitsi Videobridge (JVB) --------------------------------------------
        jvb:
          image: jitsi/jvb:latest
          restart: unless-stopped
          ports:
            - "10000:10000/udp"
            - "127.0.0.1:8080:8080"
          volumes:
            - /opt/jitsi/data/jvb:/config
          environment:
            - DOCKER_HOST_ADDRESS=${DOCKER_HOST_ADDRESS}
            - ENABLE_COLIBRI_WEBSOCKET
            - ENABLE_OCTO
            - JVB_AUTH_USER=${JVB_AUTH_USER:-jvb}
            - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
            - JVB_BREWERY_MUC=${JVB_BREWERY_MUC:-jvbbrewery}
            - JVB_PORT=${JVB_PORT:-10000}
            - JVB_MUC_NICKNAME
            - JVB_STUN_SERVERS=${JVB_STUN_SERVERS:-meet-jit-si-turnrelay.jitsi.net:443}
            - JVB_OCTO_BIND_ADDRESS
            - JVB_OCTO_PUBLIC_ADDRESS
            - JVB_OCTO_BIND_PORT
            - JVB_OCTO_REGION
            - JVB_WS_DOMAIN
            - JVB_WS_SERVER_ID
            - PUBLIC_URL=https://${APP_DOMAIN}
            - SENTRY_DSN=${JVB_SENTRY_DSN:-0}
            - SENTRY_ENVIRONMENT
            - SENTRY_RELEASE
            - COLIBRI_REST_ENABLED
            - SHUTDOWN_REST_ENABLED
            - TZ=UTC
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN:-internal-muc.meet.jitsi}
            - XMPP_SERVER=${XMPP_SERVER:-prosody}
          depends_on:
            - prosody
          networks:
            - meet.jitsi

        # ---- Jitsi Meet web front-end -------------------------------------------
        web:
          image: jitsi/web:latest
          restart: unless-stopped
          ports:
            - "127.0.0.1:8000:80"
          volumes:
            - /opt/jitsi/data/web:/config
            - /opt/jitsi/data/web/certs:/config/keys
            - /opt/jitsi/data/transcripts:/usr/share/jitsi-meet/transcripts
          environment:
            - AMPLITUDE_ID
            - ANALYTICS_SCRIPT_URLS
            - ANALYTICS_WHITELISTED_EVENTS
            - CALLSTATS_CUSTOM_SCRIPT_URL
            - CALLSTATS_ID
            - CALLSTATS_SECRET
            - CHROME_EXTENSION_BANNER_JSON
            - CONFCODE_URL
            - CONFIG_EXTERNAL_CONNECT
            - DEFAULT_LANGUAGE
            - DEPLOYMENTINFO_ENVIRONMENT
            - DEPLOYMENTINFO_ENVIRONMENT_TYPE
            - DEPLOYMENTINFO_REGION
            - DEPLOYMENTINFO_SHARD
            - DEPLOYMENTINFO_USERREGION
            - DIALIN_NUMBERS_URL
            - DIALOUT_AUTH_URL
            - DIALOUT_CODES_URL
            - DROPBOX_APPKEY
            - DROPBOX_REDIRECT_URI
            - DYNAMIC_BRANDING_URL
            - ENABLE_AUDIO_PROCESSING
            - ENABLE_AUTH=${ENABLE_AUTH:-0}
            - ENABLE_CALENDAR
            - ENABLE_FILE_RECORDING_SERVICE
            - ENABLE_FILE_RECORDING_SERVICE_SHARING
            - ENABLE_GUESTS=${ENABLE_GUESTS:-1}
            - ENABLE_IPV6
            - ENABLE_LETSENCRYPT
            - ENABLE_NO_AUDIO_DETECTION
            - ENABLE_P2P
            - ENABLE_PREJOIN_PAGE
            - ENABLE_RECORDING
            - ENABLE_REMB
            - ENABLE_REQUIRE_DISPLAY_NAME
            - ENABLE_SIMULCAST
            - ENABLE_STATS_ID
            - ENABLE_STEREO
            - ENABLE_SUBDOMAINS
            - ENABLE_TALK_WHILE_MUTED
            - ENABLE_TCC
            - ENABLE_TRANSCRIPTIONS
            - ETHERPAD_PUBLIC_URL
            - ETHERPAD_URL
            - GOOGLE_ANALYTICS_ID
            - GOOGLE_API_APP_CLIENT_ID
            - HIDE_PREMEETING_BUTTONS
            - IFRAMEAPI_ORIGIN
            - INVITE_SERVICE_URL
            - JICOFO_AUTH_USER=${JICOFO_AUTH_USER:-focus}
            - LETSENCRYPT_DOMAIN=${APP_DOMAIN}
            - LETSENCRYPT_EMAIL=${LE_EMAIL}
            - LETSENCRYPT_USE_STAGING
            - MATOMO_ENDPOINT
            - MATOMO_SITE_ID
            - MICROSOFT_API_APP_CLIENT_ID
            - NGINX_RESOLVER
            - NGINX_WORKER_PROCESSES
            - NGINX_WORKER_CONNECTIONS
            - NGNIX_MAX_BODY
            - PUBLIC_URL=https://${APP_DOMAIN}
            - P2P_STUN_SERVERS
            - RESOLUTION
            - RESOLUTION_MIN
            - RESOLUTION_WIDTH
            - RESOLUTION_WIDTH_MIN
            - SENTRY_DSN=${WEB_SENTRY_DSN:-0}
            - SENTRY_ENVIRONMENT
            - SENTRY_RELEASE
            - START_AUDIO_MUTED
            - START_AUDIO_ONLY
            - START_BITRATE
            - START_SILENT
            - START_VIDEO_MUTED
            - STATS_ID
            - STUN_HOST
            - STUN_PORT
            - SUBDOMAINS_REGEXP
            - TOOLBAR_BUTTONS
            - TZ=UTC
            - TURN_CREDENTIALS
            - TURN_HOST
            - TURNS_HOST
            - TURN_PORT
            - TURNS_PORT
            - TURN_TRANSPORT
            - XMPP_BOSH_URL_BASE=http://prosody:5280
            - XMPP_DOMAIN=${XMPP_DOMAIN:-meet.jitsi}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN:-auth.meet.jitsi}
            - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN:-guest.meet.jitsi}
            - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN:-muc.meet.jitsi}
            - XMPP_RECORDER_DOMAIN
            - TOKEN_AUTH_URL
          depends_on:
            - prosody
          networks:
            - meet.jitsi

      networks:
        meet.jitsi:
          driver: bridge
          internal: false

  # --- main bootstrap script --------------------------------------------------
  - path: /root/jitsi-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/jitsi-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files)..."
        DEBIAN_FRONTEND=noninteractive apt-get install --reinstall -y postfix || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.jitsi-bootstrap.env

      echo "=== Jitsi bootstrap started: $(date) ==="

      # --- SIGPIPE-safe random secret helper (required under set -e + pipefail) ---
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # Auto-generate any secrets left as CHANGE_ME
      [ "$JICOFO_AUTH_PASSWORD"   = "CHANGE_ME" ] && JICOFO_AUTH_PASSWORD="$(rand)"
      [ "$JVB_AUTH_PASSWORD"      = "CHANGE_ME" ] && JVB_AUTH_PASSWORD="$(rand)"
      [ "$JIGASI_XMPP_PASSWORD"   = "CHANGE_ME" ] && JIGASI_XMPP_PASSWORD="$(rand)"
      [ "$JIBRI_RECORDER_PASSWORD" = "CHANGE_ME" ] && JIBRI_RECORDER_PASSWORD="$(rand)"
      [ "$JIBRI_XMPP_PASSWORD"    = "CHANGE_ME" ] && JIBRI_XMPP_PASSWORD="$(rand)"

      # --- install Docker CE via official script (distro-agnostic) ---------------
      if ! command -v docker >/dev/null 2>&1; then
        # fallback: noble repo until 26.04 published
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
        rm -f /tmp/get-docker.sh
      fi
      systemctl enable --now docker

      # --- install Docker Compose v2 plugin if not present -----------------------
      if ! docker compose version >/dev/null 2>&1; then
        COMPOSE_VER="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
          | jq -r '.tag_name' 2>/dev/null || echo 'v2.27.1')"
        COMPOSE_URL="https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-$(uname -m)"
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -fsSL "$COMPOSE_URL" -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      fi

      echo "Docker  : $(docker --version)"
      echo "Compose : $(docker compose version)"

      # --- detect public IP for JVB media routing --------------------------------
      PUBLIC_IP="$(curl -fsSL --max-time 5 https://api4.my-ip.io/ip 2>/dev/null \
        || curl -fsSL --max-time 5 https://ifconfig.me 2>/dev/null \
        || hostname -I | awk '{print $1}')"
      echo "Public IP detected: ${PUBLIC_IP}"

      # --- create persistent data directories ------------------------------------
      mkdir -p /opt/jitsi/data/{web/certs,web,prosody/config,prosody/prosody-plugins-custom,jicofo,jvb,jibri,transcripts}
      chown -R root:root /opt/jitsi/data

      # --- write /opt/jitsi/.env for Docker Compose ------------------------------
      cat > /opt/jitsi/.env <<DOTENV
      # Jitsi Meet docker-compose environment — generated by bootstrap $(date)
      # Edit /root/.jitsi-bootstrap.env to change operator vars, then re-run bootstrap.

      # Public URL & XMPP
      PUBLIC_URL=https://${APP_DOMAIN}
      DOCKER_HOST_ADDRESS=${PUBLIC_IP}
      XMPP_DOMAIN=meet.jitsi
      XMPP_AUTH_DOMAIN=auth.meet.jitsi
      XMPP_GUEST_DOMAIN=guest.meet.jitsi
      XMPP_MUC_DOMAIN=muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      XMPP_SERVER=prosody

      # Auth
      ENABLE_AUTH=${ENABLE_AUTH:-0}
      ENABLE_GUESTS=${ENABLE_GUESTS:-1}
      AUTH_TYPE=internal

      # Secrets
      JICOFO_AUTH_USER=focus
      JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      JVB_AUTH_USER=jvb
      JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      JIGASI_XMPP_USER=jigasi
      JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
      JIBRI_XMPP_USER=jibri
      JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
      JIBRI_RECORDER_USER=recorder
      JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}

      # JVB media port
      JVB_PORT=10000
      JVB_BREWERY_MUC=jvbbrewery
      JVB_STUN_SERVERS=meet-jit-si-turnrelay.jitsi.net:443

      # Misc
      TZ=UTC
      DOTENV
      chmod 600 /opt/jitsi/.env

      # --- pull and start Jitsi containers ----------------------------------------
      cd /opt/jitsi
      docker compose pull
      docker compose up -d

      # --- nginx: replace domain placeholder and activate vhost -------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|g" /etc/nginx/sites-available/jitsi.conf
      ln -sf /etc/nginx/sites-available/jitsi.conf /etc/nginx/sites-enabled/jitsi.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- firewall ---------------------------------------------------------------
      ufw allow OpenSSH
      ufw allow 80/tcp    comment 'Jitsi HTTP / ACME'
      ufw allow 443/tcp   comment 'Jitsi HTTPS'
      ufw allow 4443/tcp  comment 'Jitsi JVB fallback TCP'
      ufw allow 10000/udp comment 'Jitsi JVB media UDP'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ---------------
      if [ "${ENABLE_TLS}" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "${LE_EMAIL}" -d "${APP_DOMAIN}" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS resolves: certbot --nginx -d ${APP_DOMAIN}"
      fi

      PROTO="http"
      [ "${ENABLE_TLS}" = "true" ] && PROTO="https"

      # --- write credentials summary (chmod 600) ----------------------------------
      cat > /root/jitsi-credentials.txt <<CREDS
      ===== Jitsi Meet bootstrap complete: $(date) =====

      URL               : ${PROTO}://${APP_DOMAIN}/

      JICOFO password   : ${JICOFO_AUTH_PASSWORD}
      JVB password      : ${JVB_AUTH_PASSWORD}
      JIGASI password   : ${JIGASI_XMPP_PASSWORD}
      JIBRI recorder pw : ${JIBRI_RECORDER_PASSWORD}
      JIBRI XMPP pw     : ${JIBRI_XMPP_PASSWORD}

      Public IP (JVB)   : ${PUBLIC_IP}
      Data directory    : /opt/jitsi/data/
      Compose file      : /opt/jitsi/docker-compose.yml
      Env file          : /opt/jitsi/.env
      Log               : /var/log/jitsi-bootstrap.log

      Firewall ports open:
        22/tcp   SSH
        80/tcp   HTTP (ACME challenge)
        443/tcp  HTTPS
        4443/tcp JVB fallback TCP
        10000/udp JVB media UDP

      Useful commands:
        docker compose -f /opt/jitsi/docker-compose.yml ps
        docker compose -f /opt/jitsi/docker-compose.yml logs -f
        docker compose -f /opt/jitsi/docker-compose.yml restart
      CREDS
      chmod 600 /root/jitsi-credentials.txt

      echo "=== Jitsi bootstrap finished. Credentials: /root/jitsi-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once everything above has been laid down
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/jitsi-bootstrap.sh" ]

final_message: "Jitsi Meet bootstrap done after $UPTIME s. See /root/jitsi-credentials.txt and /var/log/jitsi-bootstrap.log"
