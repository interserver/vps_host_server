#cloud-config
# =============================================================================
# OpenClaw — installed NATIVELY on the KVM VPS (no Docker, no nested container)
# Runs the OpenClaw Gateway as a systemd service on port 18789 (LAN bind),
# straight on the host. Edit /etc/openclaw/openclaw.env with your token + your
# provider API keys, then:  systemctl restart openclaw-gateway
# =============================================================================

package_update: true
package_upgrade: false

packages:
  - curl
  - git
  - ca-certificates
  - gnupg
  - jq

write_files:
  # --- Gateway secrets + runtime env (read by the systemd service) ----------
  - path: /etc/openclaw/openclaw.env
    permissions: '0600'
    owner: root:root
    content: |
      # OpenClaw Gateway Token (Change this to a strong randomized string!)
      OPENCLAW_GATEWAY_TOKEN=ChangeMeSuperSecretToken123!

      # Network: bind mode for the gateway listener.
      # OpenClaw blocks binding beyond loopback unless auth is configured, and
      # 'lan'/'auto' fail on hosts with no detectable LAN interface — which
      # crash-loops the service. 'loopback' always starts and listens on
      # 127.0.0.1:18789; expose it remotely via SSH tunnel / Tailscale, or set
      # this to 'lan' AFTER you have set a strong OPENCLAW_GATEWAY_TOKEN above.
      OPENCLAW_GATEWAY_BIND=loopback
      OPENCLAW_GATEWAY_PORT=18789

      # Runtime home / state (service runs directly on the host as root)
      HOME=/root
      OPENCLAW_HOME=/root
      OPENCLAW_STATE_DIR=/root/.openclaw
      OPENCLAW_CONFIG_DIR=/root/.openclaw
      OPENCLAW_CONFIG_PATH=/root/.openclaw/openclaw.json
      OPENCLAW_WORKSPACE_DIR=/root/.openclaw/workspace

      # Model Provider API Keys
      ANTHROPIC_API_KEY=sk-ant-your-key-here
      OPENAI_API_KEY=sk-your-openai-key-here
      GEMINI_API_KEY=your-gemini-key-here

  # --- systemd unit: run the gateway natively on the VPS --------------------
  - path: /etc/systemd/system/openclaw-gateway.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=OpenClaw Gateway (native, no Docker)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      EnvironmentFile=/etc/openclaw/openclaw.env
      # Bind mode + port come from openclaw.env (default loopback:18789).
      # Binding beyond loopback is refused by OpenClaw unless a token is set.
      # --allow-unconfigured: start/listen without a completed `openclaw onboard`
      # (which needs an LLM API key + TTY); without it the gateway runs but never
      # binds 18789. The operator runs `openclaw onboard` later to add a model.
      ExecStart=/usr/local/bin/openclaw gateway --bind ${OPENCLAW_GATEWAY_BIND} --port ${OPENCLAW_GATEWAY_PORT} --allow-unconfigured
      Restart=always
      RestartSec=5
      TimeoutStopSec=30

      [Install]
      WantedBy=multi-user.target

  # --- native bootstrap script ----------------------------------------------
  - path: /root/openclaw-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      # NOTE: intentionally NO `set -e` — the external installer has optional
      # steps; we check the things that matter explicitly instead.
      set -uo pipefail
      exec > >(tee -a /var/log/openclaw-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      echo "=== OpenClaw native bootstrap started: $(date) ==="

      # --- Node.js (OpenClaw needs Node >= 22.19; 24 recommended) ---
      NODE_MAJOR="$(node -v 2>/dev/null | sed -n 's/^v\([0-9]\+\).*/\1/p')"
      if [ -z "${NODE_MAJOR:-}" ] || [ "${NODE_MAJOR:-0}" -lt 22 ]; then
        echo "Installing Node.js 24.x ..."
        curl -fsSL https://deb.nodesource.com/setup_24.x -o /tmp/nodesource_setup.sh
        bash /tmp/nodesource_setup.sh
        rm -f /tmp/nodesource_setup.sh
        DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
      fi
      if ! node -v >/dev/null 2>&1; then
        echo "ERROR: Node.js installation failed" >&2
        exit 1
      fi
      echo "Node: $(node -v)"

      # --- install the OpenClaw CLI natively (official installer, no Docker) ---
      export HOME=/root
      curl -fsSL https://openclaw.ai/install.sh -o /tmp/openclaw-install.sh || { echo "ERROR: failed to download OpenClaw installer" >&2; exit 1; }
      if ! bash /tmp/openclaw-install.sh; then
        echo "ERROR: OpenClaw installer failed" >&2
        exit 1
      fi
      rm -f /tmp/openclaw-install.sh

      # --- resolve the installed binary and expose it at a stable path ---
      hash -r 2>/dev/null || true
      OPENCLAW_BIN="$(command -v openclaw 2>/dev/null || true)"
      if [ -z "$OPENCLAW_BIN" ]; then
        for cand in /usr/local/bin/openclaw /usr/bin/openclaw /root/.local/bin/openclaw /root/.openclaw/bin/openclaw /opt/openclaw/bin/openclaw; do
          if [ -x "$cand" ]; then OPENCLAW_BIN="$cand"; break; fi
        done
      fi
      if [ -z "$OPENCLAW_BIN" ]; then
        echo "ERROR: openclaw binary not found after install" >&2
        exit 1
      fi
      echo "OpenClaw binary: $OPENCLAW_BIN"
      if [ "$OPENCLAW_BIN" != "/usr/local/bin/openclaw" ]; then
        ln -sf "$OPENCLAW_BIN" /usr/local/bin/openclaw
      fi

      install -d -m 0700 /root/.openclaw /root/.openclaw/workspace

      # --- Prefer provisioner-supplied secret as the gateway token ---
      # The gateway token lives in /etc/openclaw/openclaw.env (read by the
      # systemd unit via EnvironmentFile). If the provisioner supplied the VPS
      # root password, use it as OPENCLAW_GATEWAY_TOKEN instead of the placeholder
      # so the gateway has a strong token on first boot.
      if [ -r /etc/vps-provision.env ]; then
        . /etc/vps-provision.env
        if [ -n "${VPS_ADMIN_PASS:-}" ] && [ -f /etc/openclaw/openclaw.env ]; then
          if grep -q '^OPENCLAW_GATEWAY_TOKEN=' /etc/openclaw/openclaw.env; then
            sed -i "s|^OPENCLAW_GATEWAY_TOKEN=.*|OPENCLAW_GATEWAY_TOKEN=${VPS_ADMIN_PASS}|" /etc/openclaw/openclaw.env
          else
            echo "OPENCLAW_GATEWAY_TOKEN=${VPS_ADMIN_PASS}" >> /etc/openclaw/openclaw.env
          fi
          echo "Set OPENCLAW_GATEWAY_TOKEN from provisioner-supplied password."
        fi
      fi

      # --- start the gateway as a systemd service (straight on the VPS) ---
      systemctl daemon-reload
      systemctl enable --now openclaw-gateway.service
      sleep 2
      systemctl --no-pager --full status openclaw-gateway.service || true

      echo "=== OpenClaw bootstrap finished: $(date) ==="
      echo "Gateway listening on :18789 (LAN). Edit /etc/openclaw/openclaw.env then: systemctl restart openclaw-gateway"

  # --- SSH login banner prompting the operator to set secrets ----------------
  - path: /etc/update-motd.d/99-openclaw-setup
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      echo -e "\e[1;31m"
      echo "====================================================================="
      echo "  ACTION REQUIRED: OPENCLAW API KEYS & SECURITY TOKEN NEEDED"
      echo "====================================================================="
      echo -e "\e[0m"
      echo "OpenClaw is installed NATIVELY and runs as a systemd service"
      echo "(openclaw-gateway) on port 18789 - no Docker involved."
      echo ""
      echo "It is currently using placeholders. Update your secrets:"
      echo ""
      echo "  1. Edit your secrets:"
      echo "     nano /etc/openclaw/openclaw.env"
      echo ""
      echo "  2. Replace the placeholders with your actual values:"
      echo "     - OPENCLAW_GATEWAY_TOKEN=ChangeMeSuperSecretToken123!"
      echo "     - ANTHROPIC_API_KEY=sk-ant-your-key-here"
      echo "     - OPENAI_API_KEY=sk-your-openai-key-here"
      echo "     - GEMINI_API_KEY=your-gemini-key-here"
      echo ""
      echo "  3. Restart OpenClaw to apply changes:"
      echo "     systemctl restart openclaw-gateway"
      echo ""
      echo "  Status / logs:"
      echo "     systemctl status openclaw-gateway"
      echo "     journalctl -u openclaw-gateway -f"
      echo "====================================================================="

# ----------------------------------------------------------------------------
# Run the native bootstrap once the files above have been laid down
# ----------------------------------------------------------------------------
bootcmd:
  # Free the dpkg/apt lock before cloud-init's package stage: gracefully stop
  # (SIGTERM, NOT kill -9) unattended-upgrades + apt-daily so they release the
  # lock, and mask the timers/services so they don't restart this boot.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop unattended-upgrades.service apt-daily.service apt-daily-upgrade.service 2>/dev/null; systemctl mask apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/openclaw-bootstrap.sh" ]

final_message: "OpenClaw native bootstrap done after $UPTIME s. Edit /etc/openclaw/openclaw.env then run: systemctl restart openclaw-gateway"


