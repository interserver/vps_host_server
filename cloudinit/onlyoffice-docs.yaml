#cloud-config
# =============================================================================
# ONLYOFFICE Docs "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: ONLYOFFICE Document Server (Docker Compose) + Nginx reverse proxy
#        UFW firewall + fail2ban + swap + unattended-upgrades
# ONLYOFFICE Docs is a self-hosted collaborative office suite (Writer, Calc,
# Impress-compatible) that integrates with Nextcloud, Seafile, ownCloud, etc.
# https://www.onlyoffice.com/office-suite.aspx
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.onlyoffice-bootstrap.env
# block before launching. Secrets are auto-generated per-boot if left as the
# CHANGE_ME defaults.
# =============================================================================

hostname: onlyoffice
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key / hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget
  - python3
  - pwgen

# ----------------------------------------------------------------------------
# Swap (survive build-time memory spikes; ONLYOFFICE pulls large images)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk ahead of the bootstrap script
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.onlyoffice-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # hostname / primary domain (no scheme)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (DNS not pointed yet)
      JWT_SECRET="CHANGE_ME"            # ONLYOFFICE JWT secret (auto-generated if left as-is)
      DB_PASSWORD="CHANGE_ME"           # PostgreSQL password for onlyoffice user
      RABBITMQ_PASSWORD="CHANGE_ME"     # RabbitMQ password (auto-generated if left as-is)
      # Data directories persisted on host — back these up!
      OO_DATA_DIR="/opt/onlyoffice/data"
      OO_LOG_DIR="/opt/onlyoffice/logs"
      OO_DB_DIR="/opt/onlyoffice/db"
      OO_FONTS_DIR="/opt/onlyoffice/fonts"
      OO_RABBITMQ_DIR="/opt/onlyoffice/rabbitmq"
      OO_REDIS_DIR="/opt/onlyoffice/redis"

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/onlyoffice.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx reverse-proxy vhost (bootstrap replaces APP_DOMAIN_PLACEHOLDER) --
  - path: /etc/nginx/sites-available/onlyoffice.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Let's Encrypt ACME challenge
          location /.well-known/acme-challenge/ { root /var/www/html; }

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          # ONLYOFFICE document uploads can be large
          client_max_body_size 100M;

          location / {
              proxy_pass         http://127.0.0.1:8080;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_read_timeout 3600s;
              proxy_send_timeout 3600s;
              proxy_buffering    off;
          }
      }

  # --- Docker Compose project for ONLYOFFICE Docs ----------------------------
  - path: /opt/onlyoffice/docker-compose.yml
    permissions: '0640'
    owner: root:root
    content: |
      # ONLYOFFICE Docs Docker Compose
      # JWT_SECRET, DB_PASSWORD, and RABBITMQ_PASSWORD are written at bootstrap.
      version: "3.9"

      services:
        onlyoffice-documentserver:
          image: onlyoffice/documentserver:latest
          restart: unless-stopped
          depends_on:
            - onlyoffice-postgresql
            - onlyoffice-rabbitmq
            - onlyoffice-redis
          environment:
            - DB_TYPE=postgres
            - DB_HOST=onlyoffice-postgresql
            - DB_PORT=5432
            - DB_NAME=onlyoffice
            - DB_USER=onlyoffice
            - DB_PWD=${DB_PASSWORD}
            - AMQP_URI=amqp://onlyoffice:${RABBITMQ_PASSWORD}@onlyoffice-rabbitmq
            - REDIS_SERVER_HOST=onlyoffice-redis
            - REDIS_SERVER_PORT=6379
            - JWT_ENABLED=true
            - JWT_SECRET=${JWT_SECRET}
            - JWT_HEADER=Authorization
            - JWT_IN_BODY=true
          ports:
            - "127.0.0.1:8080:80"
          volumes:
            - ${OO_DATA_DIR}:/var/www/onlyoffice/Data
            - ${OO_LOG_DIR}:/var/log/onlyoffice
            - ${OO_FONTS_DIR}:/usr/share/fonts/truetype/custom
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 120s

        onlyoffice-postgresql:
          image: postgres:14-alpine
          restart: unless-stopped
          environment:
            - POSTGRES_DB=onlyoffice
            - POSTGRES_USER=onlyoffice
            - POSTGRES_PASSWORD=${DB_PASSWORD}
          volumes:
            - ${OO_DB_DIR}:/var/lib/postgresql/data
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U onlyoffice"]
            interval: 15s
            timeout: 5s
            retries: 5

        onlyoffice-rabbitmq:
          image: rabbitmq:3-alpine
          restart: unless-stopped
          environment:
            - RABBITMQ_DEFAULT_USER=onlyoffice
            - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
          volumes:
            - ${OO_RABBITMQ_DIR}:/var/lib/rabbitmq
          healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            interval: 15s
            timeout: 10s
            retries: 5

        onlyoffice-redis:
          image: redis:7-alpine
          restart: unless-stopped
          volumes:
            - ${OO_REDIS_DIR}:/data
          healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 15s
            timeout: 5s
            retries: 5

  # --- main bootstrap script -------------------------------------------------
  - path: /root/onlyoffice-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/onlyoffice-bootstrap.log) 2>&1
      source /root/.onlyoffice-bootstrap.env

      echo "=== ONLYOFFICE Docs bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) ------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$JWT_SECRET"        = "CHANGE_ME" ] && JWT_SECRET="$(rand)"
      [ "$DB_PASSWORD"       = "CHANGE_ME" ] && DB_PASSWORD="$(rand)"
      [ "$RABBITMQ_PASSWORD" = "CHANGE_ME" ] && RABBITMQ_PASSWORD="$(rand)"

      # --- install Docker CE via official script (distro-agnostic) ----------
      if ! command -v docker >/dev/null 2>&1; then
        echo "Installing Docker CE..."
        # fallback: noble repo until 26.04 published
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
        rm -f /tmp/get-docker.sh
      fi
      systemctl enable --now docker

      # --- Docker Compose v2 plugin -----------------------------------------
      if ! docker compose version >/dev/null 2>&1; then
        COMPOSE_VER="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
          | jq -r '.tag_name' 2>/dev/null || echo 'v2.27.1')"
        COMPOSE_URL="https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-$(uname -m)"
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -fsSL "$COMPOSE_URL" -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      fi
      echo "Docker  : $(docker --version)"
      echo "Compose : $(docker compose version)"

      # --- Create data directories -------------------------------------------
      mkdir -p "${OO_DATA_DIR}" "${OO_LOG_DIR}" "${OO_DB_DIR}" \
               "${OO_FONTS_DIR}" "${OO_RABBITMQ_DIR}" "${OO_REDIS_DIR}"
      chmod 755 "${OO_DATA_DIR}" "${OO_LOG_DIR}" "${OO_FONTS_DIR}"

      # --- Write the Compose .env file --------------------------------------
      cat > /opt/onlyoffice/.env <<DOTENV
      # Generated by onlyoffice-bootstrap.sh — $(date)
      JWT_SECRET=${JWT_SECRET}
      DB_PASSWORD=${DB_PASSWORD}
      RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      OO_DATA_DIR=${OO_DATA_DIR}
      OO_LOG_DIR=${OO_LOG_DIR}
      OO_DB_DIR=${OO_DB_DIR}
      OO_FONTS_DIR=${OO_FONTS_DIR}
      OO_RABBITMQ_DIR=${OO_RABBITMQ_DIR}
      OO_REDIS_DIR=${OO_REDIS_DIR}
      DOTENV
      chmod 600 /opt/onlyoffice/.env

      # --- Pull images + start stack ----------------------------------------
      cd /opt/onlyoffice
      docker compose pull
      docker compose up -d

      # --- nginx vhost: replace domain placeholder --------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|g" \
        /etc/nginx/sites-available/onlyoffice.conf
      ln -sf /etc/nginx/sites-available/onlyoffice.conf \
        /etc/nginx/sites-enabled/onlyoffice.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- Firewall: SSH + HTTP + HTTPS only --------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ---------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot --nginx -d ${APP_DOMAIN}"
      fi

      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- Write credentials summary (chmod 600) ----------------------------
      cat > /root/onlyoffice-credentials.txt <<CREDS
      ===== ONLYOFFICE Docs bootstrap complete: $(date) =====

      Web UI (Editor API) : ${PROTO}://${APP_DOMAIN}/
      Healthcheck         : ${PROTO}://${APP_DOMAIN}/healthcheck

      JWT Secret          : ${JWT_SECRET}
      DB Password         : ${DB_PASSWORD}
      RabbitMQ Password   : ${RABBITMQ_PASSWORD}

      Integration note    : Configure your Nextcloud/Seafile/ownCloud plugin
                            to point at ${PROTO}://${APP_DOMAIN}
                            and supply the JWT Secret above.

      Data dir            : ${OO_DATA_DIR}
      Logs dir            : ${OO_LOG_DIR}
      Compose dir         : /opt/onlyoffice/
      Bootstrap log       : /var/log/onlyoffice-bootstrap.log

      Useful commands:
        docker compose -f /opt/onlyoffice/docker-compose.yml ps
        docker compose -f /opt/onlyoffice/docker-compose.yml logs -f
        docker compose -f /opt/onlyoffice/docker-compose.yml pull && \
          docker compose -f /opt/onlyoffice/docker-compose.yml up -d   # upgrade
      CREDS
      chmod 600 /root/onlyoffice-credentials.txt

      echo "=== ONLYOFFICE Docs bootstrap finished: $(date) ==="
      echo "=== Credentials saved to /root/onlyoffice-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all write_files have been placed
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/onlyoffice-bootstrap.sh" ]

final_message: "ONLYOFFICE Docs bootstrap done after $UPTIME s. See /root/onlyoffice-credentials.txt and /var/log/onlyoffice-bootstrap.log"
