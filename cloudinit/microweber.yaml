#cloud-config
# =============================================================================
# Microweber Website Builder "one-click app" — Ubuntu 26.04 LTS cloud-init
# Stack: Nginx + PHP-FPM + MariaDB + Composer + Microweber + Certbot (Let's Encrypt)
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in `write_files` -> /root/.microweber-bootstrap.env before
# launching, OR inject them via your provisioner. Passwords are randomised
# per-boot when left as the defaults (CHANGE_ME).
# =============================================================================

hostname: microweber
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve default (provisioner injects customer SSH key + hostname)
# ----------------------------------------------------------------------------
users:
  - default
  - name: deploy
    groups: [sudo, www-data]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: false
packages:
  - nginx
  - mariadb-server
  - mariadb-client
  - php-fpm
  - php-mysql
  - php-curl
  - php-gd
  - php-mbstring
  - php-xml
  - php-intl
  - php-zip
  - php-bcmath
  - php-json
  - php8.3-opcache
  - php-sqlite3
  - php-imagick
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - unzip
  - wget
  - git
  - htop
  - composer

# ----------------------------------------------------------------------------
# Swap (helps small instances survive MariaDB + PHP/Composer memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable bootstrap variables ---------------------------------
  - path: /root/.microweber-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE -----
      APP_DOMAIN="example.com"          # primary domain (no scheme)
      APP_DOMAIN_WWW="www.example.com"  # www alias (leave empty to skip)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (e.g. DNS not pointed yet)

      MW_ADMIN_USER="admin"
      MW_ADMIN_EMAIL="admin@example.com"
      MW_SITE_NAME="My Microweber Site"

      # DB creds — randomised on first boot if left as CHANGE_ME
      MW_DB_NAME="microweber"
      MW_DB_USER="mw_user"
      MW_DB_PASS="CHANGE_ME"
      MW_ADMIN_PASS="CHANGE_ME"
      MYSQL_ROOT_PASS="CHANGE_ME"

      MW_PATH="/var/www/microweber"

  # --- Nginx vhost (placeholder tokens replaced by bootstrap) ----------------
  - path: /etc/nginx/sites-available/microweber.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name SERVER_NAMES_PLACEHOLDER;

          root /var/www/microweber/public;
          index index.php index.html;

          client_max_body_size 64M;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          location / {
              try_files $uri $uri/ /index.php?$query_string;
          }

          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:PHP_FPM_SOCK_PLACEHOLDER;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              fastcgi_read_timeout 300;
          }

          # Deny hidden files except .well-known
          location ~ /\.(?!well-known) {
              deny all;
          }

          # Block direct access to sensitive paths
          location ~* /(userfiles|cache|backups|storage|config)/ {
              deny all;
              return 403;
          }

          # Static assets — aggressive cache
          location ~* \.(css|js|png|jpe?g|gif|webp|svg|ico|woff2?|ttf|eot)$ {
              expires max;
              log_not_found off;
              access_log off;
          }

          location = /favicon.ico { log_not_found off; access_log off; }
          location = /robots.txt  { allow all; log_not_found off; access_log off; }
      }

  # --- fail2ban configuration ------------------------------------------------
  - path: /etc/fail2ban/jail.d/microweber.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades ------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- main bootstrap script -------------------------------------------------
  - path: /root/microweber-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/microweber-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.microweber-bootstrap.env

      echo "=== Microweber bootstrap started: $(date) ==="

      # --- SIGPIPE-safe random secret generator ---
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # --- randomise any CHANGE_ME passwords ---
      [ "$MW_DB_PASS"      = "CHANGE_ME" ] && MW_DB_PASS="$(rand)"
      [ "$MW_ADMIN_PASS"   = "CHANGE_ME" ] && MW_ADMIN_PASS="$(rand)"
      [ "$MYSQL_ROOT_PASS" = "CHANGE_ME" ] && MYSQL_ROOT_PASS="$(rand)"

      # Prefer provisioner-supplied admin email + password
      [ -r /etc/vps-provision.env ] && . /etc/vps-provision.env
      [ -n "${VPS_ADMIN_PASS:-}" ] && MW_ADMIN_PASS="$VPS_ADMIN_PASS"
      [ -n "${VPS_ADMIN_EMAIL:-}" ] && MW_ADMIN_EMAIL="$VPS_ADMIN_EMAIL"
      [ -n "${VPS_ADMIN_EMAIL:-}" ] && LE_EMAIL="$VPS_ADMIN_EMAIL"

      # --- detect PHP-FPM socket ---
      PHP_FPM_SOCK="$(find /run/php -name 'php*-fpm.sock' 2>/dev/null | head -n1 || true)"
      echo "PHP-FPM socket: ${PHP_FPM_SOCK}"

      # --- detect PHP version ---
      PHP_VER="$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || true)"
      echo "PHP version: ${PHP_VER}"

      # --- tune PHP for Microweber ---
      FPM_INI="/etc/php/${PHP_VER}/fpm/php.ini"
      if [ -f "$FPM_INI" ]; then
        sed -ri 's/^;?upload_max_filesize.*/upload_max_filesize = 64M/'   "$FPM_INI"
        sed -ri 's/^;?post_max_size.*/post_max_size = 64M/'               "$FPM_INI"
        sed -ri 's/^;?memory_limit.*/memory_limit = 512M/'                "$FPM_INI"
        sed -ri 's/^;?max_execution_time.*/max_execution_time = 300/'     "$FPM_INI"
        sed -ri 's/^;?max_input_vars.*/max_input_vars = 3000/'            "$FPM_INI"
        sed -ri 's/^;?opcache\.enable\b.*/opcache.enable=1/'              "$FPM_INI"
        sed -ri 's/^;?opcache\.memory_consumption.*/opcache.memory_consumption=128/' "$FPM_INI"
      fi
      # --- enable + (re)start PHP-FPM (Ubuntu 24.04 = php8.3-fpm; no 'php-fpm' alias) ---
      FPM_SVC="php${PHP_VER}-fpm"
      systemctl list-unit-files "${FPM_SVC}.service" >/dev/null 2>&1 \
        || FPM_SVC="$(systemctl list-unit-files --no-legend 'php*-fpm.service' 2>/dev/null | awk '{print $1}' | head -n1)"
      [ -n "$FPM_SVC" ] && systemctl enable --now "$FPM_SVC" 2>/dev/null || true
      [ -n "$FPM_SVC" ] && systemctl restart "$FPM_SVC" 2>/dev/null || true

      # --- composer env: www-data's HOME (/var/www) is NOT writable, which makes
      #     composer fail with "Cannot create cache directory /var/www/.cache/composer".
      #     Provide an explicit writable COMPOSER_HOME/cache + allow superuser. git
      #     and unzip are already installed via packages: (needed for clone/extract). ---
      export COMPOSER_ALLOW_SUPERUSER=1
      export COMPOSER_HOME=/tmp/composer
      mkdir -p /tmp/composer/cache
      chown -R www-data:www-data /tmp/composer
      command -v git >/dev/null 2>&1   || DEBIAN_FRONTEND=noninteractive apt-get install -y git
      command -v unzip >/dev/null 2>&1 || DEBIAN_FRONTEND=noninteractive apt-get install -y unzip
      # --- ensure Composer is available (system package may be older; get latest) ---
      if ! command -v composer >/dev/null 2>&1; then
        curl -fsSL https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      fi
      # Update composer to latest 2.x if installed version is outdated
      composer self-update --2 2>/dev/null || true

      # --- secure MariaDB + create Microweber DB ---
      systemctl enable --now mariadb
      mysql --protocol=socket -uroot <<SQL
      ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_ROOT_PASS}';
      DELETE FROM mysql.user WHERE User='';
      DROP DATABASE IF EXISTS test;
      DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%';
      CREATE DATABASE IF NOT EXISTS \`${MW_DB_NAME}\`
        DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE USER IF NOT EXISTS '${MW_DB_USER}'@'localhost'
        IDENTIFIED BY '${MW_DB_PASS}';
      GRANT ALL PRIVILEGES ON \`${MW_DB_NAME}\`.* TO '${MW_DB_USER}'@'localhost';
      FLUSH PRIVILEGES;
      SQL

      # --- install Microweber via Composer ---
      mkdir -p "${MW_PATH}"
      chown -R www-data:www-data "${MW_PATH}"

      # Run composer as www-data but pass the writable cache/home through (sudo
      # strips env by default, so set it explicitly via `env`).
      MW_COMPOSER="sudo -u www-data env HOME=/tmp/composer COMPOSER_HOME=/tmp/composer COMPOSER_ALLOW_SUPERUSER=1 composer"
      if [ ! -f "${MW_PATH}/artisan" ]; then
        echo "Installing Microweber via Composer..."
        $MW_COMPOSER create-project microweber/microweber "${MW_PATH}" \
          --no-interaction --prefer-dist --no-dev 2>&1 \
          || {
            echo "WARN: Composer install failed, retrying once..."
            rm -rf "${MW_PATH:?}/"*
            $MW_COMPOSER create-project microweber/microweber "${MW_PATH}" \
              --no-interaction --prefer-dist --no-dev 2>&1
          }
      fi

      # --- write Laravel .env for Microweber ---
      PROTO="http"; [ "$ENABLE_TLS" = "true" ] && PROTO="https"
      APP_KEY="base64:$(openssl rand -base64 32)"

      cat > "${MW_PATH}/.env" <<ENVFILE
      APP_NAME="${MW_SITE_NAME}"
      APP_ENV=production
      APP_KEY=${APP_KEY}
      APP_DEBUG=false
      APP_URL=${PROTO}://${APP_DOMAIN}

      LOG_CHANNEL=stack
      LOG_LEVEL=error

      DB_CONNECTION=mysql
      DB_HOST=127.0.0.1
      DB_PORT=3306
      DB_DATABASE=${MW_DB_NAME}
      DB_USERNAME=${MW_DB_USER}
      DB_PASSWORD=${MW_DB_PASS}

      CACHE_DRIVER=file
      SESSION_DRIVER=file
      QUEUE_CONNECTION=sync
      ENVFILE

      chmod 640 "${MW_PATH}/.env"
      chown www-data:www-data "${MW_PATH}/.env"

      # --- Laravel / Microweber storage setup ---
      mkdir -p "${MW_PATH}/storage/framework/sessions"
      mkdir -p "${MW_PATH}/storage/framework/views"
      mkdir -p "${MW_PATH}/storage/framework/cache"
      mkdir -p "${MW_PATH}/storage/logs"
      mkdir -p "${MW_PATH}/bootstrap/cache"

      chown -R www-data:www-data "${MW_PATH}/storage" "${MW_PATH}/bootstrap/cache"
      chmod -R 775 "${MW_PATH}/storage" "${MW_PATH}/bootstrap/cache"

      # --- run Microweber CLI install ---
      if [ -f "${MW_PATH}/artisan" ]; then
        cd "${MW_PATH}"
        sudo -u www-data php artisan key:generate --force 2>/dev/null || true
        sudo -u www-data php artisan cache:clear 2>/dev/null || true
        sudo -u www-data php artisan config:clear 2>/dev/null || true

        # Microweber install command
        sudo -u www-data php artisan microweber:install \
          --username="${MW_ADMIN_USER}" \
          --email="${MW_ADMIN_EMAIL}" \
          --password="${MW_ADMIN_PASS}" \
          --db-host="127.0.0.1" \
          --db-name="${MW_DB_NAME}" \
          --db-user="${MW_DB_USER}" \
          --db-pass="${MW_DB_PASS}" \
          2>/dev/null || \
        sudo -u www-data php artisan install \
          --username="${MW_ADMIN_USER}" \
          --email="${MW_ADMIN_EMAIL}" \
          --password="${MW_ADMIN_PASS}" \
          --db-host="127.0.0.1" \
          --db-name="${MW_DB_NAME}" \
          --db-user="${MW_DB_USER}" \
          --db-pass="${MW_DB_PASS}" \
          2>/dev/null || \
        echo "WARN: CLI install not available — complete setup via browser at ${PROTO}://${APP_DOMAIN}/install"

        sudo -u www-data php artisan optimize 2>/dev/null || true
      fi

      # --- set final permissions ---
      chown -R www-data:www-data "${MW_PATH}"
      find "${MW_PATH}" -type d -exec chmod 755 {} \;
      find "${MW_PATH}" -type f -exec chmod 644 {} \;
      chmod -R 775 "${MW_PATH}/storage" "${MW_PATH}/bootstrap/cache"
      chmod 640 "${MW_PATH}/.env"

      # --- Nginx vhost ---
      SERVER_NAMES="${APP_DOMAIN}"
      [ -n "${APP_DOMAIN_WWW:-}" ] && SERVER_NAMES="${APP_DOMAIN} ${APP_DOMAIN_WWW}"
      sed -i "s|SERVER_NAMES_PLACEHOLDER|${SERVER_NAMES}|g"  /etc/nginx/sites-available/microweber.conf
      sed -i "s|PHP_FPM_SOCK_PLACEHOLDER|${PHP_FPM_SOCK}|g"  /etc/nginx/sites-available/microweber.conf
      ln -sf /etc/nginx/sites-available/microweber.conf /etc/nginx/sites-enabled/microweber.conf
      rm -f /etc/nginx/sites-enabled/default
      systemctl enable nginx 2>/dev/null || true
      nginx -t && { systemctl reload nginx 2>/dev/null || systemctl restart nginx; }

      # --- firewall ---
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt ---
      if [ "$ENABLE_TLS" = "true" ]; then
        CERTBOT_DOMAINS="-d ${APP_DOMAIN}"
        [ -n "${APP_DOMAIN_WWW:-}" ] && CERTBOT_DOMAINS="${CERTBOT_DOMAINS} -d ${APP_DOMAIN_WWW}"
        certbot --nginx --non-interactive --agree-tos \
          -m "${LE_EMAIL}" ${CERTBOT_DOMAINS} --redirect \
          || echo "WARN: certbot deferred — DNS not pointed yet. Re-run: certbot --nginx"

        # Update APP_URL in .env once TLS is active
        sed -i "s|^APP_URL=.*|APP_URL=https://${APP_DOMAIN}|" "${MW_PATH}/.env"
        sed -i "s|^APP_URL=.*|APP_URL=${PROTO}://${APP_DOMAIN}|" "${MW_PATH}/.env"
        sudo -u www-data php "${MW_PATH}/artisan" config:clear 2>/dev/null || true
      fi

      # --- write operator credentials summary ---
      cat > /root/microweber-credentials.txt <<CREDS
      ===== Microweber install complete: $(date) =====
      URL:                  ${PROTO}://${APP_DOMAIN}
      Admin URL:            ${PROTO}://${APP_DOMAIN}/admin
      Admin username:       ${MW_ADMIN_USER}
      Admin password:       ${MW_ADMIN_PASS}
      Admin email:          ${MW_ADMIN_EMAIL}

      DB name:              ${MW_DB_NAME}
      DB user:              ${MW_DB_USER}
      DB password:          ${MW_DB_PASS}
      MySQL root password:  ${MYSQL_ROOT_PASS}

      Microweber path:      ${MW_PATH}
      Bootstrap log:        /var/log/microweber-bootstrap.log

      NOTE: If browser installer appears, fill in the above DB credentials.
      CREDS
      chmod 600 /root/microweber-credentials.txt

      echo "=== Bootstrap finished: $(date). Credentials: /root/microweber-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once write_files have been laid down
# ----------------------------------------------------------------------------
bootcmd:
  # Free the dpkg/apt lock before cloud-init's package stage: gracefully stop
  # (SIGTERM, NOT kill -9) unattended-upgrades + apt-daily so they release the
  # lock, and mask the timers/services so they don't restart this boot.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop unattended-upgrades.service apt-daily.service apt-daily-upgrade.service 2>/dev/null; systemctl mask apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/microweber-bootstrap.sh" ]

final_message: "Microweber bootstrap done after $UPTIME s. See /root/microweber-credentials.txt and /var/log/microweber-bootstrap.log"
