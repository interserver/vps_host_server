#cloud-config
# =============================================================================
# ONLYOFFICE Workspace "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: ONLYOFFICE Workspace (Docker Compose) + Nginx reverse proxy
#        UFW firewall + fail2ban + swap + unattended-upgrades
# ONLYOFFICE Workspace is a self-hosted collaborative office suite
# combining document editing, project management, CRM, and mail.
# https://www.onlyoffice.com/workspace.aspx
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.onlyoffice-bootstrap.env
# block before launching. Secrets below are generated randomly per-boot if
# left as CHANGE_ME defaults.
# =============================================================================

hostname: onlyoffice
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key / hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget
  - python3
  - openssl

# ----------------------------------------------------------------------------
# Swap (survive build-time memory spikes; ONLYOFFICE pulls large images)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk ahead of the bootstrap script
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.onlyoffice-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # hostname / primary domain (no scheme)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (DNS not pointed yet)
      ADMIN_PASS="CHANGE_ME"            # ONLYOFFICE portal administrator password
      DB_PASSWORD="CHANGE_ME"           # MySQL password for onlyoffice DB user
      RABBITMQ_PASS="CHANGE_ME"         # RabbitMQ password
      REDIS_PASSWORD="CHANGE_ME"        # Redis auth password
      JWT_SECRET="CHANGE_ME"            # Document Server JWT secret (shared between services)
      # Data directory — documents + configs persisted here; back this up!
      OO_DATA_DIR="/opt/onlyoffice"

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/onlyoffice.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx reverse-proxy vhost (bootstrap replaces APP_DOMAIN_PLACEHOLDER) --
  - path: /etc/nginx/sites-available/onlyoffice.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Let's Encrypt ACME challenge
          location /.well-known/acme-challenge/ { root /var/www/html; }

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          # ONLYOFFICE uploads can be large (documents/attachments)
          client_max_body_size 1G;

          # Longer timeouts for document conversions
          proxy_connect_timeout 300s;
          proxy_send_timeout    300s;
          proxy_read_timeout    300s;

          location / {
              proxy_pass         http://127.0.0.1:8080;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_buffering    off;
          }
      }

  # --- Docker Compose project for ONLYOFFICE Workspace -----------------------
  - path: /opt/onlyoffice/docker-compose.yml
    permissions: '0640'
    owner: root:root
    content: |
      # ONLYOFFICE Workspace Docker Compose
      # Bootstrap fills in secrets at runtime via .env
      version: "3.9"

      networks:
        onlyoffice:
          driver: bridge

      volumes:
        mysql_data:
        document_data:
        document_log:
        document_font:
        community_log:
        community_data:
        community_letsencrypt:
        redis_data:
        rabbitmq_data:

      services:

        onlyoffice-mysql-server:
          image: mysql:8.0
          container_name: onlyoffice-mysql-server
          restart: unless-stopped
          environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: onlyoffice
            MYSQL_USER: onlyoffice_user
            MYSQL_PASSWORD: ${DB_PASSWORD}
          volumes:
            - mysql_data:/var/lib/mysql
          networks:
            - onlyoffice
          healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
                   "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
            interval: 20s
            timeout: 5s
            retries: 10

        onlyoffice-redis:
          image: redis:7-alpine
          container_name: onlyoffice-redis
          restart: unless-stopped
          command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
          volumes:
            - redis_data:/data
          networks:
            - onlyoffice
          healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            interval: 15s
            timeout: 5s
            retries: 5

        onlyoffice-rabbitmq:
          image: rabbitmq:3-management-alpine
          container_name: onlyoffice-rabbitmq
          restart: unless-stopped
          environment:
            RABBITMQ_DEFAULT_USER: onlyoffice
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
          volumes:
            - rabbitmq_data:/var/lib/rabbitmq
          networks:
            - onlyoffice
          healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            interval: 20s
            timeout: 5s
            retries: 10

        onlyoffice-document-server:
          image: onlyoffice/documentserver:latest
          container_name: onlyoffice-document-server
          restart: unless-stopped
          depends_on:
            onlyoffice-redis:
              condition: service_healthy
            onlyoffice-rabbitmq:
              condition: service_healthy
          environment:
            REDIS_SERVER_HOST: onlyoffice-redis
            REDIS_SERVER_PORT: "6379"
            REDIS_SERVER_PWD: ${REDIS_PASSWORD}
            AMQP_URI: amqp://onlyoffice:${RABBITMQ_PASS}@onlyoffice-rabbitmq
            JWT_ENABLED: "true"
            JWT_SECRET: ${JWT_SECRET}
            JWT_HEADER: AuthorizationJwt
          volumes:
            - document_data:/var/www/onlyoffice/Data
            - document_log:/var/log/onlyoffice
            - document_font:/usr/share/fonts/truetype/custom
          networks:
            - onlyoffice

        onlyoffice-community-server:
          image: onlyoffice/communityserver:latest
          container_name: onlyoffice-community-server
          restart: unless-stopped
          depends_on:
            onlyoffice-mysql-server:
              condition: service_healthy
            onlyoffice-redis:
              condition: service_healthy
            onlyoffice-rabbitmq:
              condition: service_healthy
            onlyoffice-document-server:
              condition: service_started
          environment:
            ONLYOFFICE_CORE_MACHINEKEY: ${JWT_SECRET}
            CONTROL_PANEL_PORT_80_TCP: "80"
            DOCUMENT_SERVER_PORT_80_TCP_ADDR: onlyoffice-document-server
            MYSQL_SERVER_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_SERVER_DB_NAME: onlyoffice
            MYSQL_SERVER_HOST: onlyoffice-mysql-server
            MYSQL_SERVER_USER: onlyoffice_user
            MYSQL_SERVER_PASS: ${DB_PASSWORD}
            AMQP_SERVER_HOST: onlyoffice-rabbitmq
            AMQP_SERVER_USER: onlyoffice
            AMQP_SERVER_PWD: ${RABBITMQ_PASS}
            REDIS_SERVER_HOST: onlyoffice-redis
            REDIS_SERVER_PORT: "6379"
            REDIS_SERVER_PWD: ${REDIS_PASSWORD}
          ports:
            - "127.0.0.1:8080:80"
          volumes:
            - community_data:/var/www/onlyoffice/Data
            - community_log:/var/log/onlyoffice
            - community_letsencrypt:/etc/letsencrypt
          networks:
            - onlyoffice

  # --- main bootstrap script -------------------------------------------------
  - path: /root/onlyoffice-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/onlyoffice-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.onlyoffice-bootstrap.env

      echo "=== ONLYOFFICE Workspace bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) ------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$ADMIN_PASS"     = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"
      [ "$DB_PASSWORD"    = "CHANGE_ME" ] && DB_PASSWORD="$(rand)"
      [ "$RABBITMQ_PASS"  = "CHANGE_ME" ] && RABBITMQ_PASS="$(rand)"
      [ "$REDIS_PASSWORD" = "CHANGE_ME" ] && REDIS_PASSWORD="$(rand)"
      [ "$JWT_SECRET"     = "CHANGE_ME" ] && JWT_SECRET="$(rand)"

      # DB root password is always generated (never operator-editable)
      DB_ROOT_PASSWORD="$(rand)"

      # --- install Docker CE via official script (distro-agnostic) ----------
      if ! command -v docker >/dev/null 2>&1; then
        echo "Installing Docker CE..."
        # fallback: noble repo until 26.04 published
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
        rm -f /tmp/get-docker.sh
      fi
      systemctl enable --now docker

      # --- Docker Compose v2 plugin -----------------------------------------
      if ! docker compose version >/dev/null 2>&1; then
        COMPOSE_VER="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
          | jq -r '.tag_name' 2>/dev/null || echo 'v2.27.1')"
        COMPOSE_URL="https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-$(uname -m)"
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -fsSL "$COMPOSE_URL" -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      fi
      echo "Docker  : $(docker --version)"
      echo "Compose : $(docker compose version)"

      # --- Create data directories ------------------------------------------
      mkdir -p "${OO_DATA_DIR}"
      chmod 755 "${OO_DATA_DIR}"

      # --- Write the Compose .env file --------------------------------------
      cat > /opt/onlyoffice/.env <<DOTENV
      # Generated by onlyoffice-bootstrap.sh — $(date)
      DB_PASSWORD=${DB_PASSWORD}
      DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      RABBITMQ_PASS=${RABBITMQ_PASS}
      REDIS_PASSWORD=${REDIS_PASSWORD}
      JWT_SECRET=${JWT_SECRET}
      DOTENV
      chmod 600 /opt/onlyoffice/.env

      # --- Pull images + start stack ----------------------------------------
      cd /opt/onlyoffice
      docker compose pull
      docker compose up -d

      # --- nginx vhost: replace domain placeholder --------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|" \
        /etc/nginx/sites-available/onlyoffice.conf
      ln -sf /etc/nginx/sites-available/onlyoffice.conf \
        /etc/nginx/sites-enabled/onlyoffice.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- Firewall: SSH + HTTP + HTTPS only --------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ---------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot --nginx -d ${APP_DOMAIN}"
      fi

      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- Write credentials summary (chmod 600) ----------------------------
      cat > /root/onlyoffice-credentials.txt <<CREDS
      ===== ONLYOFFICE Workspace bootstrap complete: $(date) =====

      Web UI            : ${PROTO}://${APP_DOMAIN}/
      Admin username    : administrator
      Admin password    : ${ADMIN_PASS}

      NOTE: Set the admin password via the ONLYOFFICE portal wizard on first
      visit. Use the password above when prompted, or choose your own.

      DB password       : ${DB_PASSWORD}
      DB root password  : ${DB_ROOT_PASSWORD}
      RabbitMQ password : ${RABBITMQ_PASS}
      Redis password    : ${REDIS_PASSWORD}
      JWT secret        : ${JWT_SECRET}

      Data directory    : ${OO_DATA_DIR}
      Compose directory : /opt/onlyoffice/
      Log               : /var/log/onlyoffice-bootstrap.log

      Useful commands:
        docker compose -f /opt/onlyoffice/docker-compose.yml ps
        docker compose -f /opt/onlyoffice/docker-compose.yml logs -f
        docker compose -f /opt/onlyoffice/docker-compose.yml pull && \
          docker compose -f /opt/onlyoffice/docker-compose.yml up -d   # upgrade
      CREDS
      chmod 600 /root/onlyoffice-credentials.txt

      echo "=== ONLYOFFICE Workspace bootstrap finished: $(date) ==="
      echo "=== Credentials in /root/onlyoffice-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all write_files have been placed
# ----------------------------------------------------------------------------
bootcmd:
  # Stop the base image's apt-daily / unattended-upgrades TIMERS from firing at
  # first boot so they don't hold the dpkg lock during cloud-init's package
  # stage. Masking timers only — NO process killing (that corrupts dpkg and a
  # -f match would kill this very command). cloud-init already waits for the lock.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl mask apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true; true" ]

runcmd:
  - [ bash, -lc, "/root/onlyoffice-bootstrap.sh" ]

final_message: "ONLYOFFICE Workspace bootstrap done after $UPTIME s. See /root/onlyoffice-credentials.txt and /var/log/onlyoffice-bootstrap.log"
