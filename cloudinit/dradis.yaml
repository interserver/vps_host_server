#cloud-config
# =============================================================================
# Dradis Framework — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Ruby (rbenv) + Rails + SQLite + Nginx (reverse proxy) + Certbot
#        UFW firewall + fail2ban + swap + unattended-upgrades
# Dradis is a collaborative security reporting platform for pen-testers.
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.dradis-bootstrap.env block
# before launching.  Passwords default to random per-boot if left as CHANGE_ME.
# Web UI is at https://<APP_DOMAIN> (or http if TLS not yet configured).
# =============================================================================

hostname: dradis
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep default so the provisioner can inject the customer SSH key
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - wget
  - git
  - build-essential
  - libssl-dev
  - libreadline-dev
  - zlib1g-dev
  - libyaml-dev
  - libxml2-dev
  - libxslt1-dev
  - libffi-dev
  - libgdbm-dev
  - libncurses5-dev
  - automake
  - libtool
  - bison
  - sqlite3
  - libsqlite3-dev
  - nodejs
  - npm
  - htop
  - gnupg2
  - ca-certificates
  - apt-transport-https

# ----------------------------------------------------------------------------
# Swap (helps small instances survive Ruby + bundler compile spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap runs
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.dradis-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"        # public FQDN (no scheme); used for Nginx + Certbot
      LE_EMAIL="admin@example.com"    # Let's Encrypt registration/renewal email
      ENABLE_TLS="true"               # set to false if DNS is not pointed yet

      # Dradis shared_secret (Rails secret_key_base equivalent).
      # Leave CHANGE_ME to auto-generate a random 48-char secret at boot.
      DRADIS_SHARED_SECRET="CHANGE_ME"

      # Initial Dradis admin credentials
      DRADIS_ADMIN_USER="admin"
      DRADIS_ADMIN_PASS="CHANGE_ME"

      # Installation paths
      DRADIS_HOME="/opt/dradis"
      RUBY_VERSION="3.3.3"

  # --- Nginx reverse-proxy vhost (HTTP only; certbot upgrades to HTTPS) -------
  - path: /etc/nginx/sites-available/dradis.conf
    permissions: '0644'
    owner: root:root
    content: |
      upstream dradis_app {
          server 127.0.0.1:3000 fail_timeout=0;
      }

      server {
          listen 80;
          listen [::]:80;
          server_name DOMAIN_PLACEHOLDER;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          # Increase buffer for large report uploads
          client_max_body_size 64M;
          proxy_read_timeout    300;
          proxy_connect_timeout 300;
          proxy_send_timeout    300;

          location / {
              proxy_pass         http://dradis_app;
              proxy_http_version 1.1;
              proxy_set_header   Host              $host;
              proxy_set_header   X-Real-IP         $remote_addr;
              proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_set_header   Upgrade           $http_upgrade;
              proxy_set_header   Connection        "upgrade";
              proxy_redirect     off;
          }

          location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
              proxy_pass http://dradis_app;
              expires    max;
              access_log off;
          }

          location = /favicon.ico { log_not_found off; access_log off; }
          location = /robots.txt  { log_not_found off; access_log off; }
          location ~ /\.(?!well-known).* { deny all; }
      }

  # --- systemd service for Dradis -----------------------------------------
  - path: /etc/systemd/system/dradis.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Dradis Framework
      After=network.target

      [Service]
      Type=simple
      User=dradis
      Group=dradis
      WorkingDirectory=/opt/dradis
      EnvironmentFile=/opt/dradis/.env
      ExecStart=/usr/local/bin/dradis-start.sh
      Restart=on-failure
      RestartSec=10
      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=dradis
      TimeoutStartSec=300

      [Install]
      WantedBy=multi-user.target

  # --- fail2ban jails for SSH + Nginx -----------------------------------------
  - path: /etc/fail2ban/jail.d/dradis.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- main bootstrap script --------------------------------------------------
  - path: /root/dradis-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/dradis-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files)..."
        DEBIAN_FRONTEND=noninteractive apt-get install --reinstall -y postfix || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.dradis-bootstrap.env

      echo "=== Dradis Framework bootstrap started: $(date) ==="

      # ---- random secret generator (SIGPIPE-safe under set -e + pipefail) ----
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }
      rand48() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 48 || true; }

      [ "$DRADIS_SHARED_SECRET" = "CHANGE_ME" ] && DRADIS_SHARED_SECRET="$(rand48)"
      [ "$DRADIS_ADMIN_PASS"    = "CHANGE_ME" ] && DRADIS_ADMIN_PASS="$(rand)"

      # ---- create system user for Dradis -------------------------------------
      if ! id dradis &>/dev/null; then
        useradd --system --shell /bin/bash --home-dir "$DRADIS_HOME" --create-home dradis
      fi

      # ---- install rbenv + Ruby for the dradis user --------------------------
      RBENV_ROOT="$DRADIS_HOME/.rbenv"
      if [ ! -d "$RBENV_ROOT" ]; then
        git clone --depth=1 https://github.com/rbenv/rbenv.git "$RBENV_ROOT"
        git clone --depth=1 https://github.com/rbenv/ruby-build.git "$RBENV_ROOT/plugins/ruby-build"
        chown -R dradis:dradis "$RBENV_ROOT"
      fi

      # rbenv init in non-interactive shell
      export PATH="$RBENV_ROOT/bin:$PATH"
      eval "$(rbenv init - bash)" 2>/dev/null || true

      # install Ruby as dradis user (compile from source)
      if ! sudo -u dradis "$RBENV_ROOT/bin/rbenv" versions 2>/dev/null | grep -q "$RUBY_VERSION"; then
        echo "--- Compiling Ruby $RUBY_VERSION (this takes a few minutes) ---"
        sudo -u dradis \
          RBENV_ROOT="$RBENV_ROOT" \
          PATH="$RBENV_ROOT/bin:$PATH" \
          "$RBENV_ROOT/plugins/ruby-build/bin/ruby-build" \
          "$RUBY_VERSION" "$RBENV_ROOT/versions/$RUBY_VERSION"
        sudo -u dradis \
          RBENV_ROOT="$RBENV_ROOT" \
          PATH="$RBENV_ROOT/bin:$PATH" \
          "$RBENV_ROOT/bin/rbenv" global "$RUBY_VERSION"
      fi

      RUBY_BIN="$RBENV_ROOT/versions/$RUBY_VERSION/bin"
      GEM_BIN="$RUBY_BIN/gem"
      BUNDLE_BIN="$RUBY_BIN/bundle"

      # install bundler
      sudo -u dradis PATH="$RUBY_BIN:$PATH" "$GEM_BIN" install bundler --no-document || true

      # ---- clone or update Dradis Community Edition --------------------------
      if [ ! -d "$DRADIS_HOME/.git" ]; then
        git clone --depth=1 https://github.com/dradis/dradis-ce.git "$DRADIS_HOME"
        chown -R dradis:dradis "$DRADIS_HOME"
      else
        sudo -u dradis git -C "$DRADIS_HOME" pull --ff-only || true
      fi

      # ---- write Dradis .env -------------------------------------------------
      cat > "$DRADIS_HOME/.env" <<DENV
      RAILS_ENV=production
      SECRET_KEY_BASE=${DRADIS_SHARED_SECRET}
      DRADIS_SHARED_SECRET=${DRADIS_SHARED_SECRET}
      PORT=3000
      RAILS_LOG_TO_STDOUT=true
      DENV
      chmod 600 "$DRADIS_HOME/.env"
      chown dradis:dradis "$DRADIS_HOME/.env"

      # ---- write rbenv profile so gem/bundle paths resolve in the service ----
      cat > /usr/local/bin/dradis-start.sh <<'SCRIPT'
      #!/usr/bin/env bash
      set -euo pipefail
      export RBENV_ROOT="$HOME/.rbenv"
      export PATH="$RBENV_ROOT/bin:$PATH"
      eval "$(rbenv init - bash)"
      cd /opt/dradis
      exec bundle exec rails server -b 127.0.0.1 -p 3000 -e production
      SCRIPT
      chmod 755 /usr/local/bin/dradis-start.sh

      # ---- bundle install ----------------------------------------------------
      sudo -u dradis \
        HOME="$DRADIS_HOME" \
        RBENV_ROOT="$RBENV_ROOT" \
        PATH="$RUBY_BIN:$PATH" \
        RAILS_ENV=production \
        "$BUNDLE_BIN" install \
          --without development test \
          --deployment \
          --jobs="$(nproc)" \
          --retry=3 \
          --path="$DRADIS_HOME/vendor/bundle" \
        2>&1

      # ---- precompile assets + setup DB --------------------------------------
      sudo -u dradis \
        HOME="$DRADIS_HOME" \
        RBENV_ROOT="$RBENV_ROOT" \
        PATH="$RUBY_BIN:$PATH" \
        RAILS_ENV=production \
        SECRET_KEY_BASE="$DRADIS_SHARED_SECRET" \
        DRADIS_SHARED_SECRET="$DRADIS_SHARED_SECRET" \
        "$BUNDLE_BIN" exec --gemfile="$DRADIS_HOME/Gemfile" \
        rails assets:precompile db:create db:migrate \
        2>&1

      # ---- set initial shared_password via Dradis rake task ------------------
      # Dradis uses a single shared password for all users (Community Edition).
      sudo -u dradis \
        HOME="$DRADIS_HOME" \
        RBENV_ROOT="$RBENV_ROOT" \
        PATH="$RUBY_BIN:$PATH" \
        RAILS_ENV=production \
        SECRET_KEY_BASE="$DRADIS_SHARED_SECRET" \
        DRADIS_SHARED_SECRET="$DRADIS_SHARED_SECRET" \
        "$BUNDLE_BIN" exec --gemfile="$DRADIS_HOME/Gemfile" \
        rails dradis:reset:all SHARED_PASS="$DRADIS_ADMIN_PASS" \
        2>&1 || \
      sudo -u dradis \
        HOME="$DRADIS_HOME" \
        RBENV_ROOT="$RBENV_ROOT" \
        PATH="$RUBY_BIN:$PATH" \
        RAILS_ENV=production \
        SECRET_KEY_BASE="$DRADIS_SHARED_SECRET" \
        DRADIS_SHARED_SECRET="$DRADIS_SHARED_SECRET" \
        "$BUNDLE_BIN" exec --gemfile="$DRADIS_HOME/Gemfile" \
        rails db:seed \
        2>&1 || true

      chown -R dradis:dradis "$DRADIS_HOME"

      # ---- enable + start Dradis systemd service -----------------------------
      systemctl daemon-reload
      systemctl enable dradis
      systemctl start  dradis

      # ---- Nginx configuration -----------------------------------------------
      sed -i "s|DOMAIN_PLACEHOLDER|${APP_DOMAIN}|g" /etc/nginx/sites-available/dradis.conf
      ln -sf /etc/nginx/sites-available/dradis.conf /etc/nginx/sites-enabled/dradis.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx

      # ---- Firewall ----------------------------------------------------------
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow OpenSSH
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw --force enable

      # ---- fail2ban ----------------------------------------------------------
      systemctl enable --now fail2ban

      # ---- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ----------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect || \
          echo "WARN: certbot deferred — DNS not pointed yet. Re-run: certbot --nginx -d ${APP_DOMAIN}"
      fi

      # ---- write credentials summary -----------------------------------------
      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"
      cat > /root/dradis-credentials.txt <<CREDS
      ===== Dradis Framework bootstrap complete: $(date) =====

      Web UI:             ${PROTO}://${APP_DOMAIN}
      Shared password:    ${DRADIS_ADMIN_PASS}
        (Dradis CE uses a single shared password for all users)

      Secret key base:    ${DRADIS_SHARED_SECRET}
      Install path:       ${DRADIS_HOME}
      Ruby version:       ${RUBY_VERSION}

      Service management:
        systemctl status dradis
        systemctl restart dradis
        journalctl -u dradis -f

      Bootstrap log:      /var/log/dradis-bootstrap.log
      CREDS
      chmod 600 /root/dradis-credentials.txt

      echo "=== Dradis bootstrap finished: $(date) ==="
      echo "=== Credentials saved to /root/dradis-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all write_files have been laid down
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/dradis-bootstrap.sh" ]

final_message: "Dradis Framework bootstrap done after $UPTIME s. See /root/dradis-credentials.txt and /var/log/dradis-bootstrap.log"
