#cloud-config
# =============================================================================
# Docker "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Docker CE + Docker Compose v2 + nginx reverse proxy (demo app)
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.docker-bootstrap.env block
# before launching. Passwords below are random per-boot if left as defaults.
# =============================================================================

hostname: docker
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key/hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget

# ----------------------------------------------------------------------------
# Swap (helps small instances survive build-time memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk for the bootstrap script
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable environment variables --------------------------------
  - path: /root/.docker-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # hostname / primary domain (no scheme)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (no DNS yet)
      ADMIN_PASS="CHANGE_ME"            # demo app basic-auth password (admin user)

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/docker-app.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx vhost (placeholder; bootstrap rewrites server_name) --------------
  - path: /etc/nginx/sites-available/docker-app.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          location / {
              proxy_pass         http://127.0.0.1:8080;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_read_timeout 300s;
              proxy_send_timeout 300s;

              # basic-auth guard (htpasswd created by bootstrap)
              auth_basic           "Docker Demo";
              auth_basic_user_file /etc/nginx/.htpasswd;
          }

          location /.well-known/acme-challenge/ { root /var/www/html; }
      }

  # --- Docker Compose project for the demo "it works" app --------------------
  - path: /opt/docker-demo/docker-compose.yml
    permissions: '0644'
    owner: root:root
    content: |
      version: "3.9"
      services:
        whoami:
          image: traefik/whoami:latest
          restart: unless-stopped
          ports:
            - "127.0.0.1:8080:80"

  # --- main bootstrap script -------------------------------------------------
  - path: /root/docker-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/docker-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files)..."
        DEBIAN_FRONTEND=noninteractive apt-get install --reinstall -y postfix || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.docker-bootstrap.env

      echo "=== Docker bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) ------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }
      [ "$ADMIN_PASS" = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"

      # --- install Docker CE via official script (distro-agnostic) ----------
      if ! command -v docker >/dev/null 2>&1; then
        # fallback: noble repo until 26.04 published
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
        rm -f /tmp/get-docker.sh
      fi

      # ensure Docker daemon is running and enabled
      systemctl enable --now docker

      # --- install Docker Compose v2 plugin if not present ------------------
      if ! docker compose version >/dev/null 2>&1; then
        COMPOSE_VER="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
          | jq -r '.tag_name' 2>/dev/null || echo 'v2.27.1')"
        COMPOSE_URL="https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-$(uname -m)"
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -fsSL "$COMPOSE_URL" -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      fi

      echo "Docker version : $(docker --version)"
      echo "Compose version: $(docker compose version)"

      # --- add www-data to docker group so nginx sub-processes can query ----
      usermod -aG docker www-data || true

      # --- pull and start the demo container --------------------------------
      cd /opt/docker-demo
      docker compose pull
      docker compose up -d

      # --- nginx: basic-auth htpasswd ---------------------------------------
      if ! command -v htpasswd >/dev/null 2>&1; then
        apt-get install -y -q apache2-utils
      fi
      htpasswd -cb /etc/nginx/.htpasswd admin "$ADMIN_PASS"
      chmod 640 /etc/nginx/.htpasswd
      chown root:www-data /etc/nginx/.htpasswd

      # --- nginx vhost: replace domain placeholder --------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|" /etc/nginx/sites-available/docker-app.conf
      ln -sf /etc/nginx/sites-available/docker-app.conf /etc/nginx/sites-enabled/docker-app.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- firewall: only SSH + HTTP + HTTPS --------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ---------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot --nginx -d ${APP_DOMAIN}"
      fi

      PROTO="http"; [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- write credentials summary ----------------------------------------
      cat > /root/docker-credentials.txt <<CREDS
      ===== Docker bootstrap complete: $(date) =====
      Demo app URL : ${PROTO}://${APP_DOMAIN}/
      Auth user    : admin
      Auth password: ${ADMIN_PASS}

      Docker data  : /opt/docker-demo/docker-compose.yml
      Log          : /var/log/docker-bootstrap.log

      Useful commands:
        docker ps
        docker compose -f /opt/docker-demo/docker-compose.yml logs -f
        docker compose -f /opt/docker-demo/docker-compose.yml up -d <service>
      CREDS
      chmod 600 /root/docker-credentials.txt

      echo "=== Bootstrap finished. Credentials in /root/docker-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once everything above has been laid down
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/docker-bootstrap.sh" ]

final_message: "Docker bootstrap done after $UPTIME s. See /root/docker-credentials.txt and /var/log/docker-bootstrap.log"
