#cloud-config
# =============================================================================
# Forgejo "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Forgejo (self-hosted Git + CI) binary + systemd + nginx reverse proxy
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.forgejo-bootstrap.env block
# before launching. Secrets below are randomised per-boot if left as defaults.
# =============================================================================

hostname: forgejo
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key/hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - wget
  - jq
  - sqlite3
  - htop
  - unzip

# ----------------------------------------------------------------------------
# Swap (helps small instances survive build-time memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable environment variables --------------------------------
  - path: /root/.forgejo-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # hostname / primary domain (no scheme)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (no DNS yet)
      ADMIN_USER="forgejo_admin"        # initial Forgejo administrator username
      ADMIN_PASS="CHANGE_ME"            # initial admin password (randomised if unchanged)
      ADMIN_EMAIL="admin@example.com"   # initial admin email address
      DB_PASS="CHANGE_ME"               # internal SQLite passphrase (not used with SQLite; reserved for MySQL migration)
      SSH_PORT="2222"                   # Forgejo SSH listen port (avoids clash with host SSH on 22)

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/forgejo.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

      [forgejo]
      enabled  = true
      port     = http,https,2222
      filter   = forgejo
      logpath  = /var/log/forgejo/forgejo.log
      maxretry = 5
      bantime  = 30m

  # --- fail2ban filter for Forgejo authentication failures -------------------
  - path: /etc/fail2ban/filter.d/forgejo.conf
    permissions: '0644'
    owner: root:root
    content: |
      [Definition]
      failregex = .*Failed authentication attempt for .* from <HOST>.*
      ignoreregex =

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx reverse-proxy vhost (bootstrap replaces domain placeholder) ------
  - path: /etc/nginx/sites-available/forgejo.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          client_max_body_size 512M;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          location / {
              proxy_pass         http://127.0.0.1:3000;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_read_timeout 300s;
              proxy_send_timeout 300s;
          }

          location /.well-known/acme-challenge/ { root /var/www/html; }
      }

  # --- Forgejo systemd service unit -------------------------------------------
  - path: /etc/systemd/system/forgejo.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Forgejo self-hosted Git service
      After=network.target

      [Service]
      Type=simple
      User=git
      Group=git
      WorkingDirectory=/var/lib/forgejo
      ExecStart=/usr/local/bin/forgejo web --config /etc/forgejo/app.ini
      Restart=on-failure
      RestartSec=5s
      Environment=USER=git HOME=/home/git GITEA_WORK_DIR=/var/lib/forgejo

      [Install]
      WantedBy=multi-user.target

  # --- main bootstrap script --------------------------------------------------
  - path: /root/forgejo-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/forgejo-bootstrap.log) 2>&1
      source /root/.forgejo-bootstrap.env

      echo "=== Forgejo bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) --------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }
      [ "$ADMIN_PASS" = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"
      [ "$DB_PASS"    = "CHANGE_ME" ] && DB_PASS="$(rand)"

      # --- create dedicated git user for Forgejo -------------------------------
      if ! id git >/dev/null 2>&1; then
        useradd --system --shell /bin/bash --comment "Forgejo service account" \
          --home /home/git --create-home git
      fi

      # --- create required directories -----------------------------------------
      mkdir -p /var/lib/forgejo/{data,log,repositories,lfs} \
               /var/log/forgejo \
               /etc/forgejo
      chown -R git:git /var/lib/forgejo /var/log/forgejo
      chown root:git   /etc/forgejo
      chmod 770        /etc/forgejo

      # --- download latest Forgejo binary --------------------------------------
      if ! command -v forgejo >/dev/null 2>&1; then
        echo "Fetching latest Forgejo release..."
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  FORGEJO_ARCH="amd64" ;;
          aarch64) FORGEJO_ARCH="arm64" ;;
          *)        FORGEJO_ARCH="amd64" ;;
        esac

        FORGEJO_VER="$(curl -fsSL https://codeberg.org/api/v1/repos/forgejo/forgejo/releases?limit=1 \
          | jq -r '.[0].tag_name' 2>/dev/null || echo 'v9.0.3')"
        FORGEJO_VER="${FORGEJO_VER#v}"

        FORGEJO_URL="https://codeberg.org/forgejo/forgejo/releases/download/v${FORGEJO_VER}/forgejo-${FORGEJO_VER}-linux-${FORGEJO_ARCH}"
        curl -fsSL "$FORGEJO_URL" -o /usr/local/bin/forgejo
        chmod +x /usr/local/bin/forgejo
        echo "Installed Forgejo $(forgejo --version 2>/dev/null | head -1 || echo $FORGEJO_VER)"
      fi

      # --- write app.ini config ------------------------------------------------
      SECRET_KEY="$(rand)$(rand)$(rand)"
      INTERNAL_TOKEN="$(rand)$(rand)$(rand)"

      cat > /etc/forgejo/app.ini <<APPINI
      APP_NAME = Forgejo
      RUN_USER = git
      RUN_MODE = prod
      WORK_PATH = /var/lib/forgejo

      [server]
      DOMAIN           = ${APP_DOMAIN}
      HTTP_PORT        = 3000
      ROOT_URL         = http://${APP_DOMAIN}/
      SSH_DOMAIN       = ${APP_DOMAIN}
      SSH_PORT         = ${SSH_PORT}
      SSH_LISTEN_PORT  = ${SSH_PORT}
      LFS_START_SERVER = true
      LFS_JWT_SECRET   = $(rand)$(rand)
      OFFLINE_MODE     = false

      [database]
      DB_TYPE  = sqlite3
      PATH     = /var/lib/forgejo/data/forgejo.db

      [indexer]
      ISSUE_INDEXER_TYPE = bleve
      REPO_INDEXER_ENABLED = true

      [session]
      PROVIDER = file

      [log]
      MODE      = file
      ROOT_PATH = /var/log/forgejo
      LEVEL     = info

      [security]
      INSTALL_LOCK   = true
      SECRET_KEY     = ${SECRET_KEY}
      INTERNAL_TOKEN = ${INTERNAL_TOKEN}

      [service]
      DISABLE_REGISTRATION              = false
      REQUIRE_SIGNIN_VIEW               = false
      REGISTER_EMAIL_CONFIRM            = false
      ENABLE_NOTIFY_MAIL                = false
      ALLOW_ONLY_EXTERNAL_REGISTRATION  = false
      DEFAULT_ALLOW_CREATE_ORGANIZATION = true
      DEFAULT_ENABLE_TIMETRACKING       = true
      NO_REPLY_ADDRESS                  = noreply@${APP_DOMAIN}

      [mailer]
      ENABLED = false

      [picture]
      DISABLE_GRAVATAR        = false
      ENABLE_FEDERATED_AVATAR = true

      [openid]
      ENABLE_OPENID_SIGNIN = true
      ENABLE_OPENID_SIGNUP = true

      [oauth2]
      JWT_SECRET = $(rand)$(rand)

      [actions]
      ENABLED = true
      APPINI
      chown root:git /etc/forgejo/app.ini
      chmod 660      /etc/forgejo/app.ini

      # --- enable and start Forgejo --------------------------------------------
      systemctl daemon-reload
      systemctl enable forgejo
      systemctl start  forgejo

      # Wait for Forgejo to become ready (up to 60 s)
      echo "Waiting for Forgejo to start..."
      for i in $(seq 1 30); do
        curl -sf http://127.0.0.1:3000/ >/dev/null 2>&1 && break || true
        sleep 2
      done

      # --- create initial admin account ----------------------------------------
      if ! /usr/local/bin/forgejo admin user list --config /etc/forgejo/app.ini 2>/dev/null \
          | grep -q "^1"; then
        sudo -u git /usr/local/bin/forgejo admin user create \
          --config /etc/forgejo/app.ini \
          --username "$ADMIN_USER" \
          --password "$ADMIN_PASS" \
          --email    "$ADMIN_EMAIL" \
          --admin || echo "WARN: admin account creation deferred (Forgejo may still be initialising)"
      fi

      # --- nginx: replace domain placeholder -----------------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|g" /etc/nginx/sites-available/forgejo.conf
      ln -sf /etc/nginx/sites-available/forgejo.conf /etc/nginx/sites-enabled/forgejo.conf
      rm -f  /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- firewall: SSH (22) + Forgejo SSH clone port + HTTP + HTTPS ----------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw allow "${SSH_PORT}/tcp" comment "Forgejo SSH"
      ufw --force enable

      # --- fail2ban ------------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ------------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot --nginx -d ${APP_DOMAIN}"

        # Update ROOT_URL in app.ini to https once TLS is active
        if certbot certificates 2>/dev/null | grep -q "VALID"; then
          sed -i "s|^ROOT_URL.*|ROOT_URL = https://${APP_DOMAIN}/|" /etc/forgejo/app.ini
          systemctl restart forgejo
        fi
      fi

      PROTO="http"; [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- write credentials summary -------------------------------------------
      cat > /root/forgejo-credentials.txt <<CREDS
      ===== Forgejo bootstrap complete: $(date) =====

      Web UI URL    : ${PROTO}://${APP_DOMAIN}/
      Admin user    : ${ADMIN_USER}
      Admin password: ${ADMIN_PASS}
      Admin email   : ${ADMIN_EMAIL}

      SSH clone port: ${SSH_PORT}  (git clone ssh://git@${APP_DOMAIN}:${SSH_PORT}/user/repo.git)
      HTTP clone    : ${PROTO}://${APP_DOMAIN}/user/repo.git

      Config file   : /etc/forgejo/app.ini
      Data dir      : /var/lib/forgejo
      Log           : /var/log/forgejo-bootstrap.log

      Useful commands:
        systemctl status forgejo
        journalctl -u forgejo -f
        sudo -u git /usr/local/bin/forgejo admin user list --config /etc/forgejo/app.ini
      CREDS
      chmod 600 /root/forgejo-credentials.txt

      echo "=== Bootstrap finished. Credentials in /root/forgejo-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all files are written
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/forgejo-bootstrap.sh" ]

final_message: "Forgejo bootstrap done after $UPTIME s. See /root/forgejo-credentials.txt and /var/log/forgejo-bootstrap.log"
