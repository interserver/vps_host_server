#cloud-config
# =============================================================================
# Laravel "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Nginx + PHP-FPM + MariaDB + Composer + Laravel + Redis + Certbot
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in `write_files` -> /root/.laravel-bootstrap.env before
# launching, OR inject them via your provisioner. Passwords are randomised
# per-boot when left as the defaults (CHANGE_ME).
# =============================================================================

hostname: laravel
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve default (provisioner injects customer SSH key + hostname)
# ----------------------------------------------------------------------------
users:
  - default
  - name: deploy
    groups: [sudo, www-data]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - nginx
  - mariadb-server
  - mariadb-client
  - php-fpm
  - php-mysql
  - php-curl
  - php-gd
  - php-mbstring
  - php-xml
  - php-intl
  - php-zip
  - php-bcmath
  - php-opcache
  - php-tokenizer
  - php-dom
  - php-fileinfo
  - php-redis
  - redis-server
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - unzip
  - git
  - htop
  - supervisor

# ----------------------------------------------------------------------------
# Swap (helps small instances survive MariaDB + PHP-FPM memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable bootstrap variables ---------------------------------
  - path: /root/.laravel-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE -----
      APP_DOMAIN="example.com"          # primary domain (no scheme)
      APP_DOMAIN_WWW="www.example.com"  # www alias (set empty to skip)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (e.g. DNS not pointed yet)

      APP_NAME="Laravel"
      APP_ENV="production"

      # DB creds — randomised on first boot if left as CHANGE_ME
      LARAVEL_DB_NAME="laravel"
      LARAVEL_DB_USER="laravel_user"
      LARAVEL_DB_PASS="CHANGE_ME"
      MYSQL_ROOT_PASS="CHANGE_ME"

      # Laravel APP_KEY — randomised on first boot if left as CHANGE_ME
      LARAVEL_APP_KEY="CHANGE_ME"

      LARAVEL_PATH="/var/www/laravel"
      LARAVEL_VERSION="^12.0"

  # --- Nginx vhost (placeholder tokens replaced by bootstrap) ----------------
  - path: /etc/nginx/sites-available/laravel.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name SERVER_NAMES_PLACEHOLDER;

          root /var/www/laravel/public;
          index index.php index.html;

          client_max_body_size 64M;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

          location / {
              try_files $uri $uri/ /index.php?$query_string;
          }

          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:PHP_FPM_SOCK_PLACEHOLDER;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              fastcgi_read_timeout 300;
              fastcgi_buffer_size 128k;
              fastcgi_buffers 4 256k;
          }

          # Deny hidden files except .well-known
          location ~ /\.(?!well-known) {
              deny all;
          }

          # Static assets — aggressive cache
          location ~* \.(css|js|png|jpe?g|gif|webp|svg|ico|woff2?|ttf|eot)$ {
              expires max;
              log_not_found off;
              access_log off;
          }

          location = /favicon.ico { log_not_found off; access_log off; }
          location = /robots.txt  { allow all; log_not_found off; access_log off; }
      }

  # --- Supervisor config for Laravel queue workers ---------------------------
  - path: /etc/supervisor/conf.d/laravel-worker.conf
    permissions: '0644'
    owner: root:root
    content: |
      [program:laravel-worker]
      process_name=%(program_name)s_%(process_num)02d
      command=php /var/www/laravel/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
      autostart=false
      autorestart=true
      stopasgroup=true
      killasgroup=true
      user=www-data
      numprocs=1
      redirect_stderr=true
      stdout_logfile=/var/www/laravel/storage/logs/worker.log
      stopwaitsecs=3600

  # --- fail2ban configuration ------------------------------------------------
  - path: /etc/fail2ban/jail.d/laravel.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades ------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- main bootstrap script -------------------------------------------------
  - path: /root/laravel-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/laravel-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.laravel-bootstrap.env

      echo "=== Laravel bootstrap started: $(date) ==="

      # --- SIGPIPE-safe random secret generator ---
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # --- randomise any CHANGE_ME passwords ---
      [ "$LARAVEL_DB_PASS"   = "CHANGE_ME" ] && LARAVEL_DB_PASS="$(rand)"
      [ "$MYSQL_ROOT_PASS"   = "CHANGE_ME" ] && MYSQL_ROOT_PASS="$(rand)"
      # APP_KEY will be generated by artisan key:generate — placeholder check only
      [ "$LARAVEL_APP_KEY"   = "CHANGE_ME" ] && LARAVEL_APP_KEY=""

      # --- detect PHP version and FPM socket ---
      PHP_VER="$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || true)"
      PHP_FPM_SOCK="$(find /run/php -name 'php*-fpm.sock' 2>/dev/null | head -n1 || true)"
      echo "PHP version: ${PHP_VER}  |  FPM socket: ${PHP_FPM_SOCK}"

      # --- tune PHP for Laravel ---
      FPM_INI="/etc/php/${PHP_VER}/fpm/php.ini"
      if [ -f "$FPM_INI" ]; then
        sed -ri 's/^;?upload_max_filesize.*/upload_max_filesize = 64M/'  "$FPM_INI"
        sed -ri 's/^;?post_max_size.*/post_max_size = 64M/'               "$FPM_INI"
        sed -ri 's/^;?memory_limit.*/memory_limit = 256M/'                "$FPM_INI"
        sed -ri 's/^;?max_execution_time.*/max_execution_time = 120/'     "$FPM_INI"
        sed -ri 's/^;?opcache.enable.*/opcache.enable=1/'                  "$FPM_INI"
        sed -ri 's/^;?opcache.memory_consumption.*/opcache.memory_consumption=128/' "$FPM_INI"
        sed -ri 's/^;?opcache.validate_timestamps.*/opcache.validate_timestamps=0/' "$FPM_INI"
      fi
      systemctl restart "php${PHP_VER}-fpm" 2>/dev/null \
        || systemctl restart php-fpm 2>/dev/null \
        || true

      # --- ensure Composer 2 is available globally ---
      if ! command -v composer >/dev/null 2>&1; then
        curl -fsSL https://getcomposer.org/installer \
          | php -- --install-dir=/usr/local/bin --filename=composer
      fi
      composer self-update --2 2>/dev/null || true

      # --- secure MariaDB + create Laravel database ---
      systemctl enable --now mariadb
      mysql --protocol=socket -uroot <<SQL
      ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_ROOT_PASS}';
      DELETE FROM mysql.user WHERE User='';
      DROP DATABASE IF EXISTS test;
      DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%';
      CREATE DATABASE IF NOT EXISTS \`${LARAVEL_DB_NAME}\`
        DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE USER IF NOT EXISTS '${LARAVEL_DB_USER}'@'localhost'
        IDENTIFIED BY '${LARAVEL_DB_PASS}';
      GRANT ALL PRIVILEGES ON \`${LARAVEL_DB_NAME}\`.* TO '${LARAVEL_DB_USER}'@'localhost';
      FLUSH PRIVILEGES;
      SQL

      # --- enable and start Redis ---
      systemctl enable --now redis-server

      # --- install Laravel via Composer ---
      mkdir -p "$(dirname "$LARAVEL_PATH")"
      if [ ! -f "${LARAVEL_PATH}/composer.json" ]; then
        composer create-project "laravel/laravel:${LARAVEL_VERSION}" "$LARAVEL_PATH" \
          --no-interaction --no-progress
      fi

      # --- write .env file ---
      PROTO="http"; [ "$ENABLE_TLS" = "true" ] && PROTO="https"
      APP_URL="${PROTO}://${APP_DOMAIN}"

      cat > "${LARAVEL_PATH}/.env" <<ENVFILE
      APP_NAME="${APP_NAME}"
      APP_ENV=${APP_ENV}
      APP_KEY=
      APP_DEBUG=false
      APP_URL=${APP_URL}

      LOG_CHANNEL=stack
      LOG_DEPRECATIONS_CHANNEL=null
      LOG_LEVEL=error

      DB_CONNECTION=mysql
      DB_HOST=127.0.0.1
      DB_PORT=3306
      DB_DATABASE=${LARAVEL_DB_NAME}
      DB_USERNAME=${LARAVEL_DB_USER}
      DB_PASSWORD=${LARAVEL_DB_PASS}

      BROADCAST_DRIVER=log
      CACHE_DRIVER=redis
      FILESYSTEM_DISK=local
      QUEUE_CONNECTION=redis
      SESSION_DRIVER=redis
      SESSION_LIFETIME=120

      REDIS_HOST=127.0.0.1
      REDIS_PASSWORD=null
      REDIS_PORT=6379

      MAIL_MAILER=smtp
      MAIL_HOST=mailpit
      MAIL_PORT=1025
      MAIL_USERNAME=null
      MAIL_PASSWORD=null
      MAIL_ENCRYPTION=null
      MAIL_FROM_ADDRESS="hello@${APP_DOMAIN}"
      MAIL_FROM_NAME="${APP_NAME}"
      ENVFILE

      # --- set permissions before artisan commands ---
      chown -R www-data:www-data "$LARAVEL_PATH"
      find "$LARAVEL_PATH" -type d -exec chmod 755 {} \;
      find "$LARAVEL_PATH" -type f -exec chmod 644 {} \;
      chmod -R 775 "${LARAVEL_PATH}/storage" "${LARAVEL_PATH}/bootstrap/cache"

      # --- generate APP_KEY and run migrations ---
      sudo -u www-data php "${LARAVEL_PATH}/artisan" key:generate --force
      sudo -u www-data php "${LARAVEL_PATH}/artisan" migrate --force 2>/dev/null || true
      sudo -u www-data php "${LARAVEL_PATH}/artisan" storage:link 2>/dev/null || true
      sudo -u www-data php "${LARAVEL_PATH}/artisan" config:cache
      sudo -u www-data php "${LARAVEL_PATH}/artisan" route:cache
      sudo -u www-data php "${LARAVEL_PATH}/artisan" view:cache

      # re-fix permissions after artisan writes
      chown -R www-data:www-data "${LARAVEL_PATH}/storage" "${LARAVEL_PATH}/bootstrap/cache"

      # --- configure Nginx vhost ---
      SERVER_NAMES="$APP_DOMAIN"
      [ -n "$APP_DOMAIN_WWW" ] && SERVER_NAMES="$APP_DOMAIN $APP_DOMAIN_WWW"
      sed -i "s|SERVER_NAMES_PLACEHOLDER|${SERVER_NAMES}|g"  /etc/nginx/sites-available/laravel.conf
      sed -i "s|PHP_FPM_SOCK_PLACEHOLDER|${PHP_FPM_SOCK}|g"  /etc/nginx/sites-available/laravel.conf
      ln -sf /etc/nginx/sites-available/laravel.conf /etc/nginx/sites-enabled/laravel.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl reload nginx

      # --- firewall ---
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt ---
      if [ "$ENABLE_TLS" = "true" ]; then
        CERTBOT_DOMAINS="-d $APP_DOMAIN"
        [ -n "$APP_DOMAIN_WWW" ] && CERTBOT_DOMAINS="$CERTBOT_DOMAINS -d $APP_DOMAIN_WWW"
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" $CERTBOT_DOMAINS --redirect \
          || echo "WARN: certbot deferred — DNS not pointed yet. Re-run: certbot --nginx"
      fi

      # --- read back APP_KEY for credentials file ---
      GENERATED_APP_KEY="$(grep '^APP_KEY=' "${LARAVEL_PATH}/.env" | cut -d= -f2- || true)"

      # --- write operator credentials summary ---
      cat > /root/laravel-credentials.txt <<CREDS
      ===== Laravel install complete: $(date) =====
      URL:                  ${PROTO}://${APP_DOMAIN}
      Laravel path:         ${LARAVEL_PATH}
      APP_KEY:              ${GENERATED_APP_KEY}

      DB name:              ${LARAVEL_DB_NAME}
      DB user:              ${LARAVEL_DB_USER}
      DB password:          ${LARAVEL_DB_PASS}
      MySQL root password:  ${MYSQL_ROOT_PASS}

      Redis:                127.0.0.1:6379 (no auth)
      Queue worker:         supervisorctl start laravel-worker:*

      Bootstrap log:        /var/log/laravel-bootstrap.log
      CREDS
      chmod 600 /root/laravel-credentials.txt

      echo "=== Bootstrap finished: $(date). Credentials: /root/laravel-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once write_files have been laid down
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/laravel-bootstrap.sh" ]

final_message: "Laravel bootstrap done after $UPTIME s. See /root/laravel-credentials.txt and /var/log/laravel-bootstrap.log"
