#cloud-config
# =============================================================================
# MLDev — Ubuntu 26.04 LTS cloud-init user-data
# Stack: NVIDIA driver + CUDA toolkit + Python venv + JupyterLab + common ML
#        libraries (PyTorch, TensorFlow, scikit-learn, HuggingFace, etc.)
#        Nginx reverse proxy + Certbot TLS + UFW + fail2ban + swap
# -----------------------------------------------------------------------------
# REQUIRES: a KVM VPS plan with a dedicated NVIDIA GPU.
#   - Minimum: 1x NVIDIA GPU (Turing / Ampere or newer recommended)
#   - VRAM: 8 GB minimum; 16 GB+ recommended for large model training
#   - RAM: 16 GB+  |  Disk: 50 GB minimum; 100 GB+ strongly recommended
#     (model checkpoints, datasets, and conda caches can be several GB each)
#
# EDIT the variables in write_files -> /root/.mldev-bootstrap.env before
# launching, or pass them in via your provisioner.
# =============================================================================

hostname: mldev
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep 'default' so the provisioner can inject the customer SSH key
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Swap — 2 GB helps survive pip installs / model loads on tight-memory VMs
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Base packages (NVIDIA driver + CUDA installed in bootstrap via CUDA keyring)
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: false

packages:
  # Core utilities
  - curl
  - wget
  - git
  - unzip
  - zip
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common
  - apt-transport-https
  # Security
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges
  # Build tools (needed by several ML Python wheels / native extensions)
  - build-essential
  - pkg-config
  - cmake
  - libssl-dev
  - libffi-dev
  - libglib2.0-0t64
  - libsm6
  - libxrender1
  - libxext6
  - libgomp1
  - libjpeg-dev
  - libpng-dev
  # Python
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  # GPU / CUDA helpers
  - pciutils
  - ocl-icd-opencl-dev
  # Data / scientific utilities
  - libhdf5-dev
  - liblapack-dev
  - libblas-dev
  - gfortran
  # Monitoring / ops helpers
  - htop
  - nvtop
  - tmux
  - jq
  - rsync
  - screen
  # Web / TLS
  - nginx
  - certbot
  - python3-certbot-nginx

# ----------------------------------------------------------------------------
# Files written before runcmd runs
# ----------------------------------------------------------------------------
write_files:

  # --------------------------------------------------------------------------
  # (a) Operator-editable environment variables
  # --------------------------------------------------------------------------
  - path: /root/.mldev-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # -----------------------------------------------------------------------
      # MLDev bootstrap configuration — edit before first boot
      # -----------------------------------------------------------------------

      # Domain pointing at this server (leave CHANGE_ME or blank to skip TLS)
      APP_DOMAIN=CHANGE_ME

      # Email for Let's Encrypt certificate notifications
      LE_EMAIL=CHANGE_ME

      # Set to "true" to attempt Certbot TLS setup (requires APP_DOMAIN DNS)
      ENABLE_TLS=false

      # Port JupyterLab listens on internally (nginx proxies to this)
      JUPYTER_PORT=8888

      # Linux user that owns and runs the JupyterLab service
      MLDEV_USER=mldev

      # ML environment installation root
      MLDEV_ROOT=/opt/mldev

      # Python venv path
      VENV_DIR=/opt/mldev-venv

      # CUDA version tag — selects the correct PyTorch wheel index.
      # "cu128" = CUDA 12.8 (driver 570+). Change to "cu121" for older hosts.
      CUDA_TAG=cu128

      # PyTorch index URL (derived from CUDA_TAG; edit for nightlies)
      TORCH_INDEX=https://download.pytorch.org/whl/${CUDA_TAG}

      # JupyterLab password — auto-generated at boot if left as CHANGE_ME
      ADMIN_PASS=CHANGE_ME

      # JupyterLab token — auto-generated at boot if left as CHANGE_ME
      JUPYTER_TOKEN=CHANGE_ME

      # Extra pip packages to install (space-separated, appended after the
      # core ML stack). Example: "xgboost lightgbm catboost optuna"
      EXTRA_PACKAGES=

  # --------------------------------------------------------------------------
  # (b) Bootstrap shell script
  # --------------------------------------------------------------------------
  - path: /root/mldev-bootstrap.sh
    permissions: '0700'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/mldev-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.mldev-bootstrap.env

      # -----------------------------------------------------------------------
      # SIGPIPE-safe random secret generator
      # The '|| true' is required under set -e + pipefail (head -c closes
      # the pipe before tr finishes, generating SIGPIPE).
      # -----------------------------------------------------------------------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      log() { echo "[mldev-bootstrap] $(date -u '+%Y-%m-%dT%H:%M:%SZ') $*"; }

      log "=== MLDev bootstrap started ==="

      # -----------------------------------------------------------------------
      # Auto-generate secrets if still CHANGE_ME
      # -----------------------------------------------------------------------
      if [ "${ADMIN_PASS}" = "CHANGE_ME" ]; then
        ADMIN_PASS="$(rand)"
        sed -i "s/^ADMIN_PASS=CHANGE_ME/ADMIN_PASS=${ADMIN_PASS}/" /root/.mldev-bootstrap.env
        log "Auto-generated ADMIN_PASS"
      fi

      if [ "${JUPYTER_TOKEN}" = "CHANGE_ME" ]; then
        JUPYTER_TOKEN="$(rand)"
        sed -i "s/^JUPYTER_TOKEN=CHANGE_ME/JUPYTER_TOKEN=${JUPYTER_TOKEN}/" /root/.mldev-bootstrap.env
        log "Auto-generated JUPYTER_TOKEN"
      fi

      # Prefer provisioner-supplied admin email + password
      [ -r /etc/vps-provision.env ] && . /etc/vps-provision.env
      [ -n "${VPS_ADMIN_PASS:-}" ] && ADMIN_PASS="$VPS_ADMIN_PASS"
      [ -n "${VPS_ADMIN_EMAIL:-}" ] && LE_EMAIL="$VPS_ADMIN_EMAIL"

      # -----------------------------------------------------------------------
      # Automatic security updates
      # -----------------------------------------------------------------------
      log "Configuring unattended-upgrades..."
      cat > /etc/apt/apt.conf.d/20auto-upgrades <<'AUTOUPGRADE'
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
      AUTOUPGRADE
      systemctl enable --now unattended-upgrades

      # -----------------------------------------------------------------------
      # NVIDIA driver + CUDA toolkit
      # Uses the ubuntu2404 / noble CUDA repo because the 26.04 line may not
      # yet be published by NVIDIA at image build time.
      # fallback: noble repo until 26.04 published
      # -----------------------------------------------------------------------
      log "Installing NVIDIA driver and CUDA toolkit..."

      CUDA_KEYRING_DEB="cuda-keyring_1.1-1_all.deb"
      CUDA_KEYRING_URL="https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/${CUDA_KEYRING_DEB}"

      if ! dpkg -l cuda-keyring &>/dev/null; then
        wget -q -O "/tmp/${CUDA_KEYRING_DEB}" "${CUDA_KEYRING_URL}"
        dpkg -i "/tmp/${CUDA_KEYRING_DEB}"
        rm -f "/tmp/${CUDA_KEYRING_DEB}"
        apt-get update -qq
      fi

      # nvidia-open = open-kernel-module driver (preferred for Ampere+ GPUs)
      # cuda-toolkit-12-8 = compiler, libraries, headers
      command -v nvidia-smi &>/dev/null || \
        DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          nvidia-open \
          cuda-toolkit-12-8

      # Persist CUDA paths for all users / login shells
      if [ ! -f /etc/profile.d/cuda.sh ]; then
        cat > /etc/profile.d/cuda.sh <<'CUDAPROFILE'
      export PATH="/usr/local/cuda/bin${PATH:+:${PATH}}"
      export LD_LIBRARY_PATH="/usr/local/cuda/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
      CUDAPROFILE
        chmod 644 /etc/profile.d/cuda.sh
      fi
      export PATH="/usr/local/cuda/bin${PATH:+:${PATH}}"
      export LD_LIBRARY_PATH="/usr/local/cuda/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"

      # -----------------------------------------------------------------------
      # Dedicated system user for the ML environment
      # -----------------------------------------------------------------------
      log "Creating system user '${MLDEV_USER}'..."
      id "${MLDEV_USER}" &>/dev/null || \
        useradd --system --shell /bin/bash \
          --create-home --home-dir "${MLDEV_ROOT}" \
          "${MLDEV_USER}"

      # -----------------------------------------------------------------------
      # Python venv + core ML stack
      # -----------------------------------------------------------------------
      log "Setting up Python venv at ${VENV_DIR}..."
      mkdir -p "${VENV_DIR}"
      python3 -m venv "${VENV_DIR}"
      # shellcheck disable=SC1091
      source "${VENV_DIR}/bin/activate"

      pip install --upgrade pip setuptools wheel

      # PyTorch with CUDA support (must be installed before other ML libraries)
      log "Installing PyTorch (CUDA tag: ${CUDA_TAG})..."
      pip install torch torchvision torchaudio --index-url "${TORCH_INDEX}"

      # Core ML / data science stack
      log "Installing core ML libraries..."
      pip install \
        jupyterlab \
        notebook \
        ipywidgets \
        jupyter-lsp \
        jupyterlab-lsp \
        python-lsp-server \
        numpy \
        pandas \
        scipy \
        scikit-learn \
        matplotlib \
        seaborn \
        plotly \
        bokeh \
        pillow \
        opencv-python-headless \
        tqdm \
        pydantic \
        httpx \
        requests

      # HuggingFace ecosystem
      log "Installing HuggingFace ecosystem..."
      pip install \
        transformers \
        datasets \
        accelerate \
        peft \
        trl \
        diffusers \
        evaluate \
        tokenizers \
        huggingface-hub \
        bitsandbytes \
        safetensors \
        sentence-transformers

      # MLflow experiment tracking + model registry
      log "Installing MLflow..."
      pip install mlflow

      # TensorFlow (CPU+GPU; prefers CUDA if available)
      log "Installing TensorFlow..."
      pip install tensorflow || log "WARN: tensorflow install failed — skipping (optional)"

      # Additional utilities
      log "Installing utility packages..."
      pip install \
        tensorboard \
        wandb \
        onnx \
        onnxruntime-gpu \
        einops \
        timm \
        lightning \
        hydra-core \
        omegaconf \
        rich \
        click \
        typer

      # Operator-defined extra packages (no-op if EXTRA_PACKAGES is empty)
      if [ -n "${EXTRA_PACKAGES:-}" ]; then
        log "Installing extra packages: ${EXTRA_PACKAGES}"
        # word-split is intentional here
        # shellcheck disable=SC2086
        pip install ${EXTRA_PACKAGES}
      fi

      # -----------------------------------------------------------------------
      # JupyterLab configuration
      # -----------------------------------------------------------------------
      log "Configuring JupyterLab..."

      JUPYTER_CONFIG_DIR="${MLDEV_ROOT}/.jupyter"
      mkdir -p "${JUPYTER_CONFIG_DIR}"

      # Generate a hashed password for JupyterLab
      JUPYTER_PASS_HASH="$(python3 -c "
      from jupyter_server.auth import passwd
      print(passwd('${ADMIN_PASS}'))
      " 2>/dev/null || \
      python3 -c "
      from notebook.auth import passwd
      print(passwd('${ADMIN_PASS}'))
      " 2>/dev/null || echo "")"

      cat > "${JUPYTER_CONFIG_DIR}/jupyter_lab_config.py" <<JUPYCFG
      # JupyterLab server configuration — generated by mldev-bootstrap
      c.ServerApp.ip = '127.0.0.1'
      c.ServerApp.port = ${JUPYTER_PORT}
      c.ServerApp.open_browser = False
      c.ServerApp.root_dir = '${MLDEV_ROOT}/notebooks'
      c.ServerApp.allow_remote_access = True
      c.ServerApp.token = '${JUPYTER_TOKEN}'
      JUPYCFG

      if [ -n "${JUPYTER_PASS_HASH}" ]; then
        cat >> "${JUPYTER_CONFIG_DIR}/jupyter_lab_config.py" <<JUPYPASS
      c.ServerApp.password = '${JUPYTER_PASS_HASH}'
      JUPYPASS
      fi

      # Create default notebook directory and a welcome notebook
      mkdir -p "${MLDEV_ROOT}/notebooks"
      cat > "${MLDEV_ROOT}/notebooks/welcome.ipynb" <<'NBWELCOME'
      {
       "cells": [
        {
         "cell_type": "markdown",
         "metadata": {},
         "source": [
          "# MLDev Environment\n",
          "\n",
          "Welcome to your InterServer MLDev one-click app.\n",
          "\n",
          "## Installed Libraries\n",
          "- **PyTorch** with CUDA support\n",
          "- **TensorFlow** (GPU-enabled)\n",
          "- **HuggingFace**: transformers, datasets, accelerate, peft, diffusers\n",
          "- **scikit-learn**, NumPy, Pandas, SciPy\n",
          "- **MLflow** for experiment tracking\n",
          "- **JupyterLab** with LSP (language server protocol)\n",
          "- And much more — see `pip list` for the full list.\n",
          "\n",
          "## Check GPU\n",
          "Run the cell below to verify GPU access."
         ]
        },
        {
         "cell_type": "code",
         "execution_count": null,
         "metadata": {},
         "outputs": [],
         "source": [
          "import torch\n",
          "print('PyTorch:', torch.__version__)\n",
          "print('CUDA available:', torch.cuda.is_available())\n",
          "if torch.cuda.is_available():\n",
          "    print('GPU:', torch.cuda.get_device_name(0))\n",
          "    print('VRAM:', round(torch.cuda.get_device_properties(0).total_memory / 1e9, 2), 'GB')"
         ]
        }
       ],
       "metadata": {
        "kernelspec": {
         "display_name": "Python 3",
         "language": "python",
         "name": "python3"
        },
        "language_info": {
         "name": "python",
         "version": "3.x"
        }
       },
       "nbformat": 4,
       "nbformat_minor": 5
      }
      NBWELCOME

      # MLflow tracking directory
      mkdir -p "${MLDEV_ROOT}/mlruns"
      mkdir -p "${MLDEV_ROOT}/models"
      mkdir -p "${MLDEV_ROOT}/datasets"

      # Fix ownership so the service user can write everything
      chown -R "${MLDEV_USER}:${MLDEV_USER}" "${MLDEV_ROOT}" "${VENV_DIR}"

      deactivate

      # -----------------------------------------------------------------------
      # systemd service — JupyterLab
      # -----------------------------------------------------------------------
      log "Installing JupyterLab systemd service..."

      cat > /etc/systemd/system/mldev-jupyter.service <<SYSD
      [Unit]
      Description=MLDev JupyterLab Server
      Documentation=https://jupyterlab.readthedocs.io/
      After=network.target

      [Service]
      Type=simple
      User=${MLDEV_USER}
      Group=${MLDEV_USER}
      WorkingDirectory=${MLDEV_ROOT}
      Environment="PATH=/usr/local/cuda/bin:${VENV_DIR}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      Environment="LD_LIBRARY_PATH=/usr/local/cuda/lib64"
      Environment="JUPYTER_CONFIG_DIR=${MLDEV_ROOT}/.jupyter"
      ExecStart=${VENV_DIR}/bin/jupyter lab --config=${MLDEV_ROOT}/.jupyter/jupyter_lab_config.py
      Restart=on-failure
      RestartSec=15
      TimeoutStartSec=120

      [Install]
      WantedBy=multi-user.target
      SYSD

      systemctl daemon-reload
      systemctl enable mldev-jupyter
      systemctl start mldev-jupyter

      # -----------------------------------------------------------------------
      # systemd service — MLflow tracking server (optional companion)
      # -----------------------------------------------------------------------
      log "Installing MLflow tracking server systemd service..."

      cat > /etc/systemd/system/mldev-mlflow.service <<SYSD2
      [Unit]
      Description=MLDev MLflow Tracking Server
      Documentation=https://mlflow.org/docs/
      After=network.target

      [Service]
      Type=simple
      User=${MLDEV_USER}
      Group=${MLDEV_USER}
      WorkingDirectory=${MLDEV_ROOT}
      Environment="PATH=${VENV_DIR}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      ExecStart=${VENV_DIR}/bin/mlflow server \
        --host 127.0.0.1 \
        --port 5000 \
        --backend-store-uri file://${MLDEV_ROOT}/mlruns \
        --default-artifact-root file://${MLDEV_ROOT}/mlruns
      Restart=on-failure
      RestartSec=15
      TimeoutStartSec=60

      [Install]
      WantedBy=multi-user.target
      SYSD2

      systemctl daemon-reload
      systemctl enable mldev-mlflow
      systemctl start mldev-mlflow

      # -----------------------------------------------------------------------
      # Nginx reverse proxy
      # Proxies / -> JupyterLab, /mlflow/ -> MLflow tracking server
      # -----------------------------------------------------------------------
      log "Configuring Nginx reverse proxy..."

      cat > /etc/nginx/sites-available/mldev <<NGXCONF
      server {
          listen 80;
          listen [::]:80;
          server_name ${APP_DOMAIN:-_};

          # Allow large file uploads (datasets, checkpoints)
          client_max_body_size 2G;

          # JupyterLab — requires WebSocket support for the kernel protocol
          location / {
              proxy_pass         http://127.0.0.1:${JUPYTER_PORT};
              proxy_http_version 1.1;
              proxy_set_header   Upgrade \$http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
              proxy_read_timeout 86400s;
              proxy_send_timeout 86400s;
          }

          # MLflow tracking UI
          location /mlflow/ {
              proxy_pass         http://127.0.0.1:5000/;
              proxy_http_version 1.1;
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
              proxy_read_timeout 120s;
          }
      }
      NGXCONF

      ln -sf /etc/nginx/sites-available/mldev /etc/nginx/sites-enabled/mldev
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # -----------------------------------------------------------------------
      # Certbot TLS (optional; never fails the boot if DNS not pointed yet)
      # -----------------------------------------------------------------------
      if [ "${ENABLE_TLS}" = "true" ] && [ -n "${APP_DOMAIN:-}" ] && [ "${APP_DOMAIN}" != "CHANGE_ME" ]; then
        log "Requesting Let's Encrypt certificate for ${APP_DOMAIN}..."
        certbot --nginx --non-interactive --agree-tos \
          --email "${LE_EMAIL}" \
          --domains "${APP_DOMAIN}" \
          --redirect \
          || echo "WARN: certbot deferred — DNS not yet pointing here"
      else
        log "Skipping Certbot (ENABLE_TLS=${ENABLE_TLS} or APP_DOMAIN not configured)"
      fi

      # -----------------------------------------------------------------------
      # Firewall (UFW)
      # -----------------------------------------------------------------------
      log "Configuring UFW firewall..."

      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp    comment 'SSH'
      ufw allow 80/tcp    comment 'HTTP'
      ufw allow 443/tcp   comment 'HTTPS'
      # JupyterLab and MLflow are served through nginx only; keep direct ports blocked
      ufw --force enable

      # -----------------------------------------------------------------------
      # fail2ban
      # -----------------------------------------------------------------------
      log "Configuring fail2ban..."

      cat > /etc/fail2ban/jail.d/mldev.conf <<'F2BJAIL'
      [sshd]
      enabled  = true
      port     = ssh
      maxretry = 5
      bantime  = 3600
      findtime = 600

      [nginx-http-auth]
      enabled  = true
      port     = http,https
      maxretry = 5
      bantime  = 3600
      findtime = 600
      F2BJAIL

      systemctl enable --now fail2ban

      # -----------------------------------------------------------------------
      # Write credentials file
      # -----------------------------------------------------------------------
      log "Writing credentials file..."

      PUBLIC_IP="$(curl -sf --max-time 5 https://ipv4.icanhazip.com \
                   || curl -sf --max-time 5 https://api.ipify.org \
                   || hostname -I | awk '{print $1}')"

      PROTO="http"
      WEB_HOST="${APP_DOMAIN:-${PUBLIC_IP}}"
      if [ "${ENABLE_TLS}" = "true" ] && [ -n "${APP_DOMAIN:-}" ] && [ "${APP_DOMAIN}" != "CHANGE_ME" ]; then
        PROTO="https"
      fi

      cat > /root/mldev-credentials.txt <<CREDS
      ============================================================
      MLDev — Access Credentials
      Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
      ============================================================

      NOTE: This app REQUIRES an NVIDIA GPU VPS plan.
            Recommended minimum: 1x NVIDIA GPU, 8 GB VRAM, 16 GB RAM.
            Disk: 50 GB minimum; 100 GB+ recommended for large datasets
            and model checkpoints.

      Public IP          : ${PUBLIC_IP}
      App domain         : ${APP_DOMAIN:-Not configured}

      JupyterLab UI      : ${PROTO}://${WEB_HOST}
      JupyterLab (direct): http://${PUBLIC_IP}:${JUPYTER_PORT}
      MLflow UI          : ${PROTO}://${WEB_HOST}/mlflow/
      MLflow (direct)    : http://${PUBLIC_IP}:5000

      JupyterLab password: ${ADMIN_PASS}
      JupyterLab token   : ${JUPYTER_TOKEN}

      ML service user    : ${MLDEV_USER}
      Install root       : ${MLDEV_ROOT}
      Python venv        : ${VENV_DIR}
      Notebooks dir      : ${MLDEV_ROOT}/notebooks/
      Datasets dir       : ${MLDEV_ROOT}/datasets/
      Models dir         : ${MLDEV_ROOT}/models/
      MLflow runs        : ${MLDEV_ROOT}/mlruns/

      CUDA tag           : ${CUDA_TAG}
      Log file           : /var/log/mldev-bootstrap.log

      Services:
        systemctl status mldev-jupyter
        systemctl status mldev-mlflow
        systemctl status nginx

      Pre-installed ML libraries:
        PyTorch (CUDA ${CUDA_TAG}), TorchVision, TorchAudio
        TensorFlow (GPU)
        HuggingFace: transformers, datasets, accelerate, peft, trl, diffusers
        scikit-learn, NumPy, Pandas, SciPy, Matplotlib, Seaborn, Plotly
        MLflow, TensorBoard, WandB (weights-and-biases)
        ONNX + onnxruntime-gpu
        LightningAI (pytorch-lightning), Hydra, OmegaConf
        sentence-transformers, timm, einops, bitsandbytes, safetensors

      Next steps:
        1. Open ${PROTO}://${WEB_HOST} in your browser
           Use password: ${ADMIN_PASS}
           (or token: ${JUPYTER_TOKEN})
        2. Check GPU availability in the welcome.ipynb notebook
        3. To point a domain:
             Set APP_DOMAIN in /root/.mldev-bootstrap.env
             Then re-run certbot:
               certbot --nginx -d <your-domain> --email <you@example.com>
        4. If the NVIDIA driver needs a reboot to activate, run:
               reboot
           then verify with: nvidia-smi
        5. Add extra Python packages:
               sudo -u ${MLDEV_USER} ${VENV_DIR}/bin/pip install <package>
        6. Upload datasets to: ${MLDEV_ROOT}/datasets/
      ============================================================
      CREDS
      chmod 600 /root/mldev-credentials.txt

      log "=== MLDev bootstrap complete: $(date -u '+%Y-%m-%dT%H:%M:%SZ') ==="
      log "=== Credentials saved to /root/mldev-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap exactly once at first boot
# ----------------------------------------------------------------------------
bootcmd:
  # Free the dpkg/apt lock before cloud-init's package stage: gracefully stop
  # (SIGTERM, NOT kill -9) unattended-upgrades + apt-daily so they release the
  # lock, and mask the timers/services so they don't restart this boot.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl stop unattended-upgrades.service apt-daily.service apt-daily-upgrade.service 2>/dev/null; systemctl mask apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service 2>/dev/null; true" ]

runcmd:
  - [ bash, -lc, "/root/mldev-bootstrap.sh" ]

# ----------------------------------------------------------------------------
# Final message shown in cloud-init output
# ----------------------------------------------------------------------------
final_message: |
  ============================================================
  MLDev one-click app bootstrap has finished.
  Elapsed time: $UPTIME seconds since boot.

  IMPORTANT: This app REQUIRES an NVIDIA GPU.
    Without a real GPU, PyTorch and TensorFlow will run on CPU only
    (extremely slow for training / inference).
    If the driver needs activation after install, reboot and run: nvidia-smi

  Access details and generated credentials:
    cat /root/mldev-credentials.txt

  Services:
    systemctl status mldev-jupyter   # JupyterLab
    systemctl status mldev-mlflow    # MLflow tracking server
    systemctl status nginx           # Reverse proxy

  Bootstrap log:
    /var/log/mldev-bootstrap.log

  Hardware requirements:
    GPU: NVIDIA (Turing / Ampere+), 8 GB VRAM minimum
    RAM: 16 GB+   Disk: 50 GB min, 100 GB+ recommended
  ============================================================
