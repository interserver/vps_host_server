#cloud-config
# =============================================================================
# ASP.NET "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: .NET 9 SDK/Runtime + Nginx (reverse proxy) + Certbot (Let's Encrypt)
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in write_files -> /root/.aspnet-bootstrap.env
# before launching, or pass them in via your provisioner.
# =============================================================================

hostname: aspnet
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep default so the provisioner can inject the customer's SSH key
# ----------------------------------------------------------------------------
users:
  - default
  - name: deploy
    groups: [sudo, www-data]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

# ----------------------------------------------------------------------------
# Packages (base tools; .NET is installed by the bootstrap script via the
# Microsoft apt repo because the Ubuntu 26.04 package may lag behind)
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - htop
  - wget

# ----------------------------------------------------------------------------
# Swap  (2 GiB — survives dotnet restore / build-time spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Write files
# ----------------------------------------------------------------------------
write_files:

  # -- operator-editable environment variables --------------------------------
  - path: /root/.aspnet-bootstrap.env
    permissions: '0600'
    content: |
      # -----------------------------------------------------------------------
      # ASP.NET bootstrap — operator-editable variables
      # Change these BEFORE first boot, or update and re-run the bootstrap.
      # -----------------------------------------------------------------------
      APP_DOMAIN=example.com
      LE_EMAIL=admin@example.com
      ENABLE_TLS=true

      # .NET version to install (major.minor or "lts")
      DOTNET_VERSION=9.0

      # Application user (runs the Kestrel process)
      APP_USER=www-data

      # Directory where the sample app is placed
      APP_DIR=/var/www/aspnet

      # Listening port for Kestrel (Nginx proxies to this)
      KESTREL_PORT=5000

      # Admin / deployment secret — set to CHANGE_ME to auto-generate
      ADMIN_PASS=CHANGE_ME

  # -- bootstrap script -------------------------------------------------------
  - path: /root/aspnet-bootstrap.sh
    permissions: '0700'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/aspnet-bootstrap.log) 2>&1
      source /root/.aspnet-bootstrap.env

      echo "=== ASP.NET bootstrap started at $(date -u) ==="

      # -----------------------------------------------------------------------
      # 0. Random-secret helper — SIGPIPE-safe under set -e + pipefail
      # -----------------------------------------------------------------------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      if [ "${ADMIN_PASS}" = "CHANGE_ME" ]; then
        ADMIN_PASS="$(rand)"
        echo "ADMIN_PASS=${ADMIN_PASS}" >> /root/.aspnet-bootstrap.env
      fi

      # -----------------------------------------------------------------------
      # 1. Microsoft .NET apt repository
      #    Ubuntu 26.04 ('plucky') may not have a published release line yet;
      #    fall back to 24.04 noble packages which are compatible.
      # -----------------------------------------------------------------------
      UBUNTU_CODENAME="$(lsb_release -cs)"
      MSFT_CODENAME="${UBUNTU_CODENAME}"

      # fallback: noble repo until 26.04 published
      MSFT_FEED_URL="https://packages.microsoft.com/config/ubuntu"
      if ! curl -fsSL "${MSFT_FEED_URL}/${UBUNTU_CODENAME}/packages-microsoft-prod.deb" \
           -o /tmp/packages-microsoft-prod.deb 2>/dev/null; then
        echo "WARN: No Microsoft repo for ${UBUNTU_CODENAME}, falling back to noble"
        MSFT_CODENAME="24.04"
        curl -fsSL "${MSFT_FEED_URL}/24.04/packages-microsoft-prod.deb" \
          -o /tmp/packages-microsoft-prod.deb
      fi

      if ! dpkg -l packages-microsoft-prod &>/dev/null; then
        dpkg -i /tmp/packages-microsoft-prod.deb
      fi
      rm -f /tmp/packages-microsoft-prod.deb

      apt-get update -qq

      # -----------------------------------------------------------------------
      # 2. Install .NET SDK (includes runtime)
      # -----------------------------------------------------------------------
      DOTNET_PKG="dotnet-sdk-${DOTNET_VERSION}"
      if ! command -v dotnet &>/dev/null; then
        apt-get install -y "${DOTNET_PKG}" || \
          apt-get install -y dotnet-sdk-9.0   # explicit fallback
      fi
      dotnet --version

      # -----------------------------------------------------------------------
      # 3. Create application directory + sample "Hello World" ASP.NET app
      # -----------------------------------------------------------------------
      mkdir -p "${APP_DIR}"

      if [ ! -f "${APP_DIR}/Program.cs" ]; then
        # Create a minimal ASP.NET Core web app without the interactive new-project prompt
        dotnet new web --output "${APP_DIR}" --name AspNetApp --force \
          --no-restore 2>&1 || true

        # Patch Program.cs to bind on all interfaces at KESTREL_PORT
        cat > "${APP_DIR}/Program.cs" <<'CSHARP'
      var builder = WebApplication.CreateBuilder(args);

      // Bind to all interfaces so Nginx can proxy to it
      builder.WebHost.UseUrls($"http://0.0.0.0:{Environment.GetEnvironmentVariable("ASPNETCORE_HTTP_PORT") ?? "5000"}");

      var app = builder.Build();

      app.MapGet("/", () => Results.Content("""
      <!DOCTYPE html>
      <html lang="en">
      <head><meta charset="utf-8"><title>ASP.NET on InterServer</title>
      <style>body{font-family:sans-serif;text-align:center;padding:4rem;background:#1a1a2e;color:#e0e0e0}
      h1{color:#0078d4}a{color:#0078d4}</style></head>
      <body>
      <h1>ASP.NET is running!</h1>
      <p>Your InterServer VPS is ready. Deploy your application to <code>/var/www/aspnet</code>.</p>
      <p><a href="https://docs.microsoft.com/aspnet/core">.NET Documentation</a></p>
      </body></html>
      """, "text/html"));

      app.Run();
      CSHARP

        chown -R "${APP_USER}:${APP_USER}" "${APP_DIR}"
        dotnet restore "${APP_DIR}"
        dotnet publish "${APP_DIR}" -c Release -o "${APP_DIR}/publish" --no-restore 2>&1 || \
          dotnet publish "${APP_DIR}" -c Release -o "${APP_DIR}/publish"
        chown -R "${APP_USER}:${APP_USER}" "${APP_DIR}"
      fi

      # -----------------------------------------------------------------------
      # 4. systemd service for Kestrel
      # -----------------------------------------------------------------------
      if [ ! -f /etc/systemd/system/aspnet.service ]; then
        cat > /etc/systemd/system/aspnet.service <<UNIT
      [Unit]
      Description=ASP.NET Core Web Application
      After=network.target

      [Service]
      WorkingDirectory=${APP_DIR}/publish
      ExecStart=/usr/bin/dotnet ${APP_DIR}/publish/AspNetApp.dll
      Restart=always
      RestartSec=10
      KillSignal=SIGINT
      SyslogIdentifier=aspnet
      User=${APP_USER}
      Environment=ASPNETCORE_ENVIRONMENT=Production
      Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false
      Environment=ASPNETCORE_HTTP_PORT=${KESTREL_PORT}

      [Install]
      WantedBy=multi-user.target
      UNIT
      fi

      systemctl daemon-reload
      systemctl enable aspnet
      systemctl restart aspnet

      # -----------------------------------------------------------------------
      # 5. Nginx reverse proxy
      # -----------------------------------------------------------------------
      NGINX_CONF="/etc/nginx/sites-available/aspnet"

      cat > "${NGINX_CONF}" <<NGINXCONF
      server {
          listen 80;
          listen [::]:80;
          server_name ${APP_DOMAIN};

          location / {
              proxy_pass         http://127.0.0.1:${KESTREL_PORT};
              proxy_http_version 1.1;
              proxy_set_header   Upgrade \$http_upgrade;
              proxy_set_header   Connection keep-alive;
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
              proxy_cache_bypass \$http_upgrade;
          }
      }
      NGINXCONF

      ln -sf "${NGINX_CONF}" /etc/nginx/sites-enabled/aspnet
      rm -f /etc/nginx/sites-enabled/default
      nginx -t
      systemctl enable nginx
      systemctl restart nginx

      # -----------------------------------------------------------------------
      # 6. UFW firewall — allow ONLY SSH + HTTP + HTTPS
      # -----------------------------------------------------------------------
      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp    comment 'SSH'
      ufw allow 80/tcp    comment 'HTTP'
      ufw allow 443/tcp   comment 'HTTPS'
      ufw --force enable

      # -----------------------------------------------------------------------
      # 7. fail2ban
      # -----------------------------------------------------------------------
      systemctl enable fail2ban
      systemctl restart fail2ban

      # -----------------------------------------------------------------------
      # 8. Unattended security upgrades
      # -----------------------------------------------------------------------
      cat > /etc/apt/apt.conf.d/20auto-upgrades <<'APT'
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
      APT

      # -----------------------------------------------------------------------
      # 9. TLS via Certbot (deferred gracefully if DNS not yet pointed)
      # -----------------------------------------------------------------------
      if [ "${ENABLE_TLS}" = "true" ] && \
         [ "${APP_DOMAIN}" != "example.com" ] && \
         [ "${LE_EMAIL}" != "admin@example.com" ]; then
        certbot --nginx \
          --non-interactive \
          --agree-tos \
          --redirect \
          -m "${LE_EMAIL}" \
          -d "${APP_DOMAIN}" || echo "WARN: certbot deferred — point DNS to this IP then re-run: certbot --nginx -m ${LE_EMAIL} -d ${APP_DOMAIN}"
      else
        echo "WARN: certbot deferred — set APP_DOMAIN and LE_EMAIL in /root/.aspnet-bootstrap.env then re-run certbot"
      fi

      # -----------------------------------------------------------------------
      # 10. Write credentials file
      # -----------------------------------------------------------------------
      cat > /root/aspnet-credentials.txt <<CREDS
      ===== ASP.NET VPS Credentials =====
      Generated : $(date -u)
      -----------------------------------
      URL (HTTP) : http://${APP_DOMAIN}
      URL (HTTPS): https://${APP_DOMAIN}
      App Dir    : ${APP_DIR}
      Kestrel    : http://127.0.0.1:${KESTREL_PORT}
      Admin Pass : ${ADMIN_PASS}
      .NET Ver   : $(dotnet --version 2>/dev/null || echo unknown)
      -----------------------------------
      TLS        : ${ENABLE_TLS}
      LE Email   : ${LE_EMAIL}
      -----------------------------------
      Service    : systemctl status aspnet
      Logs       : journalctl -u aspnet -f
      Bootstrap  : /var/log/aspnet-bootstrap.log
      CREDS
      chmod 600 /root/aspnet-credentials.txt

      echo "=== ASP.NET bootstrap finished at $(date -u) ==="
      echo "=== Credentials written to /root/aspnet-credentials.txt ==="

# ----------------------------------------------------------------------------
# runcmd — run the bootstrap once at first boot
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/aspnet-bootstrap.sh" ]

# ----------------------------------------------------------------------------
# Final message shown in cloud-init output
# ----------------------------------------------------------------------------
final_message: |
  ============================================================
  ASP.NET VPS is ready!
  - Credentials : /root/aspnet-credentials.txt
  - Bootstrap log: /var/log/aspnet-bootstrap.log
  - Service status: systemctl status aspnet
  - Edit /root/.aspnet-bootstrap.env and re-run
    /root/aspnet-bootstrap.sh to change domain / enable TLS.
  ============================================================
