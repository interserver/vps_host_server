#cloud-config
# =============================================================================
# SeaTable "one-click app" — Ubuntu 24.04 LTS (noble) cloud-init user-data
# Stack: SeaTable Server (Community Edition) via the OFFICIAL Docker Compose
#        deployment + bundled Caddy (automatic Let's Encrypt TLS) + MariaDB +
#        Redis (all in containers) · UFW + fail2ban + unattended-upgrades
# -----------------------------------------------------------------------------
# IMPORTANT: SeaTable retired its old apt repo (the host linux.seatable.io is
# DEAD / does not resolve). The current, supported install method is Docker
# Compose, distributed as a release tarball from GitHub:
#   https://github.com/seatable/seatable-release/releases/latest/download/seatable-compose.tar.gz
# Docs: https://admin.seatable.com/installation/basic-setup/
# -----------------------------------------------------------------------------
# EDIT the operator variables in /root/.seatable-bootstrap.env before
# launching (or inject via provisioner). Secrets are random per-boot when
# left as CHANGE_ME.
# =============================================================================

hostname: seatable
manage_etc_hosts: true
timezone: UTC

# ---------------------------------------------------------------------------
# Users — preserve 'default' so the provisioner can inject the customer's SSH key
# ---------------------------------------------------------------------------
users:
  - default

# ---------------------------------------------------------------------------
# Packages — base tooling only; SeaTable + DB + Redis + Caddy run in Docker.
# Docker CE itself is installed in the bootstrap from the official repo.
# ---------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - curl
  - wget
  - gnupg
  - gnupg2
  - ca-certificates
  - lsb-release
  - apt-transport-https
  - software-properties-common
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges
  - pwgen
  - tar
  - net-tools
  - htop
  - jq
  - rsync

# ---------------------------------------------------------------------------
# Swap — survive build-time memory spikes (image pulls, DB init)
# ---------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ---------------------------------------------------------------------------
# Write files
# ---------------------------------------------------------------------------
write_files:

  # ---- Operator-editable environment variables ----------------------------
  - path: /root/.seatable-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # SeaTable bootstrap environment
      # Edit these before first boot, or inject via provisioner.

      # Fully-qualified domain name for this SeaTable instance.
      # REQUIRED for automatic Let's Encrypt TLS via the bundled Caddy.
      # If left CHANGE_ME, SeaTable is served over plain HTTP on the server IP.
      APP_DOMAIN=CHANGE_ME

      # Email used for Let's Encrypt certificate registration (Caddy ACME).
      LE_EMAIL=CHANGE_ME

      # Set to "true" to serve HTTPS with automatic Let's Encrypt certs.
      # Requires APP_DOMAIN to resolve to this server's public IP first.
      ENABLE_TLS=true

      # SeaTable admin credentials
      # Leave passwords as CHANGE_ME to auto-generate random values at runtime
      ADMIN_EMAIL=CHANGE_ME
      ADMIN_PASS=CHANGE_ME

      # Database root password (MariaDB container; auto-generated if CHANGE_ME)
      DB_ROOT_PASS=CHANGE_ME

      # SeaTable version to install (leave empty for the latest release)
      SEATABLE_VERSION=

  # ---- Bootstrap script ---------------------------------------------------
  - path: /root/seatable-bootstrap.sh
    permissions: '0700'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/seatable-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.seatable-bootstrap.env

      # ----------------------------------------------------------------
      # Helper: SIGPIPE-safe random string (required under set -e + pipefail)
      # SeaTable warns against % # $ in passwords, so keep it alphanumeric.
      # ----------------------------------------------------------------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      echo "=== SeaTable bootstrap starting $(date -u) ==="

      export DEBIAN_FRONTEND=noninteractive

      # ----------------------------------------------------------------
      # Resolve secrets — generate if placeholder left in place
      # ----------------------------------------------------------------
      [ "${ADMIN_PASS}"   = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"
      [ "${ADMIN_EMAIL}"  = "CHANGE_ME" ] && ADMIN_EMAIL="admin@${APP_DOMAIN:-example.com}"
      [ "${DB_ROOT_PASS}" = "CHANGE_ME" ] && DB_ROOT_PASS="$(rand)"
      REDIS_PASS="$(rand)"
      JWT_KEY="$(rand)$(rand)"

      # ----------------------------------------------------------------
      # Unattended-upgrades — security updates only
      # ----------------------------------------------------------------
      cat > /etc/apt/apt.conf.d/20auto-upgrades <<'AUTOUPGRADE'
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
      AUTOUPGRADE

      cat > /etc/apt/apt.conf.d/50unattended-upgrades <<'UUCONF'
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Automatic-Reboot "false";
      UUCONF

      systemctl enable --now unattended-upgrades

      # ----------------------------------------------------------------
      # fail2ban — SSH protection
      # ----------------------------------------------------------------
      cat > /etc/fail2ban/jail.local <<'F2B'
      [DEFAULT]
      bantime  = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port    = ssh
      F2B
      systemctl enable --now fail2ban

      # ----------------------------------------------------------------
      # Install Docker CE + compose plugin from the official Docker repo
      # ----------------------------------------------------------------
      if ! command -v docker >/dev/null 2>&1; then
        echo "=== Installing Docker CE ==="
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        UBU_CODENAME="$(. /etc/os-release && echo "${UBUNTU_CODENAME:-${VERSION_CODENAME}}")"
        cat > /etc/apt/sources.list.d/docker.list <<DOCKERREPO
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${UBU_CODENAME} stable
      DOCKERREPO
        apt-get update -qq
        apt-get install -y docker-ce docker-ce-cli containerd.io \
          docker-buildx-plugin docker-compose-plugin
      fi
      systemctl enable --now docker

      # ----------------------------------------------------------------
      # UFW firewall — SSH + HTTP + HTTPS (Caddy serves 80/443)
      # ----------------------------------------------------------------
      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp   comment 'SSH'
      ufw allow 80/tcp   comment 'HTTP (Caddy / ACME)'
      ufw allow 443/tcp  comment 'HTTPS (Caddy)'
      ufw --force enable

      # ----------------------------------------------------------------
      # Download the official SeaTable Docker Compose bundle
      # https://github.com/seatable/seatable-release  (verified reachable)
      # ----------------------------------------------------------------
      echo "=== Fetching SeaTable Compose bundle ==="
      COMPOSE_DIR=/opt/seatable-compose
      mkdir -p "${COMPOSE_DIR}"

      if [ -n "${SEATABLE_VERSION:-}" ]; then
        TARBALL_URL="https://github.com/seatable/seatable-release/releases/download/v${SEATABLE_VERSION}/seatable-compose.tar.gz"
      else
        TARBALL_URL="https://github.com/seatable/seatable-release/releases/latest/download/seatable-compose.tar.gz"
      fi

      wget -c "${TARBALL_URL}" -O - | tar -xz -C "${COMPOSE_DIR}"
      cp -n "${COMPOSE_DIR}/.env-release" "${COMPOSE_DIR}/.env"

      # ----------------------------------------------------------------
      # Configure the SeaTable .env
      # ----------------------------------------------------------------
      echo "=== Writing SeaTable .env ==="
      cd "${COMPOSE_DIR}"

      SERVER_IP="$(curl -fsSL --max-time 5 https://ipv4.icanhazip.com 2>/dev/null \
        || hostname -I | awk '{print $1}')"

      # Hostname Caddy/SeaTable advertises. Use the FQDN if set, else the IP.
      if [ "${APP_DOMAIN}" != "CHANGE_ME" ] && [ -n "${APP_DOMAIN}" ]; then
        SEATABLE_HOST="${APP_DOMAIN}"
      else
        SEATABLE_HOST="${SERVER_IP}"
      fi

      # Helper to set a KEY=VALUE in .env (replace if present, append otherwise)
      set_env() {
        local key="$1" val="$2"
        if grep -qE "^[# ]*${key}=" .env; then
          sed -i "s|^[# ]*${key}=.*|${key}='${val}'|" .env
        else
          printf "%s='%s'\n" "${key}" "${val}" >> .env
        fi
      }

      # When TLS is enabled with a real domain, Caddy + SeaTable serve HTTPS and
      # Caddy fetches Let's Encrypt certs automatically. Otherwise fall back to
      # the http-only proxy and serve over the bare IP.
      if [ "${ENABLE_TLS}" = "true" ] && [ "${APP_DOMAIN}" != "CHANGE_ME" ] && [ -n "${APP_DOMAIN}" ]; then
        set_env COMPOSE_FILE 'caddy.yml,seatable-server.yml'
        [ "${LE_EMAIL}" != "CHANGE_ME" ] && set_env SEATABLE_CADDY_ACME_EMAIL "${LE_EMAIL}"
      else
        # http-only deployment (no automatic TLS); SeaTable's caddy still
        # terminates plain HTTP on port 80.
        set_env COMPOSE_FILE 'caddy.yml,seatable-server.yml'
      fi

      set_env TIME_ZONE                 "UTC"
      set_env SEATABLE_SERVER_HOSTNAME  "${SEATABLE_HOST}"
      set_env SEATABLE_ADMIN_EMAIL      "${ADMIN_EMAIL}"
      set_env SEATABLE_ADMIN_PASSWORD   "${ADMIN_PASS}"
      set_env SEATABLE_MYSQL_ROOT_PASSWORD "${DB_ROOT_PASS}"
      set_env MARIADB_PASSWORD          "${DB_ROOT_PASS}"
      set_env REDIS_PASSWORD            "${REDIS_PASS}"
      set_env JWT_PRIVATE_KEY           "${JWT_KEY}"

      chmod 600 .env

      # ----------------------------------------------------------------
      # Bring up the SeaTable stack
      # ----------------------------------------------------------------
      echo "=== Starting SeaTable containers (docker compose up -d) ==="
      docker compose up -d \
        || echo "WARN: 'docker compose up -d' returned non-zero — review: docker compose -f ${COMPOSE_DIR}/docker-compose.yml logs"

      # Give the stack a moment; SeaTable initialises DBs on first start.
      sleep 10
      docker compose ps || true

      # ----------------------------------------------------------------
      # Write credentials file (readable only by root)
      # ----------------------------------------------------------------
      PROTO="http"
      if [ "${ENABLE_TLS}" = "true" ] && [ "${APP_DOMAIN}" != "CHANGE_ME" ] && [ -n "${APP_DOMAIN}" ]; then
        PROTO="https"
      fi

      cat > /root/seatable-credentials.txt <<CREDS
      ============================================================
       SeaTable CE (Docker Compose) — Server Credentials
       Generated: $(date -u)
      ============================================================

       URL              : ${PROTO}://${SEATABLE_HOST}
       Admin email      : ${ADMIN_EMAIL}
       Admin password   : ${ADMIN_PASS}

       MariaDB root password : ${DB_ROOT_PASS}
       Redis password        : ${REDIS_PASS}

       Compose directory     : /opt/seatable-compose
       Env file              : /opt/seatable-compose/.env
       Bootstrap log         : /var/log/seatable-bootstrap.log

       Firewall open ports   : 22 (SSH) | 80 (HTTP) | 443 (HTTPS via Caddy)

       Manage the stack:
         cd /opt/seatable-compose
         docker compose ps
         docker compose logs -f
         docker compose restart
         docker compose down   # stop
         docker compose up -d  # start

       TLS: Caddy auto-obtains/renews Let's Encrypt certs for the
            SEATABLE_SERVER_HOSTNAME above when ENABLE_TLS=true and a real
            domain is set. Ensure DNS points here before first start.

       IMPORTANT: Change the admin password after first login.
      ============================================================
      CREDS
      chmod 600 /root/seatable-credentials.txt

      echo ""
      echo "=== SeaTable bootstrap complete $(date -u) ==="
      echo "=== URL         : ${PROTO}://${SEATABLE_HOST}"
      echo "=== Admin email : ${ADMIN_EMAIL}"
      echo "=== Admin pass  : ${ADMIN_PASS}"
      echo "=== Full creds  : /root/seatable-credentials.txt"

# ---------------------------------------------------------------------------
# Run the bootstrap script exactly once at first boot
# ---------------------------------------------------------------------------
bootcmd:
  # Stop the base image's apt-daily / unattended-upgrades TIMERS from firing at
  # first boot so they don't hold the dpkg lock during cloud-init's package
  # stage. Masking timers only — NO process killing (that corrupts dpkg and a
  # -f match would kill this very command). cloud-init already waits for the lock.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl mask apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true; true" ]

runcmd:
  - [ bash, -lc, "/root/seatable-bootstrap.sh" ]

# ---------------------------------------------------------------------------
# Final message shown in cloud-init output
# ---------------------------------------------------------------------------
final_message: |
  ============================================================
   SeaTable CE bootstrap complete (Docker Compose deployment).
   URL         : http(s)://YOUR_IP_OR_DOMAIN
   Admin creds : /root/seatable-credentials.txt
   Compose dir : /opt/seatable-compose
   Log         : /var/log/seatable-bootstrap.log
  ============================================================
