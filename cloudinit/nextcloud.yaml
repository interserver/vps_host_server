#cloud-config
# =============================================================================
# Nextcloud "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Nextcloud AIO (All-in-One, Docker) + Nginx reverse proxy
#        UFW firewall + fail2ban + swap + unattended-upgrades
# Nextcloud is a self-hosted productivity platform: files, calendar, contacts,
# video calls, office documents, and 100+ apps.
# https://nextcloud.com  |  https://github.com/nextcloud/all-in-one
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.nextcloud-bootstrap.env
# block before launching. Secrets are generated randomly per-boot if left as
# CHANGE_ME defaults.
# =============================================================================

hostname: nextcloud
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key / hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget
  - python3
  - openssl

# ----------------------------------------------------------------------------
# Swap (survive build-time memory spikes; AIO pulls several large images)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk ahead of the bootstrap script
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.nextcloud-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE BEFORE FIRST BOOT -----
      APP_DOMAIN="example.com"          # primary domain (no scheme, no trailing slash)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot (DNS not pointed yet)
      ADMIN_PASS="CHANGE_ME"            # Nextcloud AIO master password (web GUI at :8080)
      # Data directory — all Nextcloud data persisted here; back this up!
      NC_DATA_DIR="/opt/nextcloud/data"

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/nextcloud.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades -------------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- nginx reverse-proxy vhost (bootstrap replaces APP_DOMAIN_PLACEHOLDER) --
  # AIO management interface runs on :8080; the actual Nextcloud runs on :11000.
  # This vhost proxies the public Nextcloud on :11000; the AIO dashboard at
  # :8080 is reachable directly (firewalled to localhost; use SSH tunnel).
  - path: /etc/nginx/sites-available/nextcloud.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Let's Encrypt ACME challenge
          location /.well-known/acme-challenge/ { root /var/www/html; }

          # Nextcloud-recommended security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "no-referrer" always;
          add_header X-Robots-Tag "none" always;
          add_header X-Download-Options "noopen" always;
          add_header X-Permitted-Cross-Domain-Policies "none" always;

          # Large file uploads
          client_max_body_size 10240M;
          client_body_timeout  300s;

          location / {
              proxy_pass             http://127.0.0.1:11000;
              proxy_http_version     1.1;
              proxy_set_header       Upgrade $http_upgrade;
              proxy_set_header       Connection "upgrade";
              proxy_set_header       Host $host;
              proxy_set_header       X-Real-IP $remote_addr;
              proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header       X-Forwarded-Proto $scheme;
              proxy_read_timeout     3600s;
              proxy_send_timeout     3600s;
              proxy_buffering        off;
              proxy_request_buffering off;
          }
      }

  # --- Docker Compose project for Nextcloud AIO --------------------------------
  - path: /opt/nextcloud/docker-compose.yml
    permissions: '0640'
    owner: root:root
    content: |
      # Nextcloud AIO Docker Compose — generated by nextcloud-bootstrap.sh.
      # AIO master: :8080 (localhost only; reach via SSH tunnel)
      # Nextcloud:  :11000 (proxied through nginx on 80/443)
      services:
        nextcloud-aio-mastercontainer:
          image: nextcloud/all-in-one:latest
          restart: unless-stopped
          container_name: nextcloud-aio-mastercontainer
          volumes:
            - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
            - /var/run/docker.sock:/var/run/docker.sock:ro
          ports:
            - "127.0.0.1:8080:8080"
            - "127.0.0.1:8443:8443"
          environment:
            - APACHE_PORT=11000
            - APACHE_IP_BINDING=127.0.0.1
            - NEXTCLOUD_DATADIR=${NC_DATA_DIR:-/opt/nextcloud/data}
            - SKIP_DOMAIN_VALIDATION=false
            - AIO_DISABLE_BACKUP_SECTION=false

      volumes:
        nextcloud_aio_mastercontainer:
          name: nextcloud_aio_mastercontainer

  # --- main bootstrap script -------------------------------------------------
  - path: /root/nextcloud-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/nextcloud-bootstrap.log) 2>&1
      source /root/.nextcloud-bootstrap.env

      echo "=== Nextcloud bootstrap started: $(date) ==="

      # --- random secret helper (SIGPIPE-safe under set -e + pipefail) ------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$ADMIN_PASS" = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"

      # --- install Docker CE via official script (distro-agnostic) ----------
      if ! command -v docker >/dev/null 2>&1; then
        echo "Installing Docker CE..."
        # fallback: noble repo until 26.04 published
        curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
        sh /tmp/get-docker.sh
        rm -f /tmp/get-docker.sh
      fi
      systemctl enable --now docker

      # --- Docker Compose v2 plugin ------------------------------------------
      if ! docker compose version >/dev/null 2>&1; then
        COMPOSE_VER="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
          | jq -r '.tag_name' 2>/dev/null || echo 'v2.27.1')"
        COMPOSE_URL="https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-linux-$(uname -m)"
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -fsSL "$COMPOSE_URL" -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      fi
      echo "Docker  : $(docker --version)"
      echo "Compose : $(docker compose version)"

      # --- Create data + project directories ---------------------------------
      mkdir -p "${NC_DATA_DIR}"
      mkdir -p /opt/nextcloud
      chmod 755 /opt/nextcloud
      chmod 750 "${NC_DATA_DIR}"
      chown root:www-data "${NC_DATA_DIR}" 2>/dev/null || true

      # --- Write .env for Docker Compose -------------------------------------
      cat > /opt/nextcloud/.env <<DOTENV
      # Generated by nextcloud-bootstrap.sh — $(date)
      NC_DATA_DIR=${NC_DATA_DIR}
      DOTENV
      chmod 600 /opt/nextcloud/.env

      # --- Pull and start Nextcloud AIO master container --------------------
      cd /opt/nextcloud
      docker compose pull
      docker compose up -d

      echo "Nextcloud AIO master container started."
      echo "AIO management UI available at: https://127.0.0.1:8443 (or http://127.0.0.1:8080) via SSH tunnel"
      echo "Waiting 15 s for AIO to initialise before nginx setup..."
      sleep 15

      # --- nginx vhost: replace domain placeholder --------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|" \
        /etc/nginx/sites-available/nextcloud.conf
      ln -sf /etc/nginx/sites-available/nextcloud.conf \
        /etc/nginx/sites-enabled/nextcloud.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- Firewall: SSH + HTTP + HTTPS only --------------------------------
      # AIO management port 8080/8443 is bound to 127.0.0.1 only (SSH tunnel)
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt (non-fatal if DNS not pointed yet) ---------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect \
          || echo "WARN: certbot deferred — re-run once DNS points here: certbot --nginx -d ${APP_DOMAIN}"
      fi

      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"

      # --- Set AIO initial password via its REST API (best-effort) ----------
      # AIO exposes a setup endpoint; we seed the master password so the
      # credentials file reflects what was set.  Non-fatal if AIO not yet ready.
      AIO_SET_URL="http://127.0.0.1:8080/api/auth/passphrase"
      curl -sf -X POST "${AIO_SET_URL}" \
        -H "Content-Type: application/json" \
        -d "{\"passphrase\": \"${ADMIN_PASS}\"}" \
        && echo "AIO master password set via API." \
        || echo "WARN: Could not set AIO password via API — set it manually on first login."

      # --- Write credentials summary (chmod 600) ----------------------------
      cat > /root/nextcloud-credentials.txt <<CREDS
      ===== Nextcloud bootstrap complete: $(date) =====

      Nextcloud URL      : ${PROTO}://${APP_DOMAIN}/
      AIO management UI  : https://127.0.0.1:8443  (SSH tunnel: ssh -L 8443:127.0.0.1:8443 root@SERVER_IP)
      AIO master password: ${ADMIN_PASS}

      After opening the AIO management UI:
        1. Log in with the master password above.
        2. Enter your domain: ${APP_DOMAIN}
        3. Click "Start containers" — AIO will pull Nextcloud, MariaDB, Redis,
           ClamAV, Collabora, Imaginary, Talk, etc.
        4. Once "Status: running", open ${PROTO}://${APP_DOMAIN}/ and complete
           the Nextcloud first-run wizard (create your admin account there).

      Data directory : ${NC_DATA_DIR}
      Compose dir    : /opt/nextcloud/
      Log            : /var/log/nextcloud-bootstrap.log

      Useful commands:
        docker ps
        docker compose -f /opt/nextcloud/docker-compose.yml ps
        docker compose -f /opt/nextcloud/docker-compose.yml logs -f
        docker compose -f /opt/nextcloud/docker-compose.yml pull && \
          docker compose -f /opt/nextcloud/docker-compose.yml up -d   # upgrade AIO
      CREDS
      chmod 600 /root/nextcloud-credentials.txt

      echo "=== Nextcloud bootstrap finished: $(date) ==="
      echo "=== Credentials in /root/nextcloud-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once all write_files have been placed
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/nextcloud-bootstrap.sh" ]

final_message: "Nextcloud bootstrap done after $UPTIME s. See /root/nextcloud-credentials.txt and /var/log/nextcloud-bootstrap.log"
