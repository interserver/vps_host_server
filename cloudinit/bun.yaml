#cloud-config
# =============================================================================
# Bun "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Bun (runtime + bundler) + Nginx reverse proxy
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.bun-bootstrap.env block
# (domain, email, TLS) before launching, OR leave the defaults and the
# bootstrap will generate random secrets where needed.
# =============================================================================

hostname: bun
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep provisioner-injected SSH key + hostname working
# ----------------------------------------------------------------------------
users:
  - default
  - name: deploy
    groups: [sudo, www-data]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

# ----------------------------------------------------------------------------
# Packages — Bun itself is installed via its official installer in the script
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw
  - fail2ban
  - unattended-upgrades
  - curl
  - unzip
  - git
  - htop
  - ca-certificates
  - gnupg
  - lsb-release

# ----------------------------------------------------------------------------
# Swap (helps small instances survive memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config files + secrets dropped to disk for the bootstrap script
# ----------------------------------------------------------------------------
write_files:
  # --- operator-editable variables ------------------------------------------
  - path: /root/.bun-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ----- EDIT THESE before first boot -----
      APP_DOMAIN="example.com"         # primary domain served by Nginx (no scheme)
      LE_EMAIL="admin@example.com"     # Let's Encrypt registration email
      ENABLE_TLS="true"                # set false to skip certbot (e.g. no DNS yet)

      # Application settings
      APP_PORT="3000"                  # internal port Bun listens on
      APP_DIR="/var/www/bun-app"       # where the Bun application lives
      BUN_VERSION="latest"             # passed to the official install script

      # Secret — left as CHANGE_ME means a random value is generated at boot
      APP_SECRET="CHANGE_ME"

  # --- Nginx reverse-proxy vhost --------------------------------------------
  - path: /etc/nginx/sites-available/bun.conf
    permissions: '0644'
    owner: root:root
    content: |
      server {
          listen 80;
          listen [::]:80;
          server_name APP_DOMAIN_PLACEHOLDER;

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          # Pass all requests to Bun
          location / {
              proxy_pass         http://127.0.0.1:APP_PORT_PLACEHOLDER;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection 'upgrade';
              proxy_set_header   Host $host;
              proxy_set_header   X-Real-IP $remote_addr;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
              proxy_cache_bypass $http_upgrade;
          }

          location = /favicon.ico { log_not_found off; access_log off; }
          location = /robots.txt  { log_not_found off; access_log off; allow all; }
          location ~ /\.(?!well-known).* { deny all; }
      }

  # --- systemd unit for the Bun app -----------------------------------------
  - path: /etc/systemd/system/bun-app.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Bun application server
      After=network.target
      Wants=network.target

      [Service]
      Type=simple
      User=www-data
      Group=www-data
      WorkingDirectory=/var/www/bun-app
      Environment="HOME=/var/www/bun-app"
      EnvironmentFile=/etc/bun-app.env
      ExecStart=/usr/local/bin/bun run /var/www/bun-app/index.ts
      Restart=on-failure
      RestartSec=5
      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=bun-app

      [Install]
      WantedBy=multi-user.target

  # --- fail2ban jails -------------------------------------------------------
  - path: /etc/fail2ban/jail.d/bun.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled = true
      maxretry = 4
      bantime = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended security upgrades ----------------------------------------
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    owner: root:root
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # --- main bootstrap script ------------------------------------------------
  - path: /root/bun-bootstrap.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/bun-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.bun-bootstrap.env

      echo "=== Bun bootstrap started: $(date) ==="

      # --- random secret generator (SIGPIPE-safe under set -e + pipefail) ---
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      [ "$APP_SECRET" = "CHANGE_ME" ] && APP_SECRET="$(rand)"

      # --- install Bun via the official install script ----------------------
      if ! command -v bun >/dev/null 2>&1; then
        export HOME=/root
        curl -fsSL https://bun.sh/install | bash
        # move to system-wide location so www-data + systemd can find it
        install -m 0755 /root/.bun/bin/bun /usr/local/bin/bun
      else
        echo "bun already installed: $(bun --version)"
      fi

      echo "Bun version: $(bun --version)"

      # --- create app user home + app directory ----------------------------
      mkdir -p /var/www/bun-app
      chown www-data:www-data /var/www/bun-app

      # --- write the 'it works' Bun app ------------------------------------
      cat > /var/www/bun-app/index.ts <<'BUNAPP'
      const PORT = parseInt(process.env.APP_PORT ?? "3000", 10);
      const SECRET = process.env.APP_SECRET ?? "not-set";

      const server = Bun.serve({
        port: PORT,
        fetch(req) {
          const url = new URL(req.url);
          if (url.pathname === "/health") {
            return new Response(JSON.stringify({ status: "ok", runtime: "bun", version: Bun.version }), {
              headers: { "Content-Type": "application/json" },
            });
          }
          const html = `<!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bun is running</title>
        <style>
          body { font-family: system-ui, sans-serif; display: flex; align-items: center;
                 justify-content: center; min-height: 100vh; margin: 0; background: #0f0f0f; color: #fff; }
          .card { text-align: center; padding: 2rem 3rem; border: 1px solid #333; border-radius: 12px; }
          h1 { font-size: 2.5rem; margin: 0 0 .5rem; }
          p  { color: #aaa; margin: .25rem 0; }
          .badge { display: inline-block; background: #f97316; color: #fff;
                   border-radius: 6px; padding: .2rem .7rem; font-size: .85rem; margin-top: 1rem; }
        </style>
      </head>
      <body>
        <div class="card">
          <h1>It works!</h1>
          <p>Bun v${Bun.version} is running on InterServer.</p>
          <p>Edit <code>/var/www/bun-app/index.ts</code> to get started.</p>
          <span class="badge">Bun ${Bun.version}</span>
        </div>
      </body>
      </html>`;
          return new Response(html, { headers: { "Content-Type": "text/html; charset=utf-8" } });
        },
      });

      console.log(`Bun server listening on http://0.0.0.0:${PORT}`);
      BUNAPP

      chown www-data:www-data /var/www/bun-app/index.ts

      # --- write runtime env for systemd -----------------------------------
      cat > /etc/bun-app.env <<ENVFILE
      APP_PORT=${APP_PORT}
      APP_SECRET=${APP_SECRET}
      NODE_ENV=production
      ENVFILE
      chmod 600 /etc/bun-app.env

      # --- configure Nginx --------------------------------------------------
      sed -i "s|APP_DOMAIN_PLACEHOLDER|${APP_DOMAIN}|" /etc/nginx/sites-available/bun.conf
      sed -i "s|APP_PORT_PLACEHOLDER|${APP_PORT}|"     /etc/nginx/sites-available/bun.conf
      ln -sf /etc/nginx/sites-available/bun.conf /etc/nginx/sites-enabled/bun.conf
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # --- enable + start the Bun systemd service ---------------------------
      systemctl daemon-reload
      systemctl enable --now bun-app

      # --- firewall ---------------------------------------------------------
      ufw allow OpenSSH
      ufw allow 'Nginx Full'
      ufw --force enable

      # --- fail2ban ---------------------------------------------------------
      systemctl enable --now fail2ban

      # --- TLS via Let's Encrypt -------------------------------------------
      if [ "$ENABLE_TLS" = "true" ]; then
        certbot --nginx --non-interactive --agree-tos \
          -m "$LE_EMAIL" -d "$APP_DOMAIN" --redirect || \
          echo "WARN: certbot deferred (DNS not pointed yet?). Re-run: certbot --nginx -d ${APP_DOMAIN}"
      fi

      # --- write credentials summary ---------------------------------------
      PROTO="http"
      [ "$ENABLE_TLS" = "true" ] && PROTO="https"
      cat > /root/bun-credentials.txt <<EOF
      ===== Bun install complete: $(date) =====
      URL:          ${PROTO}://${APP_DOMAIN}
      Health check: ${PROTO}://${APP_DOMAIN}/health
      App secret:   ${APP_SECRET}
      App dir:      ${APP_DIR}
      Log:          journalctl -u bun-app -f
      Bootstrap:    /var/log/bun-bootstrap.log
      EOF
      chmod 600 /root/bun-credentials.txt

      echo "=== Bun bootstrap finished. Credentials in /root/bun-credentials.txt ==="

# ----------------------------------------------------------------------------
# Run the bootstrap once everything above has been laid down
# ----------------------------------------------------------------------------
bootcmd:
  # Stop the base image's apt-daily / unattended-upgrades TIMERS from firing at
  # first boot so they don't hold the dpkg lock during cloud-init's package
  # stage. Masking timers only — NO process killing (that corrupts dpkg and a
  # -f match would kill this very command). cloud-init already waits for the lock.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl mask apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true; true" ]

runcmd:
  - [ bash, -lc, "/root/bun-bootstrap.sh" ]

final_message: "Bun bootstrap done after $UPTIME s. See /root/bun-credentials.txt and /var/log/bun-bootstrap.log"
