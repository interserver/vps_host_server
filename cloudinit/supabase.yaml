#cloud-config
# =============================================================================
# Supabase "one-click app" — Ubuntu 26.04 LTS cloud-init user-data
# Stack: Supabase self-hosted (Docker Compose) + nginx reverse proxy
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# EDIT the variables in the `write_files` -> /root/.supabase-bootstrap.env
# block before launching. Secrets are randomly generated on first boot when
# left as CHANGE_ME.
# =============================================================================

hostname: supabase
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — preserve cloud-provisioner injection of customer SSH key/hostname
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - nginx
  - certbot
  - python3-certbot-nginx
  - git
  - htop
  - jq
  - wget
  - openssl
  - uuid-runtime
  - python3
  - python3-pip

# ----------------------------------------------------------------------------
# Swap (helps small instances survive build-time memory spikes)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Config + secrets dropped to disk before the bootstrap script runs
# ----------------------------------------------------------------------------
write_files:

  # --- operator-editable environment variables --------------------------------
  - path: /root/.supabase-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # ========= EDIT THESE BEFORE FIRST BOOT =========
      APP_DOMAIN="example.com"          # public hostname (no https://)
      LE_EMAIL="admin@example.com"      # Let's Encrypt registration email
      ENABLE_TLS="true"                 # set false to skip certbot when DNS is not pointed
      ADMIN_PASS="CHANGE_ME"            # Supabase dashboard password (Studio)
      # ========= OPTIONAL OVERRIDES (auto-generated if CHANGE_ME) ==========
      POSTGRES_PASSWORD="CHANGE_ME"     # PostgreSQL superuser password
      JWT_SECRET="CHANGE_ME"            # JWT signing secret (>=32 chars)
      ANON_KEY="CHANGE_ME"              # Supabase anon key (JWT)
      SERVICE_ROLE_KEY="CHANGE_ME"      # Supabase service_role key (JWT)
      DASHBOARD_USERNAME="supabase"     # Studio login username
      SUPABASE_DIR="/opt/supabase"      # install directory

  # --- fail2ban jail config ---------------------------------------------------
  - path: /etc/fail2ban/jail.d/supabase.local
    permissions: '0644'
    owner: root:root
    content: |
      [sshd]
      enabled  = true
      maxretry = 4
      bantime  = 1h

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true

  # --- unattended-upgrades security-only config --------------------------------
  - path: /etc/apt/apt.conf.d/51unattended-upgrades-supabase
    permissions: '0644'
    owner: root:root
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";

  # --- nginx stub (replaced by bootstrap once domain is known) ----------------
  - path: /etc/nginx/sites-available/supabase
    permissions: '0644'
    owner: root:root
    content: |
      # Placeholder — overwritten by supabase-bootstrap.sh
      server {
          listen 80 default_server;
          server_name _;
          return 444;
      }

  # --- main bootstrap script --------------------------------------------------
  - path: /root/supabase-bootstrap.sh
    permissions: '0700'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/supabase-bootstrap.log) 2>&1
      source /root/.supabase-bootstrap.env

      # -----------------------------------------------------------------------
      # SIGPIPE-safe random secret generator
      # -----------------------------------------------------------------------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }
      rand32() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 32 || true; }
      rand64() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 64 || true; }

      echo "=== [1/10] Filling in any CHANGE_ME secrets ==="
      [ "$POSTGRES_PASSWORD" = "CHANGE_ME" ] && POSTGRES_PASSWORD="$(rand32)"
      [ "$JWT_SECRET"        = "CHANGE_ME" ] && JWT_SECRET="$(rand64)"
      [ "$ADMIN_PASS"        = "CHANGE_ME" ] && ADMIN_PASS="$(rand)"

      # Supabase anon / service_role keys are JWTs signed with JWT_SECRET.
      # We generate minimal HS256 JWTs using pure bash + openssl.
      jwt_sign() {
          local payload="$1"
          local secret="$2"
          local header
          header=$(printf '{"alg":"HS256","typ":"JWT"}' | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          local body
          body=$(printf '%s' "$payload" | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          local sig
          sig=$(printf '%s.%s' "$header" "$body" \
              | openssl dgst -sha256 -hmac "$secret" -binary \
              | openssl base64 -e -A | tr '+/' '-_' | tr -d '=')
          printf '%s.%s.%s' "$header" "$body" "$sig"
      }

      NOW=$(date +%s)
      EXP=$((NOW + 315360000))   # ~10 years

      if [ "$ANON_KEY" = "CHANGE_ME" ]; then
          ANON_PAYLOAD='{"role":"anon","iss":"supabase","iat":'"$NOW"',"exp":'"$EXP"'}'
          ANON_KEY=$(jwt_sign "$ANON_PAYLOAD" "$JWT_SECRET")
      fi

      if [ "$SERVICE_ROLE_KEY" = "CHANGE_ME" ]; then
          SVC_PAYLOAD='{"role":"service_role","iss":"supabase","iat":'"$NOW"',"exp":'"$EXP"'}'
          SERVICE_ROLE_KEY=$(jwt_sign "$SVC_PAYLOAD" "$JWT_SECRET")
      fi

      # Persist resolved values back to env file
      cat > /root/.supabase-bootstrap.env <<ENVEOF
      APP_DOMAIN="${APP_DOMAIN}"
      LE_EMAIL="${LE_EMAIL}"
      ENABLE_TLS="${ENABLE_TLS}"
      ADMIN_PASS="${ADMIN_PASS}"
      POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
      JWT_SECRET="${JWT_SECRET}"
      ANON_KEY="${ANON_KEY}"
      SERVICE_ROLE_KEY="${SERVICE_ROLE_KEY}"
      DASHBOARD_USERNAME="${DASHBOARD_USERNAME}"
      SUPABASE_DIR="${SUPABASE_DIR}"
      ENVEOF
      chmod 600 /root/.supabase-bootstrap.env

      echo "=== [2/10] Installing Docker CE ==="
      if ! command -v docker &>/dev/null; then
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
              | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          # Use noble repo as fallback until 26.04 (oracular/plucky) line is published
          # fallback: noble repo until 26.04 published
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
            https://download.docker.com/linux/ubuntu noble stable" \
            > /etc/apt/sources.list.d/docker.list
          apt-get update -qq
          apt-get install -y docker-ce docker-ce-cli containerd.io \
              docker-buildx-plugin docker-compose-plugin
      fi
      systemctl enable --now docker

      echo "=== [3/10] Cloning Supabase self-hosted stack ==="
      mkdir -p "${SUPABASE_DIR}"
      if [ ! -d "${SUPABASE_DIR}/.git" ]; then
          git clone --depth 1 https://github.com/supabase/supabase.git "${SUPABASE_DIR}"
      fi
      cd "${SUPABASE_DIR}/docker"

      echo "=== [4/10] Writing Supabase .env ==="
      cp -n .env.example .env || true
      # Patch all key fields in .env
      sed_env() { sed -i "s|^${1}=.*|${1}=${2}|" .env; }
      sed_env POSTGRES_PASSWORD         "${POSTGRES_PASSWORD}"
      sed_env JWT_SECRET                "${JWT_SECRET}"
      sed_env ANON_KEY                  "${ANON_KEY}"
      sed_env SERVICE_ROLE_KEY          "${SERVICE_ROLE_KEY}"
      sed_env DASHBOARD_USERNAME        "${DASHBOARD_USERNAME}"
      sed_env DASHBOARD_PASSWORD        "${ADMIN_PASS}"
      sed_env API_EXTERNAL_URL          "http://${APP_DOMAIN}"
      sed_env SUPABASE_PUBLIC_URL       "http://${APP_DOMAIN}"
      sed_env SITE_URL                  "http://${APP_DOMAIN}"
      # Bind PostgREST and Kong to localhost; nginx fronts externally
      grep -q '^KONG_HTTP_PORT=' .env  && sed_env KONG_HTTP_PORT  8000 || echo 'KONG_HTTP_PORT=8000'  >> .env
      grep -q '^KONG_HTTPS_PORT=' .env && sed_env KONG_HTTPS_PORT 8443 || echo 'KONG_HTTPS_PORT=8443' >> .env

      echo "=== [5/10] Starting Supabase via Docker Compose ==="
      docker compose pull --quiet
      docker compose up -d

      echo "=== [6/10] Configuring UFW firewall ==="
      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp    comment 'SSH'
      ufw allow 80/tcp    comment 'HTTP'
      ufw allow 443/tcp   comment 'HTTPS'
      ufw --force enable

      echo "=== [7/10] Configuring nginx reverse proxy ==="
      cat > /etc/nginx/sites-available/supabase <<NGXEOF
      server {
          listen 80;
          server_name ${APP_DOMAIN};

          client_max_body_size 100M;

          # Supabase Studio (dashboard)
          location / {
              proxy_pass         http://127.0.0.1:3000;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade \$http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
              proxy_read_timeout 600s;
          }

          # Supabase API / Kong gateway
          location /rest/v1/ {
              proxy_pass         http://127.0.0.1:8000/rest/v1/;
              proxy_http_version 1.1;
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
          }

          location /auth/v1/ {
              proxy_pass         http://127.0.0.1:8000/auth/v1/;
              proxy_http_version 1.1;
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
          }

          location /storage/v1/ {
              proxy_pass         http://127.0.0.1:8000/storage/v1/;
              proxy_http_version 1.1;
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
          }

          location /realtime/v1/ {
              proxy_pass         http://127.0.0.1:8000/realtime/v1/;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade \$http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
          }
      }
      NGXEOF

      ln -sf /etc/nginx/sites-available/supabase /etc/nginx/sites-enabled/supabase
      rm -f /etc/nginx/sites-enabled/default
      nginx -t
      systemctl enable --now nginx
      systemctl reload nginx

      echo "=== [8/10] Optional TLS via Certbot ==="
      if [ "${ENABLE_TLS}" = "true" ] && [ "${APP_DOMAIN}" != "example.com" ]; then
          certbot --nginx --non-interactive --agree-tos \
              --email "${LE_EMAIL}" \
              --domains "${APP_DOMAIN}" \
              --redirect \
              || echo "WARN: certbot deferred — DNS may not be pointed yet"
          # Update Supabase .env to use HTTPS URLs after TLS succeeds
          if [ -f "${SUPABASE_DIR}/docker/.env" ]; then
              sed -i "s|^API_EXTERNAL_URL=http://|API_EXTERNAL_URL=https://|" \
                  "${SUPABASE_DIR}/docker/.env"
              sed -i "s|^SUPABASE_PUBLIC_URL=http://|SUPABASE_PUBLIC_URL=https://|" \
                  "${SUPABASE_DIR}/docker/.env"
              sed -i "s|^SITE_URL=http://|SITE_URL=https://|" \
                  "${SUPABASE_DIR}/docker/.env"
              cd "${SUPABASE_DIR}/docker" && docker compose up -d --no-deps || true
          fi
      else
          echo "INFO: TLS skipped (ENABLE_TLS=${ENABLE_TLS} APP_DOMAIN=${APP_DOMAIN})"
      fi

      echo "=== [9/10] Enabling fail2ban + unattended-upgrades ==="
      systemctl enable --now fail2ban
      systemctl enable --now unattended-upgrades || true
      dpkg-reconfigure -f noninteractive unattended-upgrades || true

      echo "=== [10/10] Writing credentials file ==="
      PROTO="http"
      [ "${ENABLE_TLS}" = "true" ] && PROTO="https"
      cat > /root/supabase-credentials.txt <<CREDEOF
      # ============================================================
      # Supabase – generated credentials
      # Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
      # ============================================================

      Dashboard URL:       ${PROTO}://${APP_DOMAIN}
      Studio username:     ${DASHBOARD_USERNAME}
      Studio password:     ${ADMIN_PASS}

      Supabase API URL:    ${PROTO}://${APP_DOMAIN}
      Anon (public) key:   ${ANON_KEY}
      Service role key:    ${SERVICE_ROLE_KEY}

      PostgreSQL host:     127.0.0.1
      PostgreSQL port:     5432
      PostgreSQL user:     postgres
      PostgreSQL password: ${POSTGRES_PASSWORD}

      JWT Secret:          ${JWT_SECRET}

      Install directory:   ${SUPABASE_DIR}
      Docker Compose dir:  ${SUPABASE_DIR}/docker
      Log:                 /var/log/supabase-bootstrap.log

      # Manage stack:
      #   cd ${SUPABASE_DIR}/docker && docker compose ps
      #   cd ${SUPABASE_DIR}/docker && docker compose logs -f
      #   cd ${SUPABASE_DIR}/docker && docker compose down
      #   cd ${SUPABASE_DIR}/docker && docker compose up -d
      CREDEOF
      chmod 600 /root/supabase-credentials.txt

      echo ""
      echo "============================================================"
      echo " Supabase bootstrap complete."
      echo " Dashboard: ${PROTO}://${APP_DOMAIN}"
      echo " Credentials: /root/supabase-credentials.txt"
      echo "============================================================"

# ----------------------------------------------------------------------------
# Run the bootstrap exactly once
# ----------------------------------------------------------------------------
runcmd:
  - [ bash, -lc, "/root/supabase-bootstrap.sh" ]

# ----------------------------------------------------------------------------
# Final message shown in the cloud-init output
# ----------------------------------------------------------------------------
final_message: |
  ============================================================
  Supabase one-click app provisioning complete.
  Bootstrap log : /var/log/supabase-bootstrap.log
  Credentials   : /root/supabase-credentials.txt (chmod 600)
  Dashboard     : http://<APP_DOMAIN>  (https:// if TLS enabled)
  ============================================================
  Boot took $UPTIME seconds.
