#cloud-config
# =============================================================================
# HEAVY.AI Immerse — Ubuntu 24.04 LTS (noble) cloud-init user-data
# Stack: NVIDIA driver + CUDA toolkit + HEAVY.AI (HeavyDB + Immerse)
#        UFW firewall + fail2ban + swap + unattended-upgrades
# -----------------------------------------------------------------------------
# REQUIRES:
#   - A KVM VPS plan with a dedicated NVIDIA GPU (Pascal / Volta / Turing /
#     Ampere or newer, Kepler no longer supported as of HEAVY.AI 6.x)
#   - Minimum 16 GB VRAM recommended (32 GB+ for large datasets)
#   - Minimum 100 GB disk (HeavyDB data + CUDA libraries + Immerse assets)
#   - Minimum 32 GB RAM (64 GB recommended for production workloads)
#
# EDIT the variables in write_files -> /root/.heavyai-bootstrap.env before
# launching, or supply them via your provisioner.
#
# IMPORTANT: Do NOT depend on Vultr metadata, APIs, or object storage.
#            This is an in-house InterServer one-click app image.
# =============================================================================

hostname: heavyai-immerse
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep 'default' so the provisioner can inject the customer SSH key
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Swap — 2 GB to survive build-time memory spikes (CUDA + package installs)
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Base packages — NVIDIA driver and CUDA installed in bootstrap via keyring
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true

packages:
  # Core utilities
  - curl
  - wget
  - git
  - unzip
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common
  - apt-transport-https
  # Security
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges
  # Build / runtime helpers
  - build-essential
  - pkg-config
  - libssl-dev
  - libffi-dev
  - libnuma1
  - libnuma-dev
  - libgomp1
  # Python (used for health-check scripts and optional pyomniscidb client)
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  # GPU / CUDA detection helpers
  - pciutils
  - nvtop
  - htop
  - tmux
  # Nginx reverse proxy + Certbot TLS
  - nginx
  - certbot
  - python3-certbot-nginx
  # Misc
  - jq
  - rsync

# ----------------------------------------------------------------------------
# Files written before runcmd executes
# ----------------------------------------------------------------------------
write_files:

  # --------------------------------------------------------------------------
  # (a) Operator-editable environment variables
  # --------------------------------------------------------------------------
  - path: /root/.heavyai-bootstrap.env
    permissions: '0600'
    owner: root:root
    content: |
      # -----------------------------------------------------------------------
      # HEAVY.AI Immerse bootstrap configuration — edit before first boot
      # -----------------------------------------------------------------------

      # Domain name pointing to this server (used for Certbot TLS + nginx vhost).
      # Leave as CHANGE_ME to skip TLS and access via plain IP.
      APP_DOMAIN=CHANGE_ME

      # Email address for Let's Encrypt certificate notifications.
      LE_EMAIL=CHANGE_ME

      # Set to "true" to request a TLS cert via Certbot.
      # Requires APP_DOMAIN to resolve to this server before the script runs.
      ENABLE_TLS=false

      # HEAVY.AI version to install (see https://releases.heavy.ai/ for tags).
      # Format: <major>.<minor>.<patch>  e.g. 7.3.0
      HEAVYAI_VERSION=7.3.0

      # Edition: "free" (HeavyDB + Immerse, up to 1 GPU, no cost) or
      #          "enterprise" (requires a purchased license key).
      HEAVYAI_EDITION=free

      # Installation directory for HEAVY.AI runtime.
      HEAVYAI_DIR=/opt/heavyai

      # Data directory (database files, logs, exports).
      # Point to a large attached volume if available.
      HEAVYAI_STORAGE=/var/lib/heavyai/storage

      # HeavyDB backend listen port (internal — Immerse proxies to this).
      HEAVYDB_PORT=6274

      # HeavyDB HTTP port (internal, used by Immerse).
      HEAVYDB_HTTP_PORT=6278

      # Immerse web interface listen port (nginx proxies to this).
      IMMERSE_PORT=6273

      # Linux user that runs HeavyDB and Immerse (created if absent).
      HEAVYAI_USER=heavyai

      # Admin username for the Immerse / HeavyDB account.
      HEAVYAI_ADMIN_USER=admin

      # Admin password — auto-generated on first boot if left as CHANGE_ME.
      HEAVYAI_ADMIN_PASS=CHANGE_ME

      # CUDA version hint for toolkit package selection.
      # "12-8" selects cuda-toolkit-12-8. Adjust if your GPU driver requires
      # a different CUDA runtime (driver 570+ supports CUDA 12.8).
      CUDA_VERSION=12-8

      # Number of GPUs to expose to HeavyDB (default 1).
      NUM_GPUS=1

  # --------------------------------------------------------------------------
  # (b) Bootstrap shell script
  # --------------------------------------------------------------------------
  - path: /root/heavyai-bootstrap.sh
    permissions: '0700'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/heavyai-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.heavyai-bootstrap.env

      # ------------------------------------------------------------------
      # SIGPIPE-safe random secret generator (|| true required under pipefail)
      # ------------------------------------------------------------------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      log() { echo "[heavyai-bootstrap] $(date -u '+%Y-%m-%dT%H:%M:%SZ') $*"; }

      log "=== HEAVY.AI Immerse bootstrap started ==="

      # ------------------------------------------------------------------
      # Auto-generate secrets when still set to CHANGE_ME
      # ------------------------------------------------------------------
      if [ "${HEAVYAI_ADMIN_PASS}" = "CHANGE_ME" ]; then
        HEAVYAI_ADMIN_PASS="$(rand)"
        sed -i "s/^HEAVYAI_ADMIN_PASS=CHANGE_ME/HEAVYAI_ADMIN_PASS=${HEAVYAI_ADMIN_PASS}/" \
          /root/.heavyai-bootstrap.env
        log "Auto-generated HEAVYAI_ADMIN_PASS"
      fi

      # ------------------------------------------------------------------
      # System user for HEAVY.AI services
      # ------------------------------------------------------------------
      id "${HEAVYAI_USER}" &>/dev/null || \
        useradd --system --shell /bin/bash \
          --create-home --home-dir "${HEAVYAI_DIR}" "${HEAVYAI_USER}"

      # ------------------------------------------------------------------
      # NVIDIA driver + CUDA toolkit via official CUDA keyring
      # Uses ubuntu2404 (noble) repo — fallback: noble repo until 26.04 published
      # ------------------------------------------------------------------
      log "Installing NVIDIA driver and CUDA toolkit..."

      CUDA_KEYRING_DEB="cuda-keyring_1.1-1_all.deb"
      CUDA_KEYRING_URL="https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/${CUDA_KEYRING_DEB}"

      if ! dpkg -l cuda-keyring &>/dev/null; then
        wget -q -O "/tmp/${CUDA_KEYRING_DEB}" "${CUDA_KEYRING_URL}"
        dpkg -i "/tmp/${CUDA_KEYRING_DEB}"
        rm -f "/tmp/${CUDA_KEYRING_DEB}"
        apt-get update -qq
      fi

      # nvidia-open: preferred open-kernel-module driver for Ampere+ GPUs
      command -v nvidia-smi &>/dev/null || \
        DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          nvidia-open \
          "cuda-toolkit-${CUDA_VERSION}"

      # Persist CUDA paths for all future logins
      if [ ! -f /etc/profile.d/cuda.sh ]; then
        cat > /etc/profile.d/cuda.sh <<'CUDAENV'
      export PATH="/usr/local/cuda/bin:${PATH}"
      export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"
      CUDAENV
        chmod 644 /etc/profile.d/cuda.sh
      fi
      export PATH="/usr/local/cuda/bin:${PATH}"
      export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"

      # ------------------------------------------------------------------
      # Install HEAVY.AI via the OFFICIAL Docker image
      # ------------------------------------------------------------------
      # The old apt repo (releases.heavy.ai/.../apt) is retired — its S3
      # bucket now returns HTTP 403 AccessDenied for the GPG key and all
      # package paths, which is why the previous apt install 403'd. The
      # current supported install for Free + Enterprise GPU is the Docker
      # image, per https://docs.nvidia.com/heavyai (formerly docs.heavy.ai):
      #     heavyai/heavyai-ee-cuda:latest   (run with --gpus=all)
      # The "free" edition uses the SAME image plus a free license key you
      # request from heavy.ai; it then unlocks the free tier inside Immerse.
      # ------------------------------------------------------------------
      log "Installing Docker CE + NVIDIA Container Toolkit for HEAVY.AI..."

      # --- Docker CE from the official Docker apt repo ---
      if ! command -v docker >/dev/null 2>&1; then
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        UBU_CODENAME="$(. /etc/os-release && echo "${UBUNTU_CODENAME:-${VERSION_CODENAME}}")"
        cat > /etc/apt/sources.list.d/docker.list <<DOCKERREPO
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${UBU_CODENAME} stable
      DOCKERREPO
        apt-get update -qq
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          docker-ce docker-ce-cli containerd.io \
          docker-buildx-plugin docker-compose-plugin
      fi
      systemctl enable --now docker

      # --- NVIDIA Container Toolkit (lets containers see the GPU) ---
      if ! command -v nvidia-ctk >/dev/null 2>&1; then
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
          | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
          | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
          > /etc/apt/sources.list.d/nvidia-container-toolkit.list
        apt-get update -qq
        DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-container-toolkit || \
          log "WARN: nvidia-container-toolkit install failed — GPU passthrough to Docker may not work until installed"
        nvidia-ctk runtime configure --runtime=docker 2>/dev/null || true
        systemctl restart docker || true
      fi

      # ------------------------------------------------------------------
      # Pull + run the HEAVY.AI image
      # ------------------------------------------------------------------
      log "Pulling HEAVY.AI image (${HEAVYAI_EDITION} edition, version ${HEAVYAI_VERSION})..."

      # Both free and enterprise GPU tiers use the heavyai-ee-cuda image.
      HEAVYAI_IMAGE_REPO="heavyai/heavyai-ee-cuda"
      if [ -n "${HEAVYAI_VERSION:-}" ] && [ "${HEAVYAI_VERSION}" != "latest" ]; then
        HEAVYAI_IMAGE="${HEAVYAI_IMAGE_REPO}:v${HEAVYAI_VERSION}"
      else
        HEAVYAI_IMAGE="${HEAVYAI_IMAGE_REPO}:latest"
      fi

      # Pin the requested version; fall back to :latest if that tag is absent;
      # then, if the gated heavyai/* image is unavailable (it can require
      # accepting the EULA / a Docker Hub login), fall back to the fully public
      # legacy OmniSci OSS image, which uses the identical 6273-6278 port layout.
      if ! docker pull "${HEAVYAI_IMAGE}" 2>/dev/null; then
        log "WARN: tag ${HEAVYAI_IMAGE} not pullable — trying ${HEAVYAI_IMAGE_REPO}:latest"
        HEAVYAI_IMAGE="${HEAVYAI_IMAGE_REPO}:latest"
        if ! docker pull "${HEAVYAI_IMAGE}" 2>/dev/null; then
          log "WARN: ${HEAVYAI_IMAGE} unavailable (gated image may need 'docker login'); falling back to public omnisci/core-os-cuda:latest"
          HEAVYAI_IMAGE="omnisci/core-os-cuda:latest"
          docker pull "${HEAVYAI_IMAGE}" || \
            log "ERROR: could not pull any HEAVY.AI/OmniSci image — check Docker Hub access, then: docker pull heavyai/heavyai-ee-cuda:latest"
        fi
      fi

      # Persistent data dir on the host (bind-mounted into the container).
      mkdir -p "${HEAVYAI_STORAGE}"
      # HEAVY.AI container expects its storage at /var/lib/heavyai.
      docker rm -f heavyai 2>/dev/null || true
      docker run -d \
        --name heavyai \
        --restart unless-stopped \
        --gpus all \
        -v "${HEAVYAI_STORAGE}:/var/lib/heavyai" \
        -p 127.0.0.1:${IMMERSE_PORT}:6273 \
        -p 127.0.0.1:${HEAVYDB_PORT}:6274 \
        -p 127.0.0.1:${HEAVYDB_HTTP_PORT}:6278 \
        "${HEAVYAI_IMAGE}" \
        || log "WARN: 'docker run' failed — a reboot to load the NVIDIA kernel module may be required, then: docker start heavyai"

      # ------------------------------------------------------------------
      # Wait for the HEAVY.AI container to come up, then set the admin
      # password via the in-container heavysql client.
      # ------------------------------------------------------------------
      log "Waiting for HeavyDB (inside container) to accept connections..."
      for i in $(seq 1 30); do
        if docker exec heavyai bin/heavysql -p HyperInteractive \
            --db heavyai -q "\\q" >/dev/null 2>&1; then
          break
        fi
        sleep 2
      done

      docker exec heavyai bin/heavysql -p HyperInteractive \
        --db heavyai \
        -q "ALTER USER ${HEAVYAI_ADMIN_USER} (password='${HEAVYAI_ADMIN_PASS}');" >/dev/null 2>&1 \
        || log "WARN: Could not set admin password via heavysql — the default 'admin/HyperInteractive' may still apply; change it in Immerse after the container is healthy"

      # ------------------------------------------------------------------
      # Nginx reverse proxy
      # ------------------------------------------------------------------
      log "Configuring nginx reverse proxy..."

      cat > /etc/nginx/sites-available/heavyai <<NGXCONF
      server {
          listen 80;
          listen [::]:80;
          server_name ${APP_DOMAIN:-_};

          client_max_body_size 256M;

          # Immerse web UI
          location / {
              proxy_pass         http://127.0.0.1:${IMMERSE_PORT};
              proxy_http_version 1.1;
              proxy_set_header   Upgrade \$http_upgrade;
              proxy_set_header   Connection "upgrade";
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto \$scheme;
              proxy_read_timeout 600s;
              proxy_send_timeout 600s;
          }

          # HeavyDB HTTP Thrift endpoint (used by Immerse internally)
          location /heavydb/ {
              proxy_pass         http://127.0.0.1:${HEAVYDB_HTTP_PORT}/;
              proxy_set_header   Host \$host;
              proxy_set_header   X-Real-IP \$remote_addr;
              proxy_set_header   X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_read_timeout 600s;
          }
      }
      NGXCONF

      ln -sf /etc/nginx/sites-available/heavyai /etc/nginx/sites-enabled/heavyai
      rm -f /etc/nginx/sites-enabled/default
      nginx -t && systemctl enable --now nginx && systemctl reload nginx

      # ------------------------------------------------------------------
      # TLS via Certbot — deferred gracefully if DNS not yet pointed
      # ------------------------------------------------------------------
      if [ "${ENABLE_TLS}" = "true" ] && \
         [ -n "${APP_DOMAIN:-}" ] && \
         [ "${APP_DOMAIN}" != "CHANGE_ME" ]; then
        log "Requesting Let's Encrypt certificate for ${APP_DOMAIN}..."
        certbot --nginx --non-interactive --agree-tos \
          --email "${LE_EMAIL}" \
          --domains "${APP_DOMAIN}" \
          --redirect \
          || echo "WARN: certbot deferred — ensure DNS points to this server, then run certbot manually"
      else
        log "Skipping Certbot (ENABLE_TLS=${ENABLE_TLS:-false} or APP_DOMAIN not set)"
      fi

      # ------------------------------------------------------------------
      # Firewall (UFW) — SSH + HTTP + HTTPS only; DB ports stay local
      # ------------------------------------------------------------------
      log "Configuring UFW firewall..."

      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp    comment 'SSH'
      ufw allow 80/tcp    comment 'HTTP'
      ufw allow 443/tcp   comment 'HTTPS'
      # HeavyDB Thrift and HTTP ports are internal; restrict to loopback
      ufw allow from 127.0.0.1 to any port "${HEAVYDB_PORT}" proto tcp \
        comment 'HeavyDB Thrift (local only)'
      ufw allow from 127.0.0.1 to any port "${HEAVYDB_HTTP_PORT}" proto tcp \
        comment 'HeavyDB HTTP (local only)'
      ufw allow from 127.0.0.1 to any port "${IMMERSE_PORT}" proto tcp \
        comment 'Immerse (local only — nginx proxies)'
      ufw --force enable

      # ------------------------------------------------------------------
      # fail2ban
      # ------------------------------------------------------------------
      log "Configuring fail2ban..."

      cat > /etc/fail2ban/jail.d/heavyai.conf <<'F2BJAIL'
      [sshd]
      enabled  = true
      port     = ssh
      maxretry = 5
      bantime  = 3600
      findtime = 600

      [nginx-http-auth]
      enabled  = true
      port     = http,https
      maxretry = 5
      bantime  = 3600
      findtime = 600
      F2BJAIL

      systemctl enable --now fail2ban

      # ------------------------------------------------------------------
      # Automatic security updates (unattended-upgrades)
      # ------------------------------------------------------------------
      log "Enabling unattended-upgrades..."

      cat > /etc/apt/apt.conf.d/20auto-upgrades <<'AUTOUPGRADE'
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
      AUTOUPGRADE

      systemctl enable --now unattended-upgrades

      # ------------------------------------------------------------------
      # Write credentials file (chmod 600)
      # ------------------------------------------------------------------
      log "Writing credentials file..."

      PUBLIC_IP="$(curl -sf https://ipv4.icanhazip.com 2>/dev/null || \
                   curl -sf https://api.ipify.org 2>/dev/null || \
                   hostname -I | awk '{print $1}')"

      PROTO="http"
      BASE_HOST="${APP_DOMAIN:-${PUBLIC_IP}}"
      if [ "${ENABLE_TLS}" = "true" ] && \
         [ -n "${APP_DOMAIN:-}" ] && \
         [ "${APP_DOMAIN}" != "CHANGE_ME" ]; then
        PROTO="https"
      fi

      cat > /root/heavyai-credentials.txt <<CREDS
      ============================================================
      HEAVY.AI Immerse — Access Credentials
      Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
      ============================================================

      !! GPU REQUIREMENT !!
      This app REQUIRES a KVM VPS with a dedicated NVIDIA GPU.
      Minimum: Pascal architecture or newer (GTX 1080 / P100+)
      Recommended: 16 GB VRAM, 32 GB RAM, 100 GB disk.
      Without a GPU, HeavyDB will NOT start.
      After first boot a REBOOT may be required to load the
      NVIDIA kernel module. Verify with: nvidia-smi

      -----------------------------------------------------------
      Public IP    : ${PUBLIC_IP}
      App domain   : ${APP_DOMAIN:-Not configured}

      Immerse UI   : ${PROTO}://${BASE_HOST}/
      (direct)     : http://${PUBLIC_IP}:${IMMERSE_PORT}/
      HTTPS        : https://${APP_DOMAIN:-<set APP_DOMAIN and enable TLS>}/

      HeavyDB host : localhost:${HEAVYDB_PORT}   (Thrift/binary)
      HeavyDB HTTP : localhost:${HEAVYDB_HTTP_PORT}  (HTTP/Thrift)

      -----------------------------------------------------------
      Admin username : ${HEAVYAI_ADMIN_USER}
      Admin password : ${HEAVYAI_ADMIN_PASS}
      Default DB     : heavyai

      Edition        : ${HEAVYAI_EDITION}
      Version        : ${HEAVYAI_VERSION}
      GPUs           : ${NUM_GPUS}

      -----------------------------------------------------------
      Deployment: official HEAVY.AI Docker image (heavyai/heavyai-ee-cuda)
      Container management:
        docker ps
        docker logs -f heavyai
        docker restart heavyai
        docker stop heavyai ; docker start heavyai
        docker exec -it heavyai bin/heavysql -p HyperInteractive --db heavyai

      Logs:
        /var/log/heavyai-bootstrap.log
        docker logs heavyai

      Data directory : ${HEAVYAI_STORAGE}  (bind-mounted to /var/lib/heavyai)

      -----------------------------------------------------------
      Next steps:
        1. If the container did not start, reboot to activate the GPU driver:
             reboot
           Then verify:  nvidia-smi  &&  docker start heavyai
        2. Point ${APP_DOMAIN:-<your-domain>} DNS A-record to ${PUBLIC_IP}
        3. Enable TLS: set ENABLE_TLS=true and APP_DOMAIN in
             /root/.heavyai-bootstrap.env
           then run:    certbot --nginx -d <your-domain>
        4. Open the Immerse UI and log in with the admin credentials above.
        5. Free edition: request a free license key from heavy.ai and enter it
           in Immerse (Admin -> License). Enterprise: enter your purchased key.
           Both run from the same heavyai/heavyai-ee-cuda image.
      ============================================================
      CREDS

      chmod 600 /root/heavyai-credentials.txt

      log "=== HEAVY.AI Immerse bootstrap complete ==="
      log "Credentials written to /root/heavyai-credentials.txt"
      log "NOTE: A reboot is recommended to activate the NVIDIA kernel module."
      log "      After reboot verify: nvidia-smi"
      log "      Then start the container: docker start heavyai"

# ----------------------------------------------------------------------------
# Run the bootstrap exactly once at first boot
# ----------------------------------------------------------------------------
bootcmd:
  # Stop the base image's apt-daily / unattended-upgrades TIMERS from firing at
  # first boot so they don't hold the dpkg lock during cloud-init's package
  # stage. Masking timers only — NO process killing (that corrupts dpkg and a
  # -f match would kill this very command). cloud-init already waits for the lock.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl mask apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true; true" ]

runcmd:
  - [ bash, -lc, "/root/heavyai-bootstrap.sh" ]

# ----------------------------------------------------------------------------
# Final message shown in cloud-init output
# ----------------------------------------------------------------------------
final_message: |
  ============================================================
  HEAVY.AI Immerse bootstrap has completed.
  Elapsed time: $UPTIME seconds since boot.

  !! GPU REQUIREMENT !!
  This app requires a dedicated NVIDIA GPU (Pascal+).
  A reboot is strongly recommended to activate the NVIDIA
  kernel module after the driver install.

  After reboot:
    nvidia-smi                                  # confirm GPU detected
    docker start heavyai                         # start container if not running

  Access credentials and URLs:
    cat /root/heavyai-credentials.txt

  Bootstrap log:
    /var/log/heavyai-bootstrap.log
  ============================================================
