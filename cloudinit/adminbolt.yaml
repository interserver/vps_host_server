#cloud-config
# =============================================================================
# AdminBolt Hosting Control Panel — AlmaLinux 9 cloud-init user-data
# Stack: AdminBolt panel (bolt-agent, bolt-php, bolt-nginx, bolt-updater,
#        Apache/httpd) + fail2ban + dnf-automatic + firewalld
# Panel port: 8443 (HTTPS) — access via https://<SERVER-IP>:8443
# Admin access: SSO URL generated by bolt-cli admin-sso-generate (printed to
#               /root/adminbolt-credentials.txt after install)
# -----------------------------------------------------------------------------
# EDIT the operator vars in the write_files -> /root/.adminbolt-bootstrap.env
# block before launching, OR supply them through your provisioner.
# =============================================================================

hostname: adminbolt
manage_etc_hosts: true
timezone: UTC

# ----------------------------------------------------------------------------
# Users — keep 'default' so the provisioner can inject the customer SSH key
# ----------------------------------------------------------------------------
users:
  - default

# ----------------------------------------------------------------------------
# Packages — minimal prereqs; AdminBolt installer pulls the rest via its own
# RPM repo (packages.adminbolt.com)
# ----------------------------------------------------------------------------
package_update: true
package_upgrade: true
packages:
  - curl
  - wget
  - unzip
  - tar
  - rsync
  - jq
  - openssl
  - ca-certificates
  - gnupg2
  - sudo
  - fail2ban
  - dnf-automatic
  - firewalld
  - python3

# ----------------------------------------------------------------------------
# Swap — 2 GiB to survive MariaDB + PHP memory spikes during bootstrap
# ----------------------------------------------------------------------------
swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

# ----------------------------------------------------------------------------
# Files written before runcmd
# ----------------------------------------------------------------------------
write_files:
  # Operator-editable environment vars
  - path: /root/.adminbolt-bootstrap.env
    permissions: '0600'
    content: |
      # =============================================================
      # AdminBolt bootstrap environment — edit before first boot
      # =============================================================
      # Server hostname or IP (used only for the credentials file;
      # AdminBolt reads the actual IP from the system automatically)
      APP_DOMAIN=CHANGE_ME

      # Email for Let's Encrypt (AdminBolt manages TLS internally;
      # set this for the SSL setup command if you run it manually)
      LE_EMAIL=CHANGE_ME

      # Set to "true" to attempt certbot TLS on APP_DOMAIN after install
      # Leave "false" if DNS is not pointed at this server yet
      ENABLE_TLS=false

      # Admin password placeholder — AdminBolt uses SSO (no password needed
      # for initial login); the SSO URL is written to credentials file
      ADMIN_PASS=CHANGE_ME

  # Bootstrap script
  - path: /root/adminbolt-bootstrap.sh
    permissions: '0750'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/adminbolt-bootstrap.log) 2>&1
      # --- repair corrupted base-image postfix (missing /etc/postfix/postfix-files
      #     makes postfix@-.service fail every boot); guarded no-op otherwise.
      #     dpkg --reinstall won't recreate it (treated as a removed conffile),
      #     so restore the file straight from the cached/downloaded .deb. ---
      if command -v dpkg >/dev/null 2>&1 && dpkg -s postfix >/dev/null 2>&1 && [ ! -f /etc/postfix/postfix-files ]; then
        echo "Repairing corrupted postfix (restoring /etc/postfix/postfix-files from .deb)..."
        _pf_deb="$(ls -t /var/cache/apt/archives/postfix_*.deb 2>/dev/null | head -1)"
        if [ -z "$_pf_deb" ]; then
          ( cd /tmp && DEBIAN_FRONTEND=noninteractive apt-get download postfix >/dev/null 2>&1 || true )
          _pf_deb="$(ls -t /tmp/postfix_*.deb 2>/dev/null | head -1)"
        fi
        [ -n "$_pf_deb" ] && dpkg-deb --fsys-tarfile "$_pf_deb" | tar -C / -xf - ./etc/postfix/postfix-files ./etc/postfix/postfix-files.d 2>/dev/null || true
        systemctl reset-failed 'postfix@-.service' 2>/dev/null || true
        systemctl restart 'postfix@-.service' 2>/dev/null || systemctl restart postfix 2>/dev/null || true
      fi
      source /root/.adminbolt-bootstrap.env

      echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] === AdminBolt bootstrap start ==="

      # ----------------------------------------------------------------
      # Random-secret helper (SIGPIPE-safe under set -e + pipefail)
      # ----------------------------------------------------------------
      rand() { LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom 2>/dev/null | head -c 24 || true; }

      # ----------------------------------------------------------------
      # Resolve public IP for the credentials file
      # ----------------------------------------------------------------
      SERVER_IP=$(curl -4 -s --max-time 10 https://ifconfig.me 2>/dev/null || \
                  curl -4 -s --max-time 10 https://api.ipify.org 2>/dev/null || \
                  hostname -I | awk '{print $1}')

      # If APP_DOMAIN is still a placeholder, fall back to the IP
      if [[ "$APP_DOMAIN" == "CHANGE_ME" ]]; then
        APP_DOMAIN="$SERVER_IP"
      fi

      # ----------------------------------------------------------------
      # firewalld — start it first so AdminBolt's bolt-cli run-firewall-fix
      # has a running daemon to work with
      # ----------------------------------------------------------------
      systemctl enable --now firewalld

      # Allow SSH and the AdminBolt panel port (8443) right away
      firewall-cmd --permanent --add-service=ssh
      firewall-cmd --permanent --add-port=8443/tcp
      # HTTP/HTTPS for hosted sites managed by the panel
      firewall-cmd --permanent --add-service=http
      firewall-cmd --permanent --add-service=https
      # DNS (PowerDNS is installed by bolt-install.sh)
      firewall-cmd --permanent --add-port=53/tcp
      firewall-cmd --permanent --add-port=53/udp
      # FTP (vsftpd managed by panel)
      firewall-cmd --permanent --add-port=21/tcp
      firewall-cmd --permanent --add-port=40000-50000/tcp
      # SMTP / IMAP / POP3 (mail stack managed by panel)
      firewall-cmd --permanent --add-port=25/tcp
      firewall-cmd --permanent --add-port=465/tcp
      firewall-cmd --permanent --add-port=587/tcp
      firewall-cmd --permanent --add-port=110/tcp
      firewall-cmd --permanent --add-port=143/tcp
      firewall-cmd --permanent --add-port=993/tcp
      firewall-cmd --permanent --add-port=995/tcp
      firewall-cmd --reload

      # ----------------------------------------------------------------
      # fail2ban
      # ----------------------------------------------------------------
      systemctl enable --now fail2ban || true

      # ----------------------------------------------------------------
      # dnf-automatic — security-only updates, applied automatically
      # ----------------------------------------------------------------
      sed -i 's/^upgrade_type\s*=.*/upgrade_type = security/'       /etc/dnf/automatic.conf
      sed -i 's/^apply_updates\s*=.*/apply_updates = yes/'          /etc/dnf/automatic.conf
      sed -i 's/^download_updates\s*=.*/download_updates = yes/'    /etc/dnf/automatic.conf
      systemctl enable --now dnf-automatic.timer

      # ----------------------------------------------------------------
      # Disable SELinux (AdminBolt installer requires it disabled)
      # ----------------------------------------------------------------
      setenforce 0 2>/dev/null || true
      sed -i 's/^SELINUX=.*/SELINUX=disabled/' /etc/selinux/config

      # ----------------------------------------------------------------
      # Run the official AdminBolt non-interactive installer
      # ----------------------------------------------------------------
      echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Downloading and running AdminBolt installer..."
      cd /home

      INSTALLER_URL="https://license.adminbolt.com/mirrorlist/any/any/adminbolt-bash-installer-1.0.0-beta1-stable.sh"

      # Retry up to 3 times in case of transient network issues
      for attempt in 1 2 3; do
        if curl -fsSL -o /tmp/adminbolt-install.sh "$INSTALLER_URL"; then
          break
        fi
        echo "Installer download attempt $attempt failed; retrying in 15s..."
        sleep 15
      done

      chmod +x /tmp/adminbolt-install.sh

      # NON_INT=1 tells the script not to prompt for confirmations
      # --auto-upgrade=1 suppresses the OS-version upgrade prompt
      export NON_INT=1
      bash /tmp/adminbolt-install.sh --auto-upgrade=1 --show-percentages

      # ----------------------------------------------------------------
      # Generate admin SSO URL
      # ----------------------------------------------------------------
      echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Generating admin SSO URL..."
      SSO_URL=$(bolt-cli admin-sso-generate 2>/dev/null || echo "Run: bolt-cli admin-sso-generate")

      # ----------------------------------------------------------------
      # Optional: certbot TLS on APP_DOMAIN (skip if DNS not ready)
      # ----------------------------------------------------------------
      if [[ "$ENABLE_TLS" == "true" && "$LE_EMAIL" != "CHANGE_ME" && "$APP_DOMAIN" != "$SERVER_IP" ]]; then
        echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] Requesting Let's Encrypt certificate for $APP_DOMAIN..."
        command -v certbot || dnf install -y certbot 2>/dev/null
        certbot certonly --standalone --non-interactive --agree-tos \
          --email "$LE_EMAIL" -d "$APP_DOMAIN" \
          --pre-hook  "systemctl stop bolt  2>/dev/null || true" \
          --post-hook "systemctl start bolt 2>/dev/null || true" \
          || echo "WARN: certbot deferred — DNS not yet pointed to this server"
      fi

      # ----------------------------------------------------------------
      # Write credentials file (chmod 600)
      # ----------------------------------------------------------------
      cat > /root/adminbolt-credentials.txt <<CREDS
      ============================================================
       AdminBolt Control Panel — Credentials
       Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
      ============================================================

      Panel URL   : https://$SERVER_IP:8443
      Domain URL  : https://$APP_DOMAIN:8443

      Admin Login : Use the SSO URL below for first login
      SSO URL     : $SSO_URL

      To generate a fresh SSO URL at any time:
        bolt-cli admin-sso-generate

      Log file    : /var/log/adminbolt-bootstrap.log

      ============================================================
      CREDS
      chmod 600 /root/adminbolt-credentials.txt

      echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] === AdminBolt bootstrap complete ==="
      echo ""
      echo "============================================================"
      echo " AdminBolt Panel URL : https://$SERVER_IP:8443"
      echo " Admin SSO URL       : $SSO_URL"
      echo " Credentials file    : /root/adminbolt-credentials.txt"
      echo "============================================================"

# ----------------------------------------------------------------------------
# Run the bootstrap script once on first boot
# ----------------------------------------------------------------------------
bootcmd:
  # Stop the base image's apt-daily / unattended-upgrades TIMERS from firing at
  # first boot so they don't hold the dpkg lock during cloud-init's package
  # stage. Masking timers only — NO process killing (that corrupts dpkg and a
  # -f match would kill this very command). cloud-init already waits for the lock.
  - [ cloud-init-per, instance, ci-apt-quiesce, sh, -c, "systemctl mask apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true; true" ]

runcmd:
  - [ bash, -lc, "/root/adminbolt-bootstrap.sh" ]

# ----------------------------------------------------------------------------
# Final message shown in cloud-init output / console
# ----------------------------------------------------------------------------
final_message: |
  ============================================================
   AdminBolt bootstrap finished in $UPTIME seconds.
   Panel    : https://<SERVER-IP>:8443
   SSO creds: /root/adminbolt-credentials.txt
  ============================================================
